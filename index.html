<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xnesto – متجر الألعاب | PS4/PS5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #0f0f1f 100%);
      font-family: 'Segoe UI', Tahoma, system-ui, sans-serif;
      color: #f0f0ff;
      padding: 1.5rem;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      background: rgba(17, 17, 51, 0.7);
      backdrop-filter: blur(10px);
      padding: 1.5rem 1rem;
      border-radius: 2rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(0, 204, 255, 0.3);
    }

    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #00ccff, #ffaa44);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .header p {
      color: #aab3e6;
    }

    .control-bar {
      max-width: 1300px;
      margin: 0 auto 1.8rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
      background: rgba(0, 0, 0, 0.4);
      padding: 12px 20px;
      border-radius: 60px;
    }

    .lang-switch {
      display: flex;
      gap: 10px;
      background: #1e1e3a;
      padding: 5px;
      border-radius: 50px;
    }

    .lang-btn {
      background: transparent;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      color: #ccc;
      font-weight: bold;
      cursor: pointer;
    }

    .lang-btn.active {
      background: #ffaa44;
      color: #0a0a1a;
    }

    .currency-selector {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #1e1e3a;
      padding: 5px 15px;
      border-radius: 50px;
    }

    #currencySelect {
      background: #0a0c1a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 8px 12px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }

    .auth-buttons {
      display: flex;
      gap: 10px;
    }

    .login-btn, .logout-btn {
      background: #2d2f6e;
      border: none;
      color: #ffaa66;
      padding: 8px 16px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .user-badge {
      background: #1e1e3a;
      padding: 8px 16px;
      border-radius: 40px;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
    }

    .login-modal.active {
      visibility: visible;
      opacity: 1;
    }

    .login-box {
      background: #11152b;
      border-radius: 1.5rem;
      padding: 2rem;
      text-align: center;
      border: 1px solid #ffaa44;
      width: 320px;
    }

    .login-box h3 {
      margin-bottom: 1rem;
      color: #ffaa44;
    }

    .login-box input, .login-box select {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 40px;
      border: none;
      background: #1e1e3a;
      color: white;
      text-align: center;
    }

    .login-box button {
      background: #ffaa44;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    .login-error {
      color: #ff6666;
      margin-top: 10px;
    }

    .admin-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(10px);
      z-index: 1001;
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
    }

    .admin-panel.active {
      visibility: visible;
      opacity: 1;
    }

    .admin-container {
      background: #0a0c1a;
      border-radius: 1.5rem;
      width: 95%;
      max-width: 1100px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 1.5rem;
      border: 2px solid #ffaa44;
    }

    .admin-container h2 {
      text-align: center;
      color: #ffaa44;
      margin-bottom: 1rem;
    }

    .admin-games-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-bottom: 20px;
    }

    .admin-game-item {
      background: #11152b;
      padding: 15px;
      border-radius: 1rem;
      border: 1px solid #2a2f55;
    }

    .admin-game-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .admin-game-name {
      font-weight: bold;
      font-size: 1.1rem;
      color: #ffaa66;
    }

    .admin-price-input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      padding: 6px 12px;
      border-radius: 30px;
      width: 90px;
      text-align: center;
      color: #ffdd99;
    }

    .admin-specs {
      margin: 10px 0;
      padding: 10px;
      background: #0a0c1a;
      border-radius: 0.8rem;
    }

    .admin-specs textarea {
      width: 100%;
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 12px;
      padding: 8px;
      color: white;
      font-size: 0.8rem;
      resize: vertical;
      font-family: inherit;
    }

    .admin-specs label {
      font-size: 0.7rem;
      color: #ffaa66;
      display: block;
      margin-bottom: 5px;
    }

    .admin-buttons {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .admin-save-btn, .admin-delete-btn {
      padding: 6px 16px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      border: none;
    }

    .admin-save-btn {
      background: #ffaa44;
      color: #0a0a1a;
    }

    .admin-delete-btn {
      background: #ff4444;
      color: white;
    }

    .add-game-section {
      background: #11152b;
      padding: 1rem;
      border-radius: 1rem;
      margin-top: 1rem;
    }

    .add-game-section h3 {
      color: #ffaa44;
      margin-bottom: 1rem;
    }

    .add-game-form {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .add-game-form input, .add-game-form textarea {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      padding: 8px 12px;
      border-radius: 30px;
      color: white;
      flex: 1;
      min-width: 140px;
    }

    .add-game-form textarea {
      min-width: 200px;
      border-radius: 15px;
      resize: vertical;
    }

    .add-game-btn {
      background: #00cc88;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }

    .close-admin {
      background: #ff4444;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      display: block;
      margin: 20px auto 0;
    }

    .games-grid {
      max-width: 1300px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.8rem;
    }

    .game-card {
      background: #11152b;
      border-radius: 1.2rem;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid #2a2f55;
    }

    .game-card:hover {
      transform: translateY(-5px);
      border-color: #ffaa55;
    }

    .game-image {
      width: 100%;
      height: 200px;
      background-size: cover;
      background-position: center;
      position: relative;
      background-color: #1a1a2e;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .game-image-fallback {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #2a2a4a, #1a1a3a);
      font-size: 3rem;
      color: #ffaa44;
    }

    .game-badge {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      color: #ffcc77;
      z-index: 2;
    }

    .card-info {
      padding: 1rem;
    }

    .game-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .game-version {
      font-size: 0.7rem;
      color: #8f9bcf;
      margin-bottom: 8px;
    }

    .game-specs {
      background: rgba(0, 0, 0, 0.3);
      padding: 8px;
      border-radius: 12px;
      margin: 10px 0;
      font-size: 0.75rem;
      color: #b9c5f0;
      line-height: 1.5;
      border-right: 2px solid #ffaa44;
    }

    .price {
      font-size: 1.5rem;
      font-weight: 800;
      color: #ff6666;
      margin: 8px 0;
    }

    .btn-wa {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: #25D366;
      color: #000;
      width: 100%;
      padding: 10px 0;
      border-radius: 40px;
      text-decoration: none;
      font-weight: bold;
      margin-top: 8px;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .page-btn {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 8px 14px;
      border-radius: 40px;
      cursor: pointer;
    }

    .page-btn.active {
      background: #ffaa44;
      color: #0a0a1a;
    }

    .footer {
      text-align: center;
      margin-top: 2rem;
      padding: 1rem;
      color: #6f7bb3;
    }

    @media (max-width: 640px) {
      body { padding: 0.8rem; }
      .game-image { height: 160px; }
    }
  </style>
</head>

<!-- نافذة تسجيل الدخول -->
<div class="login-modal" id="loginModal">

</div>

<!-- لوحة تحكم الادمن -->

      </div>
    </div>
    
    <button class="close-admin" id="closeAdminBtn"><span id="closeAdminText">إغلاق</span></button>

</div>

    { id: 13, nameAr: "Hogwarts Legacy", nameEn: "Hogwarts Legacy", version: "PS4/PS5", priceOMR: 11, image: "https://images.igdb.com/igdb/image/upload/t_cover_big/co8j0l.jpg", icon: "🧙", specsAr: "🏷️ الحجم: 85GB | 🎮 اللغة: عربية/إنجليزية | 🧙 عالم هاري بوتر", specsEn: "📦 Size: 85GB | 🎮 Language: Arabic/English | 🧙 Harry Potter World", msgAr: "أريد Hogwarts Legacy", msgEn: "I want Hogwarts Legacy" },
    { id: 14, nameAr: "Final Fantasy VII Rebirth", nameEn: "Final Fantasy VII Rebirth", version: "PS5", priceOMR: 18, image: "https://images.igdb.com/igdb/image/upload/t_cover_big/co8j1m.jpg", icon: "🗡️", specsAr: "🏷️ الحجم: 145GB | 🎮 اللغة: عربية/إنجليزية", specsEn: "📦 Size: 145GB | 🎮 Language: Arabic/English", msgAr: "أريد Final Fantasy VII Rebirth", msgEn: "I want Final Fantasy VII Rebirth" },
    { id: 15, nameAr: "Tekken 8", nameEn: "Tekken 8", version: "PS5", priceOMR: 12, image: "https://images.igdb.com/igdb/image/upload/t_cover_big/co8j2n.jpg", icon: "🥊", specsAr: "🏷️ الحجم: 80GB | 🎮 اللغة: عربية/إنجليزية | 🥊 لعبة قتال", specsEn: "📦 Size: 80GB | 🎮 Language: Arabic/English | 🥊 Fighting Game", msgAr: "أريد Tekken 8", msgEn: "I want Tekken 8" }
  ];

  let nextId = 16;
  let currentUser = { type: "guest", name: "زائر" };
  let currentLang = "ar";
  let currentCurrency = "OMR";
  let currentPage = 1;
  const GAMES_PER_PAGE = 8;
  const ADMIN_PASSWORD = "admin123";

  const exchangeRates = { OMR: 1, USD: 2.6, SAR: 9.75, QAR: 9.46, EUR: 2.4, AED: 9.55 };
  const currencySymbols = { OMR: "ر.ع", USD: "$", SAR: "ر.س", QAR: "ر.ق", EUR: "€", AED: "د.إ" };
  const WA_NUMBER = "96879977100";

  function saveGamesToLocal() { localStorage.setItem("xnesto_games", JSON.stringify(gamesData)); }
  function loadGamesFromLocal() {
    const saved = localStorage.getItem("xnesto_games");
    if (saved) { 
      const parsed = JSON.parse(saved);
      if (parsed.length > 0) {
        gamesData.length = 0;
        parsed.forEach(g => gamesData.push(g));
        nextId = Math.max(...gamesData.map(g => g.id), 0) + 1;
      }
    }
  }
  loadGamesFromLocal();

  function convertPrice(price, currency) {
    let converted = price * exchangeRates[currency];
    return converted.toFixed(2);
  }

  function handleImageError(imgElement, game) {
    imgElement.onerror = null;
    imgElement.style.backgroundImage = "none";
    imgElement.style.backgroundColor = "#1a1a2e";
    imgElement.innerHTML = `<div class="game-image-fallback"><i class="fas fa-gamepad" style="font-size: 3rem; color: #ffaa44;"></i><br><span style="font-size: 0.7rem; margin-top: 5px;">${game.icon || "🎮"} ${game.nameAr}</span></div>`;
    imgElement.style.display = "flex";
    imgElement.style.alignItems = "center";
    imgElement.style.justifyContent = "center";
    imgElement.style.flexDirection = "column";
  }

  function buildGameCard(game) {
    const card = document.createElement("div");
    card.className = "game-card";
    const gameName = currentLang === "ar" ? game.nameAr : game.nameEn;
    const specs = currentLang === "ar" ? game.specsAr : game.specsEn;
    const whatsappMsg = currentLang === "ar" ? game.msgAr : game.msgEn;
    const waLink = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(whatsappMsg)}`;
    const convertedPrice = convertPrice(game.priceOMR, currentCurrency);
    const currencySym = currencySymbols[currentCurrency];
    
    card.innerHTML = `
      <div class="game-image" id="game-img-${game.id}" style="background-image: url('${game.image}'); background-size: cover; background-position: center;">
        <div class="game-badge">${game.version}</div>
      </div>
      <div class="card-info">
        <div class="game-title">${gameName}</div>
        <div class="game-version">${currentLang === "ar" ? "نسخة رقمية | تحميل فوري" : "Digital Edition"}</div>
        ${specs ? `<div class="game-specs"><i class="fas fa-info-circle"></i> ${specs}</div>` : ''}
        <div class="price">${convertedPrice} <span>${currencySym}</span></div>
        <a href="${waLink}" target="_blank" class="btn-wa"><i class="fab fa-whatsapp"></i> ${currentLang === "ar" ? "اطلب الآن" : "Order Now"}</a>
      </div>
    `;
    
    const imgDiv = card.querySelector(`#game-img-${game.id}`);
    if (imgDiv) {
      const testImg = new Image();
      testImg.onerror = () => handleImageError(imgDiv, game);
      testImg.src = game.image;
    }
    
    return card;
  }

  function renderGames() {
    const container = document.getElementById("gamesContainer");
    if (!container) return;
    container.innerHTML = "";
    const totalPages = Math.ceil(gamesData.length / GAMES_PER_PAGE);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * GAMES_PER_PAGE;
    const pageGames = gamesData.slice(start, start + GAMES_PER_PAGE);
    pageGames.forEach(game => container.appendChild(buildGameCard(game)));
    renderPagination();
  }

  function renderPagination() {
    const pagContainer = document.getElementById("paginationContainer");
    if (!pagContainer) return;
    pagContainer.innerHTML = "";
    const totalPages = Math.ceil(gamesData.length / GAMES_PER_PAGE);
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.className = "page-btn" + (i === currentPage ? " active" : "");
      btn.textContent = i;
      btn.onclick = () => { currentPage = i; renderGames(); };
      pagContainer.appendChild(btn);
    }
  }

  function renderAdminPanel() {
    const container = document.getElementById("adminGamesList");
    if (!container) return;
    container.innerHTML = "";
    gamesData.forEach(game => {
      const item = document.createElement("div");
      item.className = "admin-game-item";
      item.innerHTML = `
        <div class="admin-game-header">
          <div class="admin-game-name">${game.nameAr} (${game.version})</div>
          <div>
            <input type="number" class="admin-price-input" id="price-${game.id}" value="${game.priceOMR}" step="0.5">
            <span style="margin:0 5px">ر.ع</span>
          </div>
        </div>
        <div class="admin-specs">
          <label><i class="fas fa-info-circle"></i> المواصفات (عربي)</label>
          <textarea id="specsAr-${game.id}" rows="2">${game.specsAr || ''}</textarea>
          <label style="margin-top:8px;"><i class="fas fa-info-circle"></i> Specifications (English)</label>
          <textarea id="specsEn-${game.id}" rows="2">${game.specsEn || ''}</textarea>
          <label style="margin-top:8px;"><i class="fas fa-image"></i> رابط الصورة</label>
          <input type="text" id="imageUrl-${game.id}" value="${game.image}" style="width:100%; background:#1e1e3a; border:1px solid #ffaa44; border-radius:30px; padding:8px; color:white;">
        </div>
        <div class="admin-buttons">
          <button class="admin-save-btn" data-id="${game.id}"><i class="fas fa-save"></i> حفظ</button>
          <button class="admin-delete-btn" data-id="${game.id}"><i class="fas fa-trash"></i> حذف</button>
        </div>
      `;
      container.appendChild(item);
    });
    
    document.querySelectorAll(".admin-save-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.getAttribute("data-id"));
        const newPrice = parseFloat(document.getElementById(`price-${id}`).value);
        const newSpecsAr = document.getElementById(`specsAr-${id}`).value;
        const newSpecsEn = document.getElementById(`specsEn-${id}`).value;
        const newImage = document.getElementById(`imageUrl-${id}`).value;
        const game = gamesData.find(g => g.id === id);
        if (game) {
          if (!isNaN(newPrice)) game.priceOMR = newPrice;
          game.specsAr = newSpecsAr;
          game.specsEn = newSpecsEn;
          if (newImage) game.image = newImage;
          saveGamesToLocal();
          renderAdminPanel();
          renderGames();
        }
      });
    });
    
    document.querySelectorAll(".admin-delete-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.getAttribute("data-id"));
        gamesData = gamesData.filter(g => g.id !== id);
        saveGamesToLocal();
        renderAdminPanel();
        renderGames();
      });
    });
  }

  function addNewGame() {
    const nameAr = document.getElementById("newGameNameAr").value;
    const nameEn = document.getElementById("newGameNameEn").value;
    const version = document.getElementById("newGameVersion").value;
    const price = parseFloat(document.getElementById("newGamePrice").value);
    const image = document.getElementById("newGameImage").value || "https://images.igdb.com/igdb/image/upload/t_cover_big/co4j5k.jpg";
    const specsAr = document.getElementById("newGameSpecsAr").value;
    const specsEn = document.getElementById("newGameSpecsEn").value;
    
    if (!nameAr || !nameEn || !version || isNaN(price)) {
      alert("يرجى ملء جميع الحقول الأساسية بشكل صحيح");
      return;
    }
    
    const newGame = {
      id: nextId++,
      nameAr, nameEn, version,
      priceOMR: price,
      image: image,
      icon: "🎮",
      specsAr: specsAr || "🏷️ مواصفات قريباً",
      specsEn: specsEn || "📦 Specifications coming soon",
      msgAr: `أريد ${nameAr}`,
      msgEn: `I want ${nameEn}`
    };
    
    gamesData.push(newGame);
    saveGamesToLocal();
    renderAdminPanel();
    renderGames();
    
    document.getElementById("newGameNameAr").value = "";
    document.getElementById("newGameNameEn").value = "";
    document.getElementById("newGameVersion").value = "";
    document.getElementById("newGamePrice").value = "";
    document.getElementById("newGameImage").value = "";
    document.getElementById("newGameSpecsAr").value = "";
    document.getElementById("newGameSpecsEn").value = "";
  }

  function updateUIForUser() {
    const authDiv = document.getElementById("authButtons");
    const welcomeMsg = document.getElementById("welcomeMsg");
    
    if (currentUser.type === "admin") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-crown"></i> ${currentLang === "ar" ? "مرحباً Admin" : "Welcome Admin"}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${currentLang === "ar" ? "خروج" : "Logout"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 مرحباً بك أيها المدير! يمكنك تعديل الأسعار والحذف والإضافة" : "🎮 Welcome Admin! You can edit prices, delete and add games";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else if (currentUser.type === "user") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${currentLang === "ar" ? "مرحباً عميل" : "Welcome User"}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${currentLang === "ar" ? "خروج" : "Logout"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 أهلاً بك! يمكنك تصفح الألعاب والطلب عبر واتساب" : "🎮 Welcome! You can browse games and order via WhatsApp";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else {
      authDiv.innerHTML = `<button class="login-btn" id="showLoginBtn"><i class="fas fa-user"></i> ${currentLang === "ar" ? "تسجيل دخول" : "Login"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "ألعاب PS4 / PS5 – أسعار محدثة – رصيد شحن فوري" : "PS4 / PS5 Games – Updated Prices – Instant Credit";
      document.getElementById("showLoginBtn")?.addEventListener("click", () => showLoginModal());
    }
  }

  function logout() {
    currentUser = { type: "guest", name: "زائر" };
    updateUIForUser();
    renderGames();
    const adminPanel = document.getElementById("adminPanel");
    if (adminPanel) adminPanel.classList.remove("active");
  }

  function showLoginModal() {
    document.getElementById("loginModal").classList.add("active");
  }

  function handleLogin() {
    const userType = document.getElementById("userTypeSelect").value;
    if (userType === "admin") {
      const password = document.getElementById("adminPassword").value;
      if (password === ADMIN_PASSWORD) {
        currentUser = { type: "admin", name: "Admin" };
        updateUIForUser();
        document.getElementById("loginModal").classList.remove("active");
        document.getElementById("adminPanel").classList.add("active");
        renderAdminPanel();
        document.getElementById("addGameBtn").onclick = addNewGame;
      } else {
        document.getElementById("loginError").textContent = currentLang === "ar" ? "كلمة السر غير صحيحة" : "Incorrect password";
      }
    } else {
      currentUser = { type: "user", name: "عميل" };
      updateUIForUser();
      document.getElementById("loginModal").classList.remove("active");
    }
  }

  function initEvents() {
    document.getElementById("showLoginBtn")?.addEventListener("click", showLoginModal);
    document.getElementById("closeLoginBtn")?.addEventListener("click", () => document.getElementById("loginModal").classList.remove("active"));
    document.getElementById("loginSubmitBtn")?.addEventListener("click", handleLogin);
    document.getElementById("closeAdminBtn")?.addEventListener("click", () => document.getElementById("adminPanel").classList.remove("active"));
    document.getElementById("userTypeSelect")?.addEventListener("change", (e) => {
      document.getElementById("adminPasswordField").style.display = e.target.value === "admin" ? "block" : "none";
    });
    
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentLang = btn.getAttribute("data-lang");
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
        updateUIForUser();
        renderGames();
        updateTexts();
      });
    });
    
    document.getElementById("currencySelect")?.addEventListener("change", (e) => {
      currentCurrency = e.target.value;
      renderGames();
    });
  }

  function updateTexts() {
    document.getElementById("currencyLabel").innerText = currentLang === "ar" ? "العملة:" : "Currency:";
    document.getElementById("loginBtnText").innerText = currentLang === "ar" ? "تسجيل دخول" : "Login";
    document.getElementById("loginTitle").innerText = currentLang === "ar" ? "تسجيل الدخول" : "Login";
    document.getElementById("userOption").innerText = currentLang === "ar" ? "عميل / زائر" : "User / Guest";
    document.getElementById("adminOption").innerText = currentLang === "ar" ? "أدمن (مدير)" : "Admin";
    document.getElementById("loginBtn").innerText = currentLang === "ar" ? "دخول" : "Login";
    document.getElementById("closeBtnText").innerText = currentLang === "ar" ? "إغلاق" : "Close";
    document.getElementById("adminPanelTitle").innerHTML = currentLang === "ar" ? "لوحة تحكم الأدمن - تعديل الأسعار والمواصفات" : "Admin Panel - Edit Prices & Specs";
    document.getElementById("addGameTitle").innerHTML = currentLang === "ar" ? "إضافة لعبة جديدة" : "Add New Game";
    document.getElementById("addBtnText").innerText = currentLang === "ar" ? "إضافة" : "Add";
    document.getElementById("closeAdminText").innerText = currentLang === "ar" ? "إغلاق" : "Close";
  }

  function init() {
    initEvents();
    updateUIForUser();
    renderGames();
    updateTexts();
  }
  
  init();
</script>
</body>
</html>
