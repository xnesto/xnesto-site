<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xnesto - لوحة التحكم الذكية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* كود التصميم المطور */
        body { background: #0a0a1a; font-family: 'Cairo', sans-serif; color: #f0f0ff; margin: 0; padding: 20px; }
        .header { text-align: center; padding: 20px; border-bottom: 2px solid #ffaa44; margin-bottom: 20px; }
        .admin-btn { background: #ffaa44; color: #0a0a1a; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: #1e1e3a; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .admin-controls { display: none; margin-top: 15px; border-top: 1px solid #444; padding-top: 10px; }
        body.admin-mode .admin-controls { display: block; }
        input { width: 100%; background: #2a2a4a; border: 1px solid #444; color: white; padding: 8px; margin-bottom: 5px; border-radius: 5px; box-sizing: border-box; }
        .save-all-btn { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #28a745; color: white; padding: 15px 30px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 1000; }
        body.admin-mode .save-all-btn { display: block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>xnesto 🎮</h1>
        <button id="loginBtn" class="admin-btn" onclick="toggleAdmin()">دخول الإدارة</button>
    </div>

    <button id="saveAllBtn" class="save-all-btn" onclick="saveToGitHub()">✅ حفظ التغييرات للجميع</button>

    <div id="productsGrid" class="products-grid">جاري تحميل المنتجات...</div>

    <script>
        const GITHUB_TOKEN = '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';
        const REPO_OWNER = 'omarssp95';
        const REPO_NAME = 'xnesto-site';
        let products = [];

        // جلب البيانات
        async function loadData() {
            try {
                const res = await fetch(`products.json?t=${Date.now()}`);
                const data = await res.json();
                products = [...data.games, ...data.giftcards];
                render();
            } catch (e) { document.getElementById('productsGrid').innerHTML = "خطأ في تحميل البيانات. تأكد من وجود ملف products.json"; }
        }

        function render() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = products.map((p, i) => `
                <div class="card">
                    <img src="${p.image}" style="width:100%; border-radius:10px;">
                    <h3>${p.nameAr}</h3>
                    <p>السعر: ${p.priceOMR} ر.ع</p>
                    <div class="admin-controls">
                        <input type="text" value="${p.nameAr}" onchange="update(${i}, 'nameAr', this.value)" placeholder="الاسم">
                        <input type="number" value="${p.priceOMR}" onchange="update(${i}, 'priceOMR', this.value)" placeholder="السعر">
                        <input type="text" value="${p.image}" onchange="update(${i}, 'image', this.value)" placeholder="رابط الصورة">
                    </div>
                </div>
            `).join('');
        }

        function update(i, field, val) {
            products[i][field] = (field === 'priceOMR') ? parseFloat(val) : val;
        }

        function toggleAdmin() {
            const pass = prompt("كلمة السر:");
            if (pass === "ssp1995") {
                document.body.classList.add('admin-mode');
                document.getElementById('loginBtn').style.display = 'none';
                alert("أنت الآن في وضع الإدارة. عدل البيانات ثم اضغط الزر الأخضر في الأسفل.");
            }
        }

        async function saveToGitHub() {
            const btn = document.getElementById('saveAllBtn');
            btn.innerHTML = "جاري الحفظ... انتظر";
            btn.disabled = true;

            try {
                const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/products.json`;
                const fileRes = await fetch(url, { headers: { 'Authorization': `token ${GITHUB_TOKEN}` } });
                const fileData = await fileRes.json();

                const newContent = {
                    version: "v_" + Date.now(),
                    games: products.filter(p => p.category === 'games'),
                    giftcards: products.filter(p => p.category === 'giftcards')
                };

                const updateRes = await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${GITHUB_TOKEN}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: "تحديث من لوحة التحكم",
                        content: btoa(unescape(encodeURIComponent(JSON.stringify(newContent, null, 2)))),
                        sha: fileData.sha
                    })
                });

                if (updateRes.ok) alert("✅ مبروك! تم التحديث بنجاح وستظهر التعديلات للجميع خلال دقيقة.");
                else alert("❌ فشل التحديث. تأكد من إعدادات GitHub.");
            } catch (e) { alert("خطأ: " + e.message); }
            btn.innerHTML = "✅ حفظ التغييرات للجميع";
            btn.disabled = false;
        }

        loadData();
    </script>
</body>
</html>
