    .header {

    .header::before {

      top: -50%;
      left: -50%;

      height: 200%;
      background: radial-gradient(circle, rgba(255,170,68,0.1) 0%, transparent 70%);

      position: relative;
      z-index: 1;

    .header p { color: #ffdd99; position: relative; z-index: 1; }

      left: 0;

      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      visibility: hidden;
      opacity: 0;
      transition: all 0.3s ease;

    .modal-overlay.active { visibility: visible; opacity: 1; }
    .login-box {

      border-radius: 1.5rem;

    .login-box h3 { color: #ffaa44; margin-bottom: 1rem; }

      padding: 12px;
      margin: 10px 0;
      border-radius: 40px;
      background: #1e1e3a;
      color: white;

    .login-box button {

      padding: 12px;
      border-radius: 40px;
      font-weight: bold;
      width: 100%;
      margin-top: 10px;
      cursor: pointer;
    }
    .login-error { color: #ff6666; margin-top: 10px; }
    .close-modal { background: #444 !important; color: white; }

      left: 0;

      align-items: center;
      justify-content: center;

      opacity: 0;

      overflow-y: auto;
      padding: 2rem;

    .admin-panel.active { visibility: visible; opacity: 1; }

    .admin-game-item, .admin-gift-item {

      font-weight: bold;
      border: none;

    .admin-delete-btn { background: #ff4444; color: white; }

      padding: 12px 0;

      color: #ffaa66;

      flex-wrap: wrap;
      justify-content: center;

      border: 1px solid rgba(255, 170, 68, 0.2);
      position: relative;

    .game-card:hover, .giftcard-card:hover { transform: translateY(-5px); border-color: #ffaa44; }

      position: absolute;
      top: 10px;
      left: 10px;
      background: #ff4444;
      color: white;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;

    const pageItems = filteredGames.slice(start, start + ITEMS_PER_PAGE);
    pageItems.forEach(item => container.appendChild(buildGameCard(item)));

  function renderPagination(totalPages) {
    const pagContainer = document.getElementById("paginationContainer");
    if (!pagContainer) return;
    pagContainer.innerHTML = "";
    if (totalPages <= 1) return;
    for (let i = 1; i <= totalPages; i++) {
      const btn = document.createElement("button");
      btn.className = "page-btn" + (i === currentPage ? " active" : "");
      btn.textContent = i;
      btn.onclick = () => { currentPage = i; if (currentTab === "games") renderGames(); else if (currentTab === "giftcards") renderGiftCards(); else renderOffers(); };
      pagContainer.appendChild(btn);
    }
  }

          if (game) {
            if (!isNaN(newPrice)) game.priceOMR = newPrice;
            game.oldPrice = isNaN(newOldPrice) ? null : newOldPrice;
            if (newImage) game.image = newImage;
            game.specsAr = newSpecsAr;
            game.specsEn = newSpecsEn;
            saveGamesToLocal();
          }
        } else if (type === "gift") {
          const newPrice = parseFloat(document.getElementById(`gift-price-${id}`).value);
          const newOldPrice = parseFloat(document.getElementById(`gift-oldPrice-${id}`).value);
          const newValues = document.getElementById(`gift-values-${id}`).value.split(',').map(v => v.trim());
          const card = giftCardsData.find(c => c.id === id);
          if (card) {
            if (!isNaN(newPrice)) card.priceOMR = newPrice;
            card.oldPrice = isNaN(newOldPrice) ? null : newOldPrice;
            if (newValues.length > 0 && newValues[0] !== "") card.values = newValues;
            saveGiftsToLocal();
          }
        }
        filteredGames = [...gamesData];
        filteredGiftCards = [...giftCardsData];
        filteredOffers = [...gamesData.filter(g => g.oldPrice && g.oldPrice > g.priceOMR), ...giftCardsData.filter(g => g.oldPrice && g.oldPrice > g.priceOMR)];
        renderAdminPanel();
        if (currentTab === "games") renderGames();
        else if (currentTab === "giftcards") renderGiftCards();
        else renderOffers();
      });
    });
    
    document.querySelectorAll(".admin-delete-btn").forEach(btn => {
      btn.addEventListener("click", (e) => {
        const id = parseInt(btn.getAttribute("data-id"));
        const type = btn.getAttribute("data-type");
        if (type === "game") {
          gamesData = gamesData.filter(g => g.id !== id);
          saveGamesToLocal();
        } else if (type === "gift") {
          const index = giftCardsData.findIndex(c => c.id === id);
          if (index !== -1) giftCardsData.splice(index, 1);
          saveGiftsToLocal();
        }
        filteredGames = [...gamesData];
        filteredGiftCards = [...giftCardsData];
        filteredOffers = [...gamesData.filter(g => g.oldPrice && g.oldPrice > g.priceOMR), ...giftCardsData.filter(g => g.oldPrice && g.oldPrice > g.priceOMR)];
        renderAdminPanel();
        if (currentTab === "games") renderGames();
        else if (currentTab === "giftcards") renderGiftCards();
        else renderOffers();
      });
    });
  }

  function addNewGame() {
    const nameAr = document.getElementById("newGameNameAr").value;
    const nameEn = document.getElementById("newGameNameEn").value;
    const version = document.getElementById("newGameVersion").value;
    const price = parseFloat(document.getElementById("newGamePrice").value);
    const oldPrice = parseFloat(document.getElementById("newGameOldPrice").value);
    const image = document.getElementById("newGameImage").value;
    const specsAr = document.getElementById("newGameSpecsAr").value;
    const specsEn = document.getElementById("newGameSpecsEn").value;
    
    if (!nameAr || !nameEn || !version || isNaN(price)) {
      alert("يرجى ملء جميع الحقول الأساسية بشكل صحيح");
      return;
    }
    
    const newGame = {
      id: nextGameId++,
      nameAr, nameEn, version,
      priceOMR: price,
      oldPrice: isNaN(oldPrice) ? null : oldPrice,
      image: image || "https://via.placeholder.com/600x400?text=New+Game",
      bgColor: "#2d4a6e",
      specsAr: specsAr || "🏷️ مواصفات قريباً",
      specsEn: specsEn || "📦 Specifications coming soon",
      msgAr: `أريد ${nameAr}`,
      msgEn: `I want ${nameEn}`
    };
    
    gamesData.push(newGame);
    filteredGames = [...gamesData];
    filteredOffers = [...gamesData.filter(g => g.oldPrice && g.oldPrice > g.priceOMR), ...giftCardsData.filter(g => g.oldPrice && g.oldPrice > g.priceOMR)];
    saveGamesToLocal();
    renderAdminPanel();
    if (currentTab === "games") renderGames();
    else if (currentTab === "offers") renderOffers();
    
    document.getElementById("newGameNameAr").value = "";
    document.getElementById("newGameNameEn").value = "";
    document.getElementById("newGameVersion").value = "";
    document.getElementById("newGamePrice").value = "";
    document.getElementById("newGameOldPrice").value = "";
    document.getElementById("newGameImage").value = "";
    document.getElementById("newGameSpecsAr").value = "";
    document.getElementById("newGameSpecsEn").value = "";
  }

  // ==================== وظائف تسجيل الدخول ====================
  function updateUIForUser() {
    const authDiv = document.getElementById("authButtons");
    const welcomeMsg = document.getElementById("welcomeMsg");
    
    if (currentUser.type === "admin") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-crown"></i> ${currentLang === "ar" ? "مرحباً Admin" : "Welcome Admin"}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${currentLang === "ar" ? "خروج" : "Logout"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 مرحباً بك أيها المدير! يمكنك تعديل الأسعار والتخفيضات" : "🎮 Welcome Admin! You can edit prices and discounts";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else if (currentUser.type === "user") {
      authDiv.innerHTML = `<div class="user-badge"><i class="fas fa-user"></i> ${currentLang === "ar" ? "مرحباً عميل" : "Welcome User"}</div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> ${currentLang === "ar" ? "خروج" : "Logout"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 أهلاً بك! يمكنك تصفح الألعاب والطلب عبر واتساب" : "🎮 Welcome! You can browse games and order via WhatsApp";
      document.getElementById("logoutBtn")?.addEventListener("click", logout);
    } else {
      authDiv.innerHTML = `<button class="login-btn" id="showLoginBtn"><i class="fas fa-user"></i> ${currentLang === "ar" ? "تسجيل دخول" : "Login"}</button>`;
      welcomeMsg.innerHTML = currentLang === "ar" ? "🎮 xnesto - ألعاب PS4/PS5 – بطاقات شحن – عروض وتخفيضات – رصيد فوري" : "🎮 xnesto - PS4/PS5 Games – Gift Cards – Offers & Discounts – Instant Credit";
      document.getElementById("showLoginBtn")?.addEventListener("click", () => showLoginModal());
    }
  }

  function logout() {
    currentUser = { type: "guest", name: "زائر" };
    updateUIForUser();
    document.getElementById("adminPanel").classList.remove("active");
  }

  function showLoginModal() { document.getElementById("loginModal").classList.add("active"); }
  function closeLoginModal() {
    document.getElementById("loginModal").classList.remove("active");
    document.getElementById("loginError").innerHTML = "";
    document.getElementById("adminPassword").value = "";
  }
  function handleLogin() {
    const userType = document.getElementById("userTypeSelect").value;
    if (userType === "admin") {
      const password = document.getElementById("adminPassword").value;
      if (password === ADMIN_PASSWORD) {
        currentUser = { type: "admin", name: "Admin" };
        updateUIForUser();
        closeLoginModal();
        document.getElementById("adminPanel").classList.add("active");
        renderAdminPanel();
        document.getElementById("addGameBtn").onclick = addNewGame;
      } else {
        document.getElementById("loginError").innerHTML = currentLang === "ar" ? "❌ كلمة السر غير صحيحة" : "❌ Incorrect password";
      }
    } else {
      currentUser = { type: "user", name: "عميل" };
      updateUIForUser();
      closeLoginModal();
    }
  }

  function initEvents() {
    document.getElementById("showLoginBtn")?.addEventListener("click", showLoginModal);
    document.getElementById("closeLoginBtn")?.addEventListener("click", closeLoginModal);
    document.getElementById("loginSubmitBtn")?.addEventListener("click", handleLogin);
    document.getElementById("closeAdminBtn")?.addEventListener("click", () => { document.getElementById("adminPanel").classList.remove("active"); });
    document.getElementById("userTypeSelect")?.addEventListener("change", (e) => {
      document.getElementById("adminPasswordField").style.display = e.target.value === "admin" ? "block" : "none";
    });
    
    document.querySelectorAll(".lang-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        currentLang = btn.getAttribute("data-lang");
        document.querySelectorAll(".lang-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        document.body.dir = currentLang === "ar" ? "rtl" : "ltr";
        updateUIForUser();
        if (currentTab === "games") renderGames();
        else if (currentTab === "giftcards") renderGiftCards();
        else renderOffers();
        updateTexts();
      });
    });
    
    document.getElementById("currencySelect")?.addEventListener("change", (e) => {
      currentCurrency = e.target.value;
      if (currentTab === "games") renderGames();
      else if (currentTab === "giftcards") renderGiftCards();
      else renderOffers();
    });
    
    document.getElementById("searchInput")?.addEventListener("input", (e) => {
      searchQuery = e.target.value;
      updateSearchResults();
    });
    
    document.querySelectorAll(".tab-btn").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.getAttribute("data-tab")));
    });
  }

  function updateTexts() {
    document.getElementById("currencyLabel").innerText = currentLang === "ar" ? "العملة:" : "Currency:";
    document.getElementById("loginBtnText").innerText = currentLang === "ar" ? "تسجيل دخول" : "Login";
  }

  function init() {
    initEvents();
    updateUIForUser();
    switchTab("games");
    updateTexts();
  }
  
  init();
</script>
</body>
</html>
