<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xnesto - متجر بسيط</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a, #0a0a1a);
            font-family: 'Cairo', sans-serif;
            color: #fff;
            padding: 1rem;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            background: #0f0f2a;
            padding: 1rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #ffaa44;
        }
        .header h1 { color: #ffaa44; font-size: 1.8rem; }
        .header p { color: #ffdd99; font-size: 0.8rem; }
        
        .control-bar {
            display: flex;
            justify-content: center;
            margin-bottom: 1rem;
        }
        .admin-btn {
            background: #ffaa44;
            color: #0a0a1a;
            border: none;
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }
        
        .admin-panel {
            background: #11152b;
            border: 2px solid #ffaa44;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            display: none;
        }
        .admin-panel.active { display: block; }
        .admin-panel h3 { color: #ffaa44; margin-bottom: 0.5rem; }
        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .add-form input, .add-form textarea {
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            color: white;
            flex: 1;
            min-width: 120px;
        }
        .add-form textarea { border-radius: 1rem; }
        .btn-save {
            background: #00cc88;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            font-weight: bold;
        }
        
        .search-box {
            background: #1e1e3a;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }
        
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: #1e1e3a;
            border: none;
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: white;
        }
        .tab-btn.active { background: #ffaa44; color: #0a0a1a; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .product-card {
            background: #11152b;
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid #ffaa44;
            position: relative;
        }
        .product-image {
            width: 100%;
            height: 160px;
            background-size: cover;
            background-position: center;
            background-color: #1e1e3a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
        }
        .discount-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ff4444;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }
        .card-info { padding: 0.8rem; }
        .product-title { font-size: 1rem; font-weight: bold; text-align: center; margin-bottom: 5px; }
        .product-desc { font-size: 0.7rem; text-align: center; color: #aaa; margin-bottom: 8px; }
        .price { font-size: 1.2rem; font-weight: bold; color: #ffaa44; text-align: center; margin: 5px 0; }
        .old-price { font-size: 0.8rem; text-decoration: line-through; color: #888; }
        .btn-wa {
            width: 100%;
            background: #25D366;
            border: none;
            padding: 0.5rem;
            border-radius: 2rem;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
        
        .admin-edit {
            background: #0a0c1a;
            padding: 0.5rem;
            margin-top: 0.5rem;
            border-radius: 0.5rem;
        }
        .admin-edit input {
            width: 100%;
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            border-radius: 1rem;
            padding: 0.3rem 0.5rem;
            color: white;
            margin-bottom: 5px;
            font-size: 0.7rem;
        }
        .edit-buttons {
            display: flex;
            gap: 5px;
        }
        .edit-buttons button {
            flex: 1;
            padding: 0.3rem;
            border-radius: 1rem;
            cursor: pointer;
            font-size: 0.7rem;
        }
        .save-edit { background: #00cc88; border: none; }
        .delete-product { background: #ff4444; border: none; color: white; }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .page-btn {
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            padding: 0.3rem 0.8rem;
            border-radius: 1rem;
            cursor: pointer;
        }
        .page-btn.active { background: #ffaa44; color: #0a0a1a; }
        
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1rem;
            color: #888;
            border-top: 1px solid #333;
        }
        
        @media (max-width: 640px) {
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
            .product-image { height: 120px; }
            .product-title { font-size: 0.8rem; }
            .price { font-size: 1rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎮 XNESTO STORE 🎮</h1>
    <p>ألعاب PlayStation | بطاقات شحن | توصيل فوري</p>
</div>

<div class="control-bar">
    <button class="admin-btn" onclick="toggleAdmin()">🔐 إدارة</button>
</div>

<div id="adminPanel" class="admin-panel">
    <h3>➕ إضافة منتج جديد</h3>
    <div class="add-form">
        <input type="text" id="newName" placeholder="اسم المنتج">
        <input type="number" id="newPrice" placeholder="السعر (ر.ع)" step="0.5">
        <input type="number" id="newOldPrice" placeholder="السعر القديم" step="0.5">
        <input type="text" id="newImage" placeholder="رابط الصورة (URL)">
        <textarea id="newDesc" rows="1" placeholder="وصف المنتج"></textarea>
        <select id="newCategory">
            <option value="games">🎮 ألعاب</option>
            <option value="giftcards">💳 بطاقات شحن</option>
        </select>
        <button class="btn-save" onclick="addProduct()">💾 إضافة المنتج</button>
    </div>
</div>

<div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج...">
</div>

<div class="tabs" id="tabsContainer">
    <button class="tab-btn active" onclick="setCategory('all')">🎮 جميع المنتجات</button>
    <button class="tab-btn" onclick="setCategory('games')">🎮 ألعاب</button>
    <button class="tab-btn" onclick="setCategory('giftcards')">💳 بطاقات شحن</button>
</div>

<div id="productsContainer" class="products-grid"></div>
<div id="pagination" class="pagination"></div>

<div class="footer">
    <p>📞 واتساب: +96879977100 | 📸 انستقرام: xnesto_store</p>
</div>

<script>
    // ==================== JSONBin Configuration ====================
    const BIN_ID = "69c1e0c7b7ec241ddc981f9e";
    const API_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}`;
    const READ_URL = `https://api.jsonbin.io/v3/b/${BIN_ID}/latest`;
    
    let products = [];
    let currentLang = "ar";
    let currentCategory = "all";
    let searchQuery = "";
    let currentPage = 1;
    let adminMode = false;
    const ITEMS_PER_PAGE = 12;
    const ADMIN_PASSWORD = "ssp1995";
    const WA_NUMBER = "96879977100";
    
    // ==================== تحميل المنتجات من JSONBin ====================
    async function loadProducts() {
        try {
            const response = await fetch(READ_URL + "?t=" + Date.now());
            if (response.ok) {
                const data = await response.json();
                if (data.record && data.record.products && data.record.products.length > 0) {
                    products = data.record.products;
                } else {
                    products = [];
                }
            } else {
                products = [];
            }
        } catch (error) {
            console.error("Error loading:", error);
            products = [];
        }
        renderProducts();
    }
    
    // ==================== حفظ المنتجات إلى JSONBin ====================
    async function saveProducts() {
        try {
            const response = await fetch(API_URL, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "X-Master-Key": "$2a$10$aD0gMMNvbLNHdex117ujwu.CPDmeaAf8h2Bg.7c8CMwpF.DNob3Hu"
                },
                body: JSON.stringify({ products: products })
            });
            return response.ok;
        } catch (error) {
            console.error("Error saving:", error);
            return false;
        }
    }
    
    // ==================== عرض المنتجات ====================
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery.trim()) {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(p => p.name.toLowerCase().includes(query));
        }
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        return filtered;
    }
    
    function renderProducts() {
        const filtered = getFilteredProducts();
        const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
        if (currentPage > totalPages) currentPage = 1;
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const pageProducts = filtered.slice(start, start + ITEMS_PER_PAGE);
        
        const container = document.getElementById('productsContainer');
        container.innerHTML = pageProducts.map(p => {
            const hasDiscount = p.oldPrice && p.oldPrice > p.price;
            const discountPercent = hasDiscount ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
            const categoryIcon = p.category === 'games' ? '🎮' : '💳';
            
            let imageHtml = '';
            if (p.image && p.image.trim()) {
                imageHtml = `<div class="product-image" style="background-image: url('${p.image}');"></div>`;
            } else {
                imageHtml = `<div class="product-image"><div>${categoryIcon}</div></div>`;
            }
            
            return `
                <div class="product-card">
                    ${hasDiscount ? `<div class="discount-badge">🔥 -${discountPercent}%</div>` : ''}
                    ${imageHtml}
                    <div class="card-info">
                        <div class="product-title">${p.name}</div>
                        <div class="product-desc">${p.desc || ''}</div>
                        <div class="price">
                            ${hasDiscount ? `<span class="old-price">${p.oldPrice} ر.ع</span> ` : ''}
                            ${p.price} ر.ع
                        </div>
                        <button class="btn-wa" onclick="buyProduct('${p.name}', ${p.price})">
                            <i class="fab fa-whatsapp"></i> اطلب الآن
                        </button>
                    </div>
                    ${adminMode ? `
                        <div class="admin-edit">
                            <input type="text" id="editName_${p.id}" value="${p.name.replace(/'/g, "\\'")}">
                            <input type="number" id="editPrice_${p.id}" value="${p.price}" step="0.5">
                            <input type="number" id="editOldPrice_${p.id}" value="${p.oldPrice || ''}" step="0.5">
                            <input type="text" id="editImage_${p.id}" value="${p.image || ''}">
                            <textarea id="editDesc_${p.id}" rows="1">${p.desc || ''}</textarea>
                            <div class="edit-buttons">
                                <button class="save-edit" onclick="updateProduct(${p.id})">💾 حفظ</button>
                                <button class="delete-product" onclick="deleteProduct(${p.id})">🗑️ حذف</button>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }).join('');
        
        // Pagination
        const pagContainer = document.getElementById('pagination');
        if (totalPages > 1) {
            let pagesHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pagContainer.innerHTML = pagesHtml;
        } else {
            pagContainer.innerHTML = '';
        }
    }
    
    function goToPage(page) {
        currentPage = page;
        renderProducts();
    }
    
    function setCategory(cat) {
        currentCategory = cat;
        currentPage = 1;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderProducts();
    }
    
    function buyProduct(name, price) {
        const message = `🛒 طلب شراء من xnesto\n━━━━━━━━━━━━━━━━━━━━\n🎮 المنتج: ${name}\n💰 السعر: ${price} ر.ع\n━━━━━━━━━━━━━━━━━━━━\n📞 يرجى تأكيد الطلب.`;
        window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
    }
    
    // ==================== وظائف الأدمن ====================
    function toggleAdmin() {
        const pwd = prompt('🔐 أدخل كلمة سر الأدمن:');
        if (pwd === ADMIN_PASSWORD) {
            adminMode = !adminMode;
            alert(adminMode ? '✅ وضع التعديل مفعل' : '❌ تم إيقاف وضع التعديل');
            document.getElementById('adminPanel').classList.toggle('active', adminMode);
            renderProducts();
        } else if (pwd !== null) {
            alert('❌ كلمة السر غير صحيحة');
        }
    }
    
    async function addProduct() {
        const name = document.getElementById('newName').value.trim();
        const price = parseFloat(document.getElementById('newPrice').value);
        const oldPrice = parseFloat(document.getElementById('newOldPrice').value) || null;
        const image = document.getElementById('newImage').value.trim();
        const desc = document.getElementById('newDesc').value.trim();
        const category = document.getElementById('newCategory').value;
        
        if (!name || isNaN(price)) {
            alert('يرجى ملء الاسم والسعر');
            return;
        }
        
        const newProduct = {
            id: Date.now(),
            name, price, oldPrice: oldPrice > price ? oldPrice : null,
            image, desc, category
        };
        
        products.push(newProduct);
        const saved = await saveProducts();
        if (saved) {
            document.getElementById('newName').value = '';
            document.getElementById('newPrice').value = '';
            document.getElementById('newOldPrice').value = '';
            document.getElementById('newImage').value = '';
            document.getElementById('newDesc').value = '';
            alert('✅ تم إضافة المنتج بنجاح! (سيظهر للجميع فوراً)');
            renderProducts();
        } else {
            alert('❌ حدث خطأ في الحفظ');
        }
    }
    
    async function updateProduct(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;
        
        product.name = document.getElementById(`editName_${id}`).value;
        product.price = parseFloat(document.getElementById(`editPrice_${id}`).value);
        product.oldPrice = parseFloat(document.getElementById(`editOldPrice_${id}`).value) || null;
        if (product.oldPrice && product.oldPrice <= product.price) product.oldPrice = null;
        product.image = document.getElementById(`editImage_${id}`).value;
        product.desc = document.getElementById(`editDesc_${id}`).value;
        
        const saved = await saveProducts();
        if (saved) {
            alert('✅ تم تحديث المنتج بنجاح! (سيظهر للجميع فوراً)');
            renderProducts();
        } else {
            alert('❌ حدث خطأ في الحفظ');
        }
    }
    
    async function deleteProduct(id) {
        if (confirm('⚠️ هل أنت متأكد من حذف هذا المنتج؟')) {
            products = products.filter(p => p.id !== id);
            const saved = await saveProducts();
            if (saved) {
                alert('✅ تم حذف المنتج بنجاح!');
                renderProducts();
            } else {
                alert('❌ حدث خطأ في الحفظ');
            }
        }
    }
    
    // ==================== البحث ====================
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        currentPage = 1;
        renderProducts();
    });
    
    // ==================== التشغيل ====================
    loadProducts();
</script>
</body>
</html>
