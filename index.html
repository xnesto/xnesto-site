    const giftCards = [
        { id: 101, nameAr: "🇺🇸 بطاقة أمريكي", nameEn: "🇺🇸 US Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Flag_of_the_United_States.svg/50px-Flag_of_the_United_States.svg.png", detailsAr: "10$ | 25$ | 50$ | 100$", detailsEn: "10$ | 25$ | 50$ | 100$", sales: 244 },
        { id: 102, nameAr: "🇸🇦 بطاقة سعودي", nameEn: "🇸🇦 Saudi Card", category: "giftcards", priceOMR: 4.5, oldPrice: 5.5, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Flag_of_Saudi_Arabia.svg/50px-Flag_of_Saudi_Arabia.svg.png", detailsAr: "50ر.س | 100ر.س | 200ر.س", detailsEn: "50 SAR | 100 SAR | 200 SAR", sales: 210 },
        { id: 103, nameAr: "🇦🇪 بطاقة إماراتي", nameEn: "🇦🇪 UAE Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/cb/Flag_of_the_United_Arab_Emirates.svg/50px-Flag_of_the_United_Arab_Emirates.svg.png", detailsAr: "50د.إ | 100د.إ | 200د.إ", detailsEn: "50 AED | 100 AED | 200 AED", sales: 195 },
        { id: 104, nameAr: "🇴🇲 بطاقة عماني", nameEn: "🇴🇲 Oman Card", category: "giftcards", priceOMR: 5, oldPrice: 6, stock: 200, image: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/dd/Flag_of_Oman.svg/50px-Flag_of_Oman.svg.png", detailsAr: "5ر.ع | 10ر.ع | 20ر.ع", detailsEn: "5 OMR | 10 OMR | 20 OMR", sales: 180 }
    ];
    
    const allDefaultProducts = [...realGames, ...giftCards];
    
    // ==================== المتغيرات العامة ====================
    let products = [];
    let categories = ["games", "giftcards"];
    let categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
    let currentLang = "ar";
    let currentCurrency = "OMR";
    let currentPage = 1;
    let currentCategory = "all";
    let searchQuery = "";
    let pendingOrderProduct = null;
    const WA_NUMBER = "96879977100";
    const ITEMS_PER_PAGE = 12;
    
    const exchangeRates = { OMR: 1, SAR: 9.75, AED: 9.55, KWD: 0.79, BHD: 0.98, QAR: 9.46, USD: 2.6, EUR: 2.4 };
    const currencySymbols = { OMR: "ر.ع", SAR: "ر.س", AED: "د.إ", KWD: "د.ك", BHD: "د.ب", QAR: "ر.ق", USD: "$", EUR: "€" };
    
    // ==================== دوال العرض ====================
    function updateUILanguage(lang) {
        const t = translations[lang];
        if (!t) return;
        document.getElementById('quote-best-price').innerHTML = `<i class="fas fa-tag"></i> ${t.quoteBestPrice}`;
        document.getElementById('quote-fast-delivery').innerHTML = `<i class="fas fa-bolt"></i> ${t.quoteFastDelivery}`;
        document.getElementById('quote-support').innerHTML = `<i class="fas fa-headset"></i> ${t.quoteSupport}`;
        document.getElementById('quote-secure').innerHTML = `<i class="fas fa-shield-alt"></i> ${t.quoteSecure}`;
        document.getElementById('stat-products-label').innerText = t.statProducts;
        document.getElementById('stat-customers-label').innerText = t.statCustomers;
        document.getElementById('stat-rating-label').innerText = t.statRating;
        document.getElementById('stat-support-label').innerText = t.statSupport;
        document.getElementById('bestseller-title').innerHTML = t.bestsellerTitle;
        document.getElementById('all-products-title').innerHTML = t.allProductsTitle;
        document.getElementById('searchInput').placeholder = t.searchPlaceholder;
        document.getElementById('copyright').innerHTML = t.copyright;
        document.getElementById('terms-title').innerHTML = `<i class="fas fa-file-contract"></i> ${t.termsTitle}`;
        document.getElementById('terms-agree').innerHTML = t.termsAgree;
        document.getElementById('acceptTermsBtn').innerHTML = t.acceptBtn;
        document.getElementById('declineTermsBtn').innerHTML = t.cancelBtn;
    }
    
    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        const allCats = [{ key: "all", name: currentLang === 'ar' ? "🎮 جميع المنتجات" : "🎮 All Products" }, ...categories.map(c => ({ key: c, name: categoryNames[c] || c }))];
        container.innerHTML = allCats.map(cat => `<button class="tab-btn ${currentCategory === cat.key ? 'active' : ''}" onclick="setCategory('${cat.key}')">${cat.name}</button>`).join('');
    }
    
    function setLang(lang) { 
        currentLang = lang; 
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active')); 
        document.querySelector(`.lang-btn[data-lang="${lang}"]`).classList.add('active');
        updateUILanguage(lang);
        renderTabs();
        renderProducts(); 
        loadBestSellers(); 
    }
    
    function setCurrency(currency) { currentCurrency = currency; renderProducts(); }
    function setCategory(cat) { currentCategory = cat; currentPage = 1; renderTabs(); renderProducts(); }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery) {
            filtered = filtered.filter(p => {
                const nameAr = p.nameAr || '';
                const nameEn = p.nameEn || '';
                return nameAr.toLowerCase().includes(searchQuery) || nameEn.toLowerCase().includes(searchQuery);
            });
        }
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => (p.category || '') === currentCategory);
        }
        return filtered;
    }
    
    function renderProducts() {
        const filtered = getFilteredProducts();
        const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const paginated = filtered.slice(start, start + ITEMS_PER_PAGE);
        const container = document.getElementById('productsContainer');
        if (!container) return;
        document.getElementById('searchCount').innerText = filtered.length;
        
        if (paginated.length === 0) { container.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد منتجات</div>'; return; }
        
        const t = translations[currentLang];
        const orderText = t?.orderNow || "اطلب الآن";
        const outOfStockText = t?.outOfStock || "نفذت الكمية";
        
        container.innerHTML = paginated.map(p => {
            let productPrice = p.priceOMR || 0;
            let oldPriceValue = p.oldPrice || null;
            let name = (currentLang === 'ar' ? (p.nameAr || p.name) : (p.nameEn || p.name)) || 'منتج';
            let details = (currentLang === 'ar' ? (p.detailsAr || '') : (p.detailsEn || '')) || '';
            let imageUrl = p.image || 'https://via.placeholder.com/170';
            let productId = p.id || Math.random().toString();
            let isOutOfStock = (p.stock || 999) <= 0;
            const price = (productPrice * exchangeRates[currentCurrency]).toFixed(2);
            const oldPrice = oldPriceValue ? (oldPriceValue * exchangeRates[currentCurrency]).toFixed(2) : null;
            const discount = oldPriceValue ? Math.round((1 - productPrice / oldPriceValue) * 100) : 0;
            
            return `
                <div class="product-card ${isOutOfStock ? 'out-of-stock' : ''}" style="position:relative;">
                    ${discount > 0 ? `<div class="discount-badge">-${discount}%</div>` : ''}
                    ${isOutOfStock ? `<div class="out-of-stock-badge">⚠️ ${outOfStockText}</div>` : ''}
                    <div class="product-image" style="background-image: url('${imageUrl}');"></div>
                    <div class="card-info">
                        <div class="product-title">${escapeHtml(name)}</div>
                        <div class="product-details">${escapeHtml(details)}</div>
                        <div class="price-container">
                            ${oldPrice ? `<span class="old-price">${oldPrice} ${currencySymbols[currentCurrency]}</span>` : ''}
                            <span class="price">${price} ${currencySymbols[currentCurrency]}</span>
                        </div>
                        ${!isOutOfStock ? `<button class="btn-wa" data-id="${productId}" data-name="${escapeHtml(name)}" data-price="${productPrice}"><i class="fab fa-whatsapp"></i> ${orderText}</button>` : `<button class="btn-wa disabled" disabled><i class="fas fa-times-circle"></i> ${outOfStockText}</button>`}
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.btn-wa:not(.disabled)').forEach(btn => {
            btn.onclick = (e) => {
                e.preventDefault();
                const id = btn.getAttribute('data-id');
                const name = btn.getAttribute('data-name');
                const price = btn.getAttribute('data-price');
                showTermsForProduct(id, name, price);
            };
        });
        
        const paginationDiv = document.getElementById('pagination');
        if (totalPages > 1) {
            let pages = '';
            for (let i = 1; i <= totalPages; i++) {
                pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            paginationDiv.innerHTML = pages;
        } else { paginationDiv.innerHTML = ''; }
    }
    
    function goToPage(page) { currentPage = page; renderProducts(); window.scrollTo({ top: 400, behavior: 'smooth' }); }
    
    function loadBestSellers() {
        const section = document.getElementById('bestSellersSection');
        const grid = document.getElementById('bestSellersGrid');
        if (!section || !grid) return;
        const sorted = [...products].sort((a, b) => (b.sales || 0) - (a.sales || 0)).slice(0, 4);
        if (sorted.length > 0) {
            section.style.display = 'block';
            grid.innerHTML = sorted.map((p, index) => {
                const name = currentLang === 'ar' ? (p.nameAr || p.name) : (p.nameEn || p.name);
                return `
                    <div class="best-seller-card" onclick="document.getElementById('product-${p.id}')?.scrollIntoView({behavior:'smooth'})">
                        <div class="best-seller-rank">${index + 1}</div>
                        <img src="${p.image || 'https://via.placeholder.com/70'}" onerror="this.src='https://via.placeholder.com/70'">
                        <div class="name">${escapeHtml(name)}</div>
                        <div class="sales">${p.sales || 0} ${currentLang === 'ar' ? 'مبيعات' : 'Sales'}</div>
                    </div>
                `;
            }).join('');
        }
    }
    
    function showTermsForProduct(productId, productName, productPrice) {
        pendingOrderProduct = { id: productId, name: productName, price: parseFloat(productPrice) };
        document.getElementById('termsModal').style.display = 'flex';
        document.getElementById('termsCheck').checked = false;
        document.getElementById('acceptTermsBtn').classList.remove('enabled');
    }
    
    function redirectToWhatsApp(product) {
        if (!product) return;
        const msg = `مرحباً xnesto، أرغب في شراء:\n\n📦 المنتج: ${product.name}\n💰 السعر: ${product.price} ر.ع\n\n✅ لقد قرأت الشروط وأوافق عليها.`;
        window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
    }
    
    function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    function setView(view) { 
        document.body.classList.remove('view-mobile', 'view-desktop'); 
        document.body.classList.add('view-' + view); 
        document.querySelectorAll('.device-btn').forEach(btn => btn.classList.remove('active'));
        if (event?.currentTarget) event.currentTarget.classList.add('active');
    }
    
    function toggleMode() { 
        document.body.classList.toggle('light-mode'); 
        const btn = document.querySelector('.mode-toggle-btn'); 
        btn.innerHTML = document.body.classList.contains('light-mode') ? '🌞 نهاري' : '🌙 ليلي';
        localStorage.setItem('store_mode', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    
    // ==================== Firebase والإعدادات ====================
    let firebaseInitialized = false;
    let productsRef = null;
    
    function initFirebase() {
        try {
            const firebaseConfig = { databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            
            const database = firebase.database();
            productsRef = database.ref('products');
            
            const timeoutId = setTimeout(() => {
                if (!firebaseInitialized) {
                    console.log("Firebase timeout - using local products");
                    firebaseInitialized = true;
                }
            }, 3000);
            
            // الاستماع للتغييرات في Firebase (تحديث فوري)
            productsRef.on('value', (snapshot) => {
                clearTimeout(timeoutId);
                const data = snapshot.val();
                if (data && Array.isArray(data) && data.length > 0) {
                    products = data.sort((a, b) => (a.order || 0) - (b.order || 0));
                    firebaseInitialized = true;
                    console.log('✅ تم تحديث المنتجات من Firebase');
                    renderProducts();
                    loadBestSellers();
                    renderTabs();
                }
            }, (error) => {
                clearTimeout(timeoutId);
                console.log("Firebase error:", error);
            });
            
        } catch (error) {
            console.log("Firebase initialization failed:", error);
        }
    }
    
    function displayProductsImmediately() {
        // عرض المنتجات المحلية فوراً
        products = JSON.parse(JSON.stringify(allDefaultProducts));
        renderTabs();
        renderProducts();
        loadBestSellers();
        updateUILanguage(currentLang);
        
        // تهيئة Firebase في الخلفية
        setTimeout(() => {
            initFirebase();
        }, 100);
    }
    
    // ==================== تهيئة الصفحة ====================
    if (localStorage.getItem('store_mode') === 'light') {
        document.body.classList.add('light-mode');
        document.querySelector('.mode-toggle-btn').innerHTML = '🌞 نهاري';
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); currentPage = 1; renderProducts(); });
    document.getElementById('acceptTermsBtn').onclick = () => {
        if (!document.getElementById('termsCheck').checked) { alert('يرجى الموافقة على الشروط'); return; }
        if (pendingOrderProduct) { redirectToWhatsApp(pendingOrderProduct); document.getElementById('termsModal').style.display = 'none'; pendingOrderProduct = null; }
    };
    document.getElementById('declineTermsBtn').onclick = () => { document.getElementById('termsModal').style.display = 'none'; pendingOrderProduct = null; };
    
    displayProductsImmediately();
    
    window.goToPage = goToPage;
    window.setLang = setLang;
    window.setCurrency = setCurrency;
    window.setCategory = setCategory;
    window.setView = setView;
    window.toggleMode = toggleMode;
</script>
