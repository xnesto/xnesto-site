<!-- 
  هذا هو ملف index.html المحدث. 
  لقد قمت بتعديل جزء الـ Script في الأسفل ليقوم بجلب المنتجات من ملف products.json.
-->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <!-- ... (نفس كود الـ head الأصلي) ... -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- (يرجى نسخ جميع أكواد CSS الأصلية هنا) -->
</head>
<body>
  <!-- ... (نفس كود الـ body الأصلي حتى بداية الـ script) ... -->

<script>
  // --- الجزء المحدث للتعامل مع ملف البيانات الخارجي ---
  
  let products = [];
  let categories = ["games", "giftcards"];
  let categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
  let nextId = 1;
  let currentUser = { type: "guest", name: "زائر" };
  // ... (باقي المتغيرات التعريفية الأصلية) ...
  const ADMIN_PASSWORD = "ssp1995";
  const WA_NUMBER = "96879977100";

  // دالة لجلب البيانات من ملف JSON الخارجي
  async function fetchExternalProducts() {
    try {
      const response = await fetch('products.json');
      if (!response.ok) throw new Error('Could not fetch products.json');
      const data = await response.json();
      
      // دمج المنتجات من الملف
      const allProducts = [...data.games, ...data.giftcards];
      
      // التحقق من الإصدار لتحديث التخزين المحلي عند العميل
      const savedVersion = localStorage.getItem("xnesto_version");
      if (savedVersion !== data.version) {
        products = allProducts;
        localStorage.setItem("xnesto_version", data.version);
        saveToLocal(); // حفظ النسخة الجديدة في متصفح العميل
      } else {
        // إذا كان نفس الإصدار، نأخذ ما هو مخزن في المتصفح (في حال أضاف العميل شيئاً لنفسه)
        const saved = localStorage.getItem("xnesto_products");
        products = saved ? JSON.parse(saved) : allProducts;
      }
      
      renderProducts(); // عرض المنتجات بعد الجلب
    } catch (error) {
      console.error('Error loading products:', error);
      // في حال فشل الجلب، نعتمد على ما هو مخزن محلياً
      loadFromLocal();
    }
  }

  // استبدل دالة loadFromLocal الأصلية أو استدعِ fetchExternalProducts في البداية
  window.onload = () => {
    fetchExternalProducts();
    // ... باقي استدعاءات onload الأصلية ...
  };

  function saveToLocal() { 
    localStorage.setItem("xnesto_products", JSON.stringify(products)); 
  }
  
  // (باقي دوال الموقع الأصلية كما هي دون تغيير)
</script>
</body>
</html>
