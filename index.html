<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>XNESTO STORE – PS4/PS5 Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #ffaa44; --bg: #0a0a1a; --card: #11152b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); font-family: 'Cairo', sans-serif; color: #f0f0ff; padding: 1rem; min-height: 100vh; }
        
        .hero { text-align: center; background: linear-gradient(135deg, #0f0f2a, #1a1a3a); border-radius: 2rem; padding: 2rem; border: 1px solid rgba(255,170,68,0.3); margin-bottom: 2rem; }
        .logo { font-size: 2.5rem; font-weight: 900; background: linear-gradient(135deg, #ffcc88, #ffaa44); -webkit-background-clip: text; color: transparent; }
        
        .search-box { background: rgba(30,30,58,0.6); border-radius: 50px; padding: 12px 25px; border: 1px solid rgba(255,170,68,0.3); display: flex; align-items: center; max-width: 600px; margin: 0 auto 2rem auto; }
        .search-box input { background: transparent; border: none; color: white; width: 100%; font-size: 1rem; outline: none; margin: 0 10px; }
        
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 2rem; flex-wrap: wrap; }
        .tab-btn { background: #1e1e3a; border: 1px solid rgba(255,170,68,0.2); color: #ccc; padding: 8px 20px; border-radius: 50px; cursor: pointer; font-weight: 700; }
        .tab-btn.active { background: var(--primary); color: #0a0a1a; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; max-width: 1400px; margin: 0 auto; }
        @media (max-width: 640px) { .grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; } }
        
        .card { background: var(--card); border-radius: 1.5rem; overflow: hidden; border: 1px solid rgba(255,170,68,0.15); transition: 0.3s; display: flex; flex-direction: column; position: relative; }
        .img { height: 180px; background-size: cover; background-position: center; position: relative; }
        .badge { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: var(--primary); padding: 3px 10px; border-radius: 50px; font-size: 0.7rem; font-weight: 700; }
        .out-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-10deg); background: #ff4444; color: white; padding: 5px 15px; border-radius: 50px; font-weight: 900; z-index: 10; border: 2px solid white; }

        .info { padding: 1rem; flex-grow: 1; text-align: center; }
        .title { font-size: 0.9rem; font-weight: 800; margin-bottom: 10px; height: 2.8em; overflow: hidden; }
        
        .prices { background: rgba(255,255,255,0.03); padding: 8px; border-radius: 12px; margin-bottom: 10px; font-size: 0.7rem; }
        .p-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .p-val { font-weight: 900; color: var(--primary); }
        .p-val.green { color: #00cc88; }
        .p-val.blue { color: #00aaff; }

        .btn-order { background: linear-gradient(135deg, var(--primary), #ff8844); color: #0a0a1a; border: none; padding: 10px; border-radius: 12px; font-weight: 800; cursor: pointer; width: 100%; }
        .btn-order.disabled { background: #444; color: #888; cursor: not-allowed; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); align-items: center; justify-content: center; z-index: 9999; padding: 1rem; }
        .modal-content { background: var(--card); border-radius: 1.5rem; padding: 1.5rem; border: 2px solid var(--primary); width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; }
        
        .opt-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin: 1.5rem 0; }
        .opt-card { background: #1e1e3a; border: 2px solid rgba(255,170,68,0.2); border-radius: 1rem; padding: 10px; cursor: pointer; text-align: center; }
        .opt-card.active { border-color: var(--primary); background: rgba(255,170,68,0.1); }
        
        .table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: 0.75rem; color: #ccc; }
        .table th, .table td { padding: 8px; border-bottom: 1px solid rgba(255,170,68,0.1); text-align: center; }
        
        .guide { background: rgba(255,255,255,0.05); border-radius: 1rem; padding: 1rem; margin-top: 1rem; border: 1px solid rgba(255,170,68,0.2); font-size: 0.8rem; }
        .actions { display: flex; gap: 10px; margin-top: 1.5rem; }
        .btn-c { background: #444; color: white; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; flex: 1; }
        .btn-a { background: var(--primary); color: #0a0a1a; border: none; padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: bold; flex: 1; }
    </style>
</head>
<body>

<div class="hero">
    <div class="logo">XNESTO STORE</div>
    <p style="color:#ffdd99; margin-top:10px;">تسجيل حساب فوري - استلم خلال دقائق</p>
</div>

<div class="search-box">
    <i class="fas fa-search" style="color:var(--primary);"></i>
    <input type="text" id="searchIn" placeholder="ابحث عن لعبة أو بطاقة..." oninput="render()">
</div>

<div id="tabs" class="tabs"></div>
<div id="grid" class="grid"></div>

<div id="modal" class="modal">
    <div class="modal-content">
        <h3 id="mTitle" style="text-align:center; color:var(--primary);"></h3>
        <div id="gameLicense">
            <p style="text-align:center; margin:10px 0; font-size:0.8rem; color:#aaa;">يرجى اختيار نوع النسخة المطلوبة:</p>
            <div class="opt-grid">
                <div class="opt-card active" id="opt-p" onclick="select('primary')">
                    <div style="font-size:0.8rem;">أساسية PS5</div>
                    <div id="mPriceP" style="font-weight:900; color:var(--primary);"></div>
                </div>
                <div class="opt-card" id="opt-s" onclick="select('secondary')">
                    <div style="font-size:0.8rem;">ثانوية PS5</div>
                    <div id="mPriceS" style="font-weight:900; color:var(--primary);"></div>
                </div>
                <div class="opt-card" id="opt-ps4" onclick="select('ps4')">
                    <div style="font-size:0.8rem;">نسخة PS4</div>
                    <div id="mPricePS4" style="font-weight:900; color:var(--primary);"></div>
                </div>
            </div>
            <table class="table">
                <thead><tr><th>الميزة</th><th>أساسية</th><th>ثانوية</th><th>PS4</th></tr></thead>
                <tbody>
                    <tr><td>اللعب بحسابك الخاص</td><td>✅</td><td>❌</td><td>✅</td></tr>
                    <tr><td>اللعب بدون إنترنت</td><td>✅</td><td>❌</td><td>✅</td></tr>
                    <tr><td>تجميع التروفيز</td><td>✅</td><td>❌</td><td>✅</td></tr>
                </tbody>
            </table>
            <div class="guide">
                <h4 style="color:var(--primary); margin-bottom:5px;">ℹ️ شرح التفعيل:</h4>
                <p id="guideTxt"></p>
            </div>
        </div>
        <div class="guide">
            <h4 style="color:var(--primary); margin-bottom:5px;">📋 شروط المتجر:</h4>
            <ul id="termsList" style="padding-right:20px; font-size:0.75rem; color:#ccc;"></ul>
        </div>
        <div class="actions">
            <button onclick="closeM()" class="btn-c">إلغاء</button>
            <button onclick="order()" class="btn-a">تأكيد واتساب</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], categories = {}, settings = {}, curCat = 'all', selProd = null, selType = 'primary';

    function init() {
        db.ref('categories').on('value', s => { categories = s.val() || {}; renderTabs(); });
        db.ref('products').on('value', s => { products = s.val() || []; render(); });
        db.ref('settings').on('value', s => {
            settings = s.val() || {};
            document.getElementById('termsList').innerHTML = (settings.terms || "").split('\n').map(t => `<li>${t}</li>`).join('');
        });
    }

    function renderTabs() {
        const t = document.getElementById('tabs');
        let h = `<button class="tab-btn ${curCat==='all'?'active':''}" onclick="setCat('all')">🔥 الكل</button>`;
        Object.entries(categories).forEach(([k, v]) => {
            h += `<button class="tab-btn ${curCat===k?'active':''}" onclick="setCat('${k}')">${v}</button>`;
        });
        t.innerHTML = h;
    }

    function render() {
        const g = document.getElementById('grid');
        const q = document.getElementById('searchIn').value.toLowerCase();
        const filtered = products.filter(p => p.nameAr.toLowerCase().includes(q) && (curCat==='all' || p.category===curCat));

        g.innerHTML = filtered.map(p => {
            const out = p.stock <= 0;
            const isGame = p.category === 'games';
            const p1 = p.pricePrimary || p.priceOMR;
            const p2 = p.priceSecondary || (p.priceOMR * 0.6).toFixed(1);
            const p3 = p.pricePS4 || (p.priceOMR * 0.7).toFixed(1);

            let prices = isGame ? `
                <div class="prices">
                    <div class="p-row"><span>أساسية PS5:</span><span class="p-val green">${p1} ر.ع</span></div>
                    <div class="p-row"><span>ثانوية PS5:</span><span class="p-val">${p2} ر.ع</span></div>
                    <div class="p-row"><span>نسخة PS4:</span><span class="p-val blue">${p3} ر.ع</span></div>
                </div>` : `<div class="prices" style="font-size:1.1rem; font-weight:900; color:var(--primary);">${p.priceOMR} ر.ع</div>`;

            return `
                <div class="card">
                    ${out ? `<div class="out-badge">نفذت الكمية</div>` : ''}
                    <div class="img" style="background-image:url('${p.image}')">
                        <div class="badge">${categories[p.category] || ''}</div>
                    </div>
                    <div class="info">
                        <div class="title">${p.nameAr}</div>
                        ${prices}
                        <button class="btn-order ${out?'disabled':''}" onclick="${out?'':'openM(\''+p.id+'\')'}">اطلب الآن</button>
                    </div>
                </div>`;
        }).join('');
    }

    function openM(id) {
        selProd = products.find(p => p.id == id);
        document.getElementById('mTitle').innerText = selProd.nameAr;
        if (selProd.category === 'games') {
            document.getElementById('gameLicense').style.display = 'block';
            document.getElementById('mPriceP').innerText = (selProd.pricePrimary || selProd.priceOMR) + " ر.ع";
            document.getElementById('mPriceS').innerText = (selProd.priceSecondary || (selProd.priceOMR * 0.6).toFixed(1)) + " ر.ع";
            document.getElementById('mPricePS4').innerText = (selProd.pricePS4 || (selProd.priceOMR * 0.7).toFixed(1)) + " ر.ع";
            select('primary');
        } else document.getElementById('gameLicense').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function select(t) {
        selType = t;
        ['p','s','ps4'].forEach(x => document.getElementById('opt-'+x).classList.toggle('active', x === t));
        const guides = {
            primary: "الأساسية PS5: فعل الحساب كجهاز رئيسي لكي تلعب من حسابك الخاص وتجمع التروفيز على جهاز PS5.",
            secondary: "الثانوية PS5: العب من حساب المتجر مباشرة (يتطلب إنترنت دائماً) ولا تفعله كجهاز رئيسي.",
            ps4: "نسخة PS4: فعل الحساب كجهاز رئيسي على PS4 لكي تلعب من حسابك الخاص وتجمع التروفيز."
        };
        document.getElementById('guideTxt').innerText = guides[t];
    }

    function order() {
        let type = "طلب";
        let price = selProd.priceOMR;
        if (selProd.category === 'games') {
            const types = { primary: "أساسية PS5", secondary: "ثانوية PS5", ps4: "نسخة PS4" };
            type = types[selType];
            price = selType === 'primary' ? (selProd.pricePrimary || selProd.priceOMR) : (selType === 'secondary' ? (selProd.priceSecondary || (selProd.priceOMR * 0.6).toFixed(1)) : (selProd.pricePS4 || (selProd.priceOMR * 0.7).toFixed(1)));
        }
        const msg = `🛒 طلب شراء جديد\n🎮 المنتج: ${selProd.nameAr}\n📂 النوع: ${type}\n💰 السعر: ${price} ر.ع\n━━━━━━━━━━━━\n✅ أوافق على شروط المتجر.`;
        window.open(`https://wa.me/${settings.whatsapp || '96879977100'}?text=${encodeURIComponent(msg)}`, '_blank');
        closeM();
    }

    function closeM() { document.getElementById('modal').style.display = 'none'; }
    function setCat(c) { curCat = c; renderTabs(); render(); }
    init();
</script>
</body>
</html>
