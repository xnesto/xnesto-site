<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>xnesto – متجر الألعاب وبطاقات الشحن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', 'Segoe UI', sans-serif; }
        body { background: #0a0f1e; color: #eef5ff; line-height: 1.6; }

        /* Header مع الأيقونة الجديدة */
        .main-header {
            background: rgba(10, 15, 30, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 191, 255, 0.2);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .header-flex {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo-icon { font-size: 3.2rem; color: #00b4ff; }
        .logo h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #fff, #00b4ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo p { font-size: 0.8rem; opacity: 0.75; }

        /* التبويبات */
        .tabs-container {
            max-width: 1400px;
            margin: 1.5rem auto;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: #1e2538;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            color: #eef5ff;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #00b4ff;
            color: #0a0f1e;
        }

        /* شريط البحث */
        .search-bar {
            max-width: 1400px;
            margin: 1rem auto 2rem;
            background: #1e2538;
            padding: 12px 20px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-bar input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        /* باقي الستايل الخاص بك (المنتجات، الكروت، الإدارة...) */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 28px;
            margin: 2rem 0;
        }
        .product-card {
            background: #111827;
            border-radius: 28px;
            overflow: hidden;
            transition: 0.2s;
            border: 1px solid #1e2a44;
            padding: 1rem;
        }
        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            background: #1a1f2e;
        }
        .product-badge {
            display: inline-block;
            background: #ff5e5e;
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 40px;
            margin: 8px 0;
        }
        .price {
            font-size: 1.4rem;
            font-weight: bold;
            color: #00e0ff;
            margin: 10px 0;
        }
        .old-price {
            text-decoration: line-through;
            font-size: 0.9rem;
            opacity: 0.6;
            margin-right: 8px;
        }
        .btn-buy {
            background: #00b4ff;
            border: none;
            width: 100%;
            padding: 10px;
            border-radius: 40px;
            font-weight: bold;
            color: #0a0f1e;
            cursor: pointer;
            margin-top: 10px;
        }

        .footer {
            background: #050a15;
            padding: 2rem 0;
            margin-top: 3rem;
            border-top: 1px solid #1e2a44;
            font-size: 0.85rem;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="main-header">
    <div class="container header-flex">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
            <div>
                <h1>xnesto</h1>
                <p>متجر الألعاب وبطاقات الشحن</p>
            </div>
        </div>
        <div class="header-actions">
            <button class="btn-outline-light" id="cartBtn">🛒 السلة (0)</button>
            <button class="btn-outline-light" id="adminModeBtn">🔐 إدارة</button>
        </div>
    </div>
</div>

<!-- شريط البحث -->
<div class="container">
    <div class="search-bar">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن لعبة أو بطاقة شحن...">
    </div>
</div>

<!-- التبويبات -->
<div class="tabs-container">
    <button class="tab-btn active" data-tab="all">الكل</button>
    <button class="tab-btn" data-tab="games">🎮 ألعاب PS4/PS5</button>
    <button class="tab-btn" data-tab="cards">💳 بطاقات شحن</button>
    <button class="tab-btn" data-tab="offers">🔥 عروض وتخفيضات</button>
</div>

<div class="container">
    <div id="productsContainer" class="products-grid">
        <!-- يتم ملؤها بواسطة JavaScript -->
    </div>
</div>

<div class="footer">
    <p>© 2025 xnesto – جميع الحقوق محفوظة | ألعاب رقمية | شحن فوري</p>
    <p>📞 واتساب: +968 7997 7100</p>
</div>

<script>
    // قاعدة المنتجات (يمكنك تعديلها)
    let products = [
        { id: 1, name: "Assassin's Creed Shadows", img: "https://images.unsplash.com/photo-1611996575749-79a3a250f948?w=300", desc: "🏷️ الحجم: 65GB | 🎮 عربي/إنجليزي", price: 14, oldPrice: 20, category: "games", badge: "🔥 خصم 30%" },
        { id: 2, name: "Call of Duty: Black Ops 6", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=300", desc: "🏷️ الحجم: 120GB | 🎮 إنجليزي", price: 22, oldPrice: 30, category: "games", badge: "🔥 خصم 27%" },
        { id: 3, name: "Grand Theft Auto VI", img: "https://images.unsplash.com/photo-1551103782-8ab07afd45c1?w=300", desc: "🏷️ الحجم: 150GB | 🌍 عالم مفتوح", price: 6, oldPrice: 10, category: "games", badge: "🔥 خصم 40%" },
        // أضف باقي المنتجات هنا...
    ];

    let currentFilter = "all";

    function renderProducts() {
        const container = document.getElementById("productsContainer");
        container.innerHTML = "";

        let filtered = products.filter(p => currentFilter === "all" ? true : p.category === currentFilter);

        filtered.forEach(p => {
            const card = document.createElement("div");
            card.className = "product-card";
            card.innerHTML = `
                <img class="product-img" src="\( {p.img}" alt=" \){p.name}">
                \( {p.badge ? `<div class="product-badge"> \){p.badge}</div>` : ''}
                <h3>${p.name}</h3>
                <p>${p.desc}</p>
                <div class="price">
                    ${p.price} ر.ع
                    \( {p.oldPrice ? `<span class="old-price"> \){p.oldPrice} ر.ع</span>` : ''}
                </div>
                <button class="btn-buy">📲 اطلب الآن</button>
            `;
            container.appendChild(card);
        });
    }

    // تبديل التبويبات
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-tab');
            renderProducts();
        });
    });

    // تهيئة الصفحة
    renderProducts();
</script>

</body>
</html>
