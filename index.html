<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>xnesto – متجر الألعاب وبطاقات الشحن | PS4/PS5</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    /* كل الـ CSS الأصلي موجود - لم أغير أي شيء في التصميم */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #0a0a1a 100%);
      font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
      color: #f0f0ff;
      padding: 1.5rem;
      min-height: 100vh;
    }
    
    .header {
      text-align: center;
      background: linear-gradient(135deg, #0f0f2a, #0a0a1f);
      padding: 0.5rem 1rem 1.5rem;
      border-radius: 1.5rem;
      margin-bottom: 1.5rem;
      border: 1px solid rgba(255, 170, 68, 0.3);
    }
    .header h1 {
      font-size: 2.5rem;
      background: linear-gradient(135deg, #ffaa44, #ffcc88, #ffaa44);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .header p { color: #ffdd99; font-size: 0.9rem; }
    
    .control-bar {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      background: rgba(15, 15, 42, 0.8);
      backdrop-filter: blur(10px);
      padding: 10px 20px;
      border-radius: 50px;
      border: 1px solid rgba(255, 170, 68, 0.2);
    }
    .lang-switch {
      display: flex;
      gap: 8px;
      background: #1e1e3a;
      padding: 4px;
      border-radius: 40px;
    }
    .lang-btn {
      background: transparent;
      border: none;
      padding: 6px 16px;
      border-radius: 40px;
      color: #ccc;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .lang-btn.active { background: #ffaa44; color: #0a0a1a; }
    .currency-selector {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e1e3a;
      padding: 4px 12px;
      border-radius: 40px;
    }
    #currencySelect {
      background: #0a0c1a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 5px 10px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.8rem;
    }
    .user-badge {
      background: #1e1e3a;
      padding: 6px 14px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #ffaa66;
      font-size: 0.8rem;
    }
    .login-btn, .logout-btn {
      background: #2d2f6e;
      border: none;
      color: #ffaa66;
      padding: 6px 14px;
      border-radius: 40px;
      cursor: pointer;
      font-size: 0.8rem;
    }
    
    .admin-add-section {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      background: rgba(15, 15, 42, 0.9);
      border-radius: 1rem;
      border: 2px solid #ffaa44;
      overflow: hidden;
      display: none;
    }
    .admin-add-section.active { display: block; }
    .admin-add-header {
      background: #ffaa44;
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .admin-add-header h3 { color: #0a0a1a; font-size: 1rem; margin: 0; }
    .admin-add-body {
      padding: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .admin-add-body input, .admin-add-body select, .admin-add-body textarea {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 30px;
      padding: 8px 12px;
      color: white;
      font-size: 0.8rem;
      flex: 1;
      min-width: 150px;
    }
    .admin-add-body textarea { min-width: 200px; border-radius: 15px; }
    
    .image-upload-area {
      background: #1e1e3a;
      border: 2px dashed #ffaa44;
      border-radius: 1rem;
      padding: 0.8rem;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
      flex: 1;
      min-width: 150px;
    }
    .image-upload-area:hover { background: #2d2f6e; }
    .image-upload-area input { display: none; }
    .image-preview {
      margin-top: 8px;
      max-width: 100%;
      max-height: 80px;
      border-radius: 8px;
      display: none;
      object-fit: contain;
    }
    .btn-add-product {
      background: #00cc88;
      border: none;
      padding: 8px 20px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
    }
    
    .search-bar-container {
      max-width: 1400px;
      margin: 0 auto 1rem auto;
      background: rgba(15, 15, 42, 0.8);
      padding: 8px 20px;
      border-radius: 50px;
    }
    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1e1e3a;
      padding: 5px 15px;
      border-radius: 40px;
    }
    #searchInput {
      flex: 1;
      background: transparent;
      border: none;
      padding: 10px 0;
      color: white;
      outline: none;
    }
    .search-results-count {
      background: #2d2f6e;
      padding: 4px 10px;
      border-radius: 30px;
      font-size: 0.7rem;
      color: #ffaa66;
    }
    
    .tabs-container {
      max-width: 1400px;
      margin: 0 auto 2rem auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .tab-btn {
      background: #1e1e3a;
      border: 1px solid rgba(255,170,68,0.3);
      padding: 10px 24px;
      border-radius: 40px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.2s;
      font-size: 0.9rem;
    }
    .tab-btn.active { background: #ffaa44; color: #0a0a1a; border-color: #ffaa44; }
    .tab-btn:hover { border-color: #ffaa44; }
    
    .products-grid {
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
    }
    .product-card {
      background: #11152b;
      border-radius: 1rem;
      overflow: hidden;
      transition: 0.3s;
      border: 1px solid rgba(255, 170, 68, 0.2);
    }
    .product-card:hover { transform: translateY(-4px); border-color: #ffaa44; }
    .discount-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: #ff4444;
      color: white;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: bold;
      z-index: 2;
    }
    .product-image {
      width: 100%;
      height: 180px;
      background-size: cover;
      background-position: center;
      position: relative;
      background-color: #1e1e3a;
    }
    .product-badge {
      position: absolute;
      bottom: 8px;
      right: 8px;
      background: rgba(0,0,0,0.7);
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.65rem;
    }
    .card-info { padding: 1rem; }
    .product-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; text-align: center; }
    .product-details {
      font-size: 0.7rem;
      color: #b9c5f0;
      text-align: center;
      margin: 8px 0;
    }
    .price-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin: 10px 0;
    }
    .old-price { font-size: 0.8rem; color: #888; text-decoration: line-through; }
    .price { font-size: 1.3rem; font-weight: bold; color: #ffaa44; }
    .btn-wa {
      width: 100%;
      background: #25D366;
      border: none;
      padding: 8px;
      border-radius: 40px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      font-size: 0.85rem;
    }
    
    /* قسم تعديل الأدمن - مع إضافة حقل رابط الصورة */
    .admin-edit-section {
      background: #0a0c1a;
      border-top: 1px solid #2a2f55;
      padding: 0.8rem;
      margin-top: 0.5rem;
    }
    .admin-edit-section h4 {
      font-size: 0.7rem;
      color: #ffaa66;
      margin-bottom: 8px;
    }
    .edit-price-row, .edit-image-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }
    .edit-price-row input, .edit-image-row input {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 30px;
      padding: 6px 10px;
      flex: 1;
      color: white;
    }
    .edit-price-row input { width: 90px; flex: none; }
    /* حقل رابط الصورة */
    .edit-image-url-row {
      margin-bottom: 8px;
    }
    .edit-image-url-row input {
      width: 100%;
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      border-radius: 30px;
      padding: 8px 12px;
      color: white;
      font-size: 0.75rem;
    }
    .save-edit-btn {
      background: #00cc88;
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      font-size: 0.75rem;
      margin-top: 8px;
    }
    .delete-product-btn {
      background: #ff4444;
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      font-weight: bold;
      width: 100%;
      margin-top: 6px;
      font-size: 0.75rem;
    }
    
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 1.5rem;
      flex-wrap: wrap;
    }
    .page-btn {
      background: #1e1e3a;
      border: 1px solid #ffaa44;
      color: #ffdd99;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
    }
    .page-btn.active { background: #ffaa44; color: #0a0a1a; }
    
    .footer {
      text-align: center;
      margin-top: 2rem;
      padding: 1.5rem;
      color: #6f7bb3;
      border-top: 1px solid rgba(255, 170, 68, 0.2);
    }
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #25D366;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      color: white;
      text-decoration: none;
      z-index: 999;
    }
    @media (max-width: 640px) {
      body { padding: 0.5rem; }
      .products-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
      .product-image { height: 130px; }
      .product-title { font-size: 0.85rem; }
      .price { font-size: 1rem; }
    }
  </style>
</head>
<body>

<!-- شريط اختيار الجهاز -->
<div class="device-bar" style="background:#07071a;border-bottom:1px solid rgba(255,170,68,0.2);padding:6px 16px;display:flex;justify-content:center;gap:6px;position:sticky;top:0;z-index:9999;">
  <button class="device-btn active" onclick="setView('mobile')"><i class="fas fa-mobile-alt"></i> جوال</button>
  <button class="device-btn" onclick="setView('desktop')"><i class="fas fa-desktop"></i> كمبيوتر</button>
  <button class="mode-toggle-btn" onclick="toggleMode()">🌙 ليلي</button>
</div>

<div class="header">
  <h1>🎮 XNESTO STORE 🎮</h1>
  <p>أكبر متجر لألعاب PlayStation وبطاقات الشحن - توصيل فوري</p>
</div>

<div class="control-bar">
  <div class="lang-switch">
    <button class="lang-btn active" data-lang="ar" onclick="setLang('ar')">🇸🇦 العربية</button>
    <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧 English</button>
  </div>
  <div class="currency-selector">
    <label><i class="fas fa-coins"></i> <span id="currencyLabel">العملة:</span></label>
    <select id="currencySelect" onchange="setCurrency(this.value)">
      <option value="OMR">ريال عماني (OMR)</option>
      <option value="USD">دولار أمريكي (USD)</option>
      <option value="SAR">ريال سعودي (SAR)</option>
      <option value="AED">درهم إماراتي (AED)</option>
    </select>
  </div>
  <div class="auth-buttons" id="authButtons">
    <button class="login-btn" onclick="toggleAdmin()"><i class="fas fa-user-shield"></i> إدارة</button>
  </div>
</div>

<div id="adminAddSection" class="admin-add-section">
  <div class="admin-add-header">
    <h3><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h3>
    <span><i class="fas fa-lock-open"></i> وضع الإدارة</span>
  </div>
  <div class="admin-add-body">
    <input type="text" id="newNameAr" placeholder="الاسم بالعربية">
    <input type="text" id="newNameEn" placeholder="Name in English">
    <select id="newCategorySelect">
      <option value="games">🎮 ألعاب PS4/PS5</option>
      <option value="giftcards">💳 بطاقات شحن</option>
    </select>
    <input type="number" id="newPrice" step="0.5" placeholder="السعر (ر.ع)">
    <input type="text" id="newImageUrl" placeholder="رابط الصورة (URL)">
    <textarea id="newDetails" rows="2" placeholder="تفاصيل المنتج"></textarea>
    <input type="number" id="newDiscount" step="1" placeholder="نسبة الخصم %">
    <button id="addProductBtn" class="btn-add-product"><i class="fas fa-plus"></i> إضافة المنتج</button>
  </div>
</div>

<div class="search-bar-container">
  <div class="search-box">
    <i class="fas fa-search"></i>
    <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج...">
    <span class="search-results-count" id="searchCount">0</span>
  </div>
</div>

<div class="tabs-container" id="tabsContainer">
  <button class="tab-btn active" onclick="setCategory('all')">🎮 جميع المنتجات</button>
  <button class="tab-btn" onclick="setCategory('games')">🎮 ألعاب PS4/PS5</button>
  <button class="tab-btn" onclick="setCategory('giftcards')">💳 بطاقات شحن</button>
</div>

<div id="productsContainer" class="products-grid"></div>
<div class="pagination" id="paginationContainer"></div>

<div class="footer">
  <div class="social-icons">
    <i class="fab fa-instagram"></i> <span id="instagramText">xnesto_store</span>
    <i class="fab fa-whatsapp"></i> <span id="whatsappText">+96879977100</span>
  </div>
  <p>© 2025 xnesto - جميع الحقوق محفوظة</p>
</div>

<a href="https://wa.me/96879977100" class="whatsapp-float" target="_blank">
  <i class="fab fa-whatsapp"></i>
</a>

<script>
  let products = [];
  let currentLang = 'ar';
  let currentCurrency = 'OMR';
  let adminMode = false;
  let currentPage = 1;
  let currentCategory = 'all';
  let searchQuery = '';
  const ITEMS_PER_PAGE = 12;
  const ADMIN_PASSWORD = "ssp1995";
  const WA_NUMBER = "96879977100";
  
  const exchangeRates = { OMR: 1, USD: 2.6, SAR: 9.75, AED: 9.55 };
  const currencySymbols = { OMR: 'ر.ع', USD: '$', SAR: 'ر.س', AED: 'د.إ' };
  
  // المنتجات الافتراضية
  const defaultProducts = [
    { id: 1, nameAr: "Assassin's Creed Shadows", nameEn: "Assassin's Creed Shadows", category: "games", price: 14, oldPrice: 20, image: "https://i.imgur.com/7wq4k9C.png", descAr: "🏷️ الحجم: 65GB | 🎮 اللغة: عربية/إنجليزية", descEn: "📦 Size: 65GB | 🎮 Language: Arabic/English" },
    { id: 2, nameAr: "Call of Duty: Black Ops 6", nameEn: "Call of Duty: Black Ops 6", category: "games", price: 22, oldPrice: 30, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2933620/header.jpg", descAr: "🏷️ الحجم: 120GB | 🎮 اللغة: إنجليزية", descEn: "📦 Size: 120GB | 🎮 Language: English" },
    { id: 3, nameAr: "Grand Theft Auto VI", nameEn: "Grand Theft Auto VI", category: "games", price: 6, oldPrice: 10, image: "https://media-rockstargames-com.akamaized.net/rockstargames-newsite/img/global/downloads/gtavi/gtavi_cover_ps5.jpg", descAr: "🏷️ الحجم: 150GB | 🌍 عالم مفتوح", descEn: "📦 Size: 150GB | 🌍 Open World" },
    { id: 4, nameAr: "God of War Ragnarök", nameEn: "God of War Ragnarök", category: "games", price: 10, oldPrice: 15, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2322010/header.jpg", descAr: "🏷️ الحجم: 85GB | 🪓 ملحمة إسكندنافية", descEn: "📦 Size: 85GB | 🪓 Norse Saga" },
    { id: 5, nameAr: "Spider-Man 2", nameEn: "Spider-Man 2", category: "games", price: 16, oldPrice: 22, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2651280/header.jpg", descAr: "🏷️ الحجم: 98GB | 🕷️ بيتر + مايلز", descEn: "📦 Size: 98GB | 🕷️ Peter + Miles" },
    { id: 6, nameAr: "بطاقة شحن أمريكي", nameEn: "US Gift Card", category: "giftcards", price: 5, oldPrice: 6, image: "", descAr: "الفئات: 10$ | 25$ | 50$ | 100$", descEn: "Values: 10$ | 25$ | 50$ | 100$" },
    { id: 7, nameAr: "بطاقة شحن سعودي", nameEn: "Saudi Gift Card", category: "giftcards", price: 4.5, oldPrice: 5.5, image: "", descAr: "الفئات: 50ر.س | 100ر.س | 200ر.س", descEn: "Values: 50 SAR | 100 SAR | 200 SAR" },
    { id: 8, nameAr: "بطاقة شحن عماني", nameEn: "Oman Gift Card", category: "giftcards", price: 5, oldPrice: 6, image: "", descAr: "الفئات: 5ر.ع | 10ر.ع | 20ر.ع", descEn: "Values: 5 OMR | 10 OMR | 20 OMR" }
  ];
  
  function loadProducts() {
    const saved = localStorage.getItem('xnesto_products');
    if (saved) {
      products = JSON.parse(saved);
    } else {
      products = JSON.parse(JSON.stringify(defaultProducts));
      saveProducts();
    }
  }
  
  function saveProducts() {
    localStorage.setItem('xnesto_products', JSON.stringify(products));
    renderProducts();
  }
  
  function formatPrice(price) {
    return `${currencySymbols[currentCurrency]} ${(price * exchangeRates[currentCurrency]).toFixed(2)}`;
  }
  
  function getFilteredProducts() {
    let filtered = [...products];
    if (searchQuery.trim()) {
      const query = searchQuery.toLowerCase();
      filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(query) || p.nameEn.toLowerCase().includes(query));
    }
    if (currentCategory !== 'all') {
      filtered = filtered.filter(p => p.category === currentCategory);
    }
    return filtered;
  }
  
  function renderProducts() {
    const filtered = getFilteredProducts();
    const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
    if (currentPage > totalPages) currentPage = 1;
    const start = (currentPage - 1) * ITEMS_PER_PAGE;
    const pageProducts = filtered.slice(start, start + ITEMS_PER_PAGE);
    
    const container = document.getElementById('productsContainer');
    container.innerHTML = pageProducts.map(p => {
      const name = currentLang === 'ar' ? p.nameAr : p.nameEn;
      const desc = currentLang === 'ar' ? p.descAr : p.descEn;
      const price = formatPrice(p.price);
      const hasDiscount = p.oldPrice && p.oldPrice > p.price;
      const oldPrice = hasDiscount ? formatPrice(p.oldPrice) : null;
      const discountPercent = hasDiscount ? Math.round((1 - p.price / p.oldPrice) * 100) : 0;
      const categoryName = p.category === 'games' ? (currentLang === 'ar' ? '🎮 ألعاب PS4/PS5' : '🎮 Games') : (currentLang === 'ar' ? '💳 بطاقات شحن' : '💳 Gift Cards');
      
      let imageHtml = '';
      if (p.image && p.image.trim()) {
        imageHtml = `<div class="product-image" style="background-image: url('${p.image}');"><div class="product-badge">${categoryName}</div></div>`;
      } else {
        imageHtml = `<div class="product-image" style="background: linear-gradient(135deg, #1e3a5f, #0f2a4a); display: flex; align-items: center; justify-content: center;"><div style="font-size: 2.5rem;">${p.category === 'games' ? '🎮' : '💳'}</div><div class="product-badge">${categoryName}</div></div>`;
      }
      
      return `
        <div class="product-card" data-id="${p.id}">
          ${hasDiscount ? `<div class="discount-badge">🔥 -${discountPercent}%</div>` : ''}
          ${imageHtml}
          <div class="card-info">
            <div class="product-title">${name}</div>
            <div class="product-details">${desc || ''}</div>
            <div class="price-container">
              ${hasDiscount ? `<span class="old-price">${oldPrice}</span>` : ''}
              <span class="price">${price}</span>
            </div>
            <button class="btn-wa" onclick="buyProduct(${p.id})">
              <i class="fab fa-whatsapp"></i> ${currentLang === 'ar' ? 'اطلب الآن' : 'Order Now'}
            </button>
          </div>
          ${adminMode ? `
            <div class="admin-edit-section">
              <h4><i class="fas fa-edit"></i> تعديل المنتج</h4>
              <div class="edit-price-row">
                <span>💰 السعر:</span>
                <input type="number" class="edit-price-input" value="${p.price}" step="0.5">
                <span>ر.ع</span>
              </div>
              <div class="edit-image-url-row">
                <span>🖼️ رابط الصورة:</span>
                <input type="text" class="edit-image-url" value="${p.image || ''}" placeholder="أدخل رابط الصورة">
              </div>
              <button class="save-edit-btn" onclick="updateProduct(${p.id}, this)">💾 حفظ التعديلات</button>
              <button class="delete-product-btn" onclick="deleteProduct(${p.id})">🗑️ حذف المنتج</button>
            </div>
          ` : ''}
        </div>
      `;
    }).join('');
    
    // Pagination
    const pagContainer = document.getElementById('paginationContainer');
    if (totalPages > 1) {
      let pagesHtml = '';
      for (let i = 1; i <= totalPages; i++) {
        pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      pagContainer.innerHTML = pagesHtml;
    } else {
      pagContainer.innerHTML = '';
    }
    document.getElementById('searchCount').innerHTML = filtered.length;
  }
  
  function goToPage(page) {
    currentPage = page;
    renderProducts();
  }
  
  function setCategory(cat) {
    currentCategory = cat;
    currentPage = 1;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderProducts();
  }
  
  function buyProduct(id) {
    const product = products.find(p => p.id === id);
    if (!product) return;
    const name = currentLang === 'ar' ? product.nameAr : product.nameEn;
    const price = formatPrice(product.price);
    const message = `🛒 طلب شراء من xnesto\n━━━━━━━━━━━━━━━━━━━━\n🎮 المنتج: ${name}\n💰 السعر: ${price}\n━━━━━━━━━━━━━━━━━━━━\n📞 يرجى تأكيد الطلب وإرسال طريقة الدفع.`;
    window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
  }
  
  // وظائف الأدمن
  function toggleAdmin() {
    const pwd = prompt('🔐 أدخل كلمة سر الأدمن:');
    if (pwd === ADMIN_PASSWORD) {
      adminMode = !adminMode;
      alert(adminMode ? '✅ وضع التعديل مفعل - يمكنك تعديل المنتجات' : '❌ تم إيقاف وضع التعديل');
      renderProducts();
    } else if (pwd !== null) {
      alert('❌ كلمة السر غير صحيحة');
    }
  }
  
  function updateProduct(id, btnElement) {
    const product = products.find(p => p.id === id);
    if (!product) return;
    
    const card = btnElement.closest('.product-card');
    const newPrice = parseFloat(card.querySelector('.edit-price-input').value);
    const newImageUrl = card.querySelector('.edit-image-url').value.trim();
    
    if (!isNaN(newPrice)) {
      product.price = newPrice;
    }
    if (newImageUrl !== undefined) {
      product.image = newImageUrl;
    }
    
    saveProducts();
    alert('✅ تم تحديث المنتج بنجاح!');
  }
  
  function deleteProduct(id) {
    if (confirm('⚠️ هل أنت متأكد من حذف هذا المنتج؟')) {
      products = products.filter(p => p.id !== id);
      saveProducts();
      alert('✅ تم حذف المنتج');
    }
  }
  
  function addNewProduct() {
    const nameAr = document.getElementById('newNameAr').value.trim();
    const nameEn = document.getElementById('newNameEn').value.trim();
    const category = document.getElementById('newCategorySelect').value;
    const price = parseFloat(document.getElementById('newPrice').value);
    const image = document.getElementById('newImageUrl').value.trim();
    const details = document.getElementById('newDetails').value.trim();
    const discount = parseFloat(document.getElementById('newDiscount').value);
    
    if (!nameAr || !nameEn || isNaN(price)) {
      alert('يرجى ملء الحقول الأساسية (الاسم والسعر)');
      return;
    }
    
    const newId = Date.now();
    const newProduct = {
      id: newId,
      nameAr, nameEn, category,
      price,
      oldPrice: (!isNaN(discount) && discount > 0) ? price / (1 - discount / 100) : null,
      image,
      descAr: details, descEn: details
    };
    
    products.push(newProduct);
    saveProducts();
    
    document.getElementById('newNameAr').value = '';
    document.getElementById('newNameEn').value = '';
    document.getElementById('newPrice').value = '';
    document.getElementById('newImageUrl').value = '';
    document.getElementById('newDetails').value = '';
    document.getElementById('newDiscount').value = '';
    
    alert('✅ تم إضافة المنتج بنجاح!');
  }
  
  function setLang(lang) {
    currentLang = lang;
    document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    renderProducts();
  }
  
  function setCurrency(currency) {
    currentCurrency = currency;
    renderProducts();
  }
  
  document.getElementById('searchInput').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    currentPage = 1;
    renderProducts();
  });
  
  document.getElementById('addProductBtn').addEventListener('click', addNewProduct);
  
  // وضع ليلي / نهاري
  function toggleMode() {
    const isLight = document.body.classList.toggle('light-mode');
    const btn = document.getElementById('modeToggleBtn');
    btn.innerHTML = isLight ? '☀️ نهاري' : '🌙 ليلي';
    localStorage.setItem('xnesto_mode', isLight ? 'light' : 'dark');
  }
  
  function setView(view) {
    document.body.classList.remove('view-mobile', 'view-desktop');
    document.body.classList.add('view-' + view);
    localStorage.setItem('xnesto_view', view);
  }
  
  const savedMode = localStorage.getItem('xnesto_mode');
  if (savedMode === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('modeToggleBtn').innerHTML = '☀️ نهاري';
  }
  
  const savedView = localStorage.getItem('xnesto_view') || 'mobile';
  setView(savedView);
  
  loadProducts();
  renderProducts();
</script>
</body>
</html>
