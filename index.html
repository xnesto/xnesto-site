    // ==================== عرض المنتجات فوراً (بدون انتظار Firebase) ====================
    function showProductsImmediately() {
        // استخدام المنتجات الافتراضية فوراً
        products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
        renderProducts();
        loadBestSellers();
        renderTabs();
    }
    
    // ==================== محاولة الاتصال بـ Firebase مع Timeout ====================
    function initFirebaseWithTimeout() {
        const firebaseConfig = { 
            databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };
        
        try {
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            const productsRef = database.ref('products');
            const categoriesRef = database.ref('categories');
            
            // تعيين مهلة 3 ثواني فقط للاتصال بقاعدة البيانات
            const timeoutId = setTimeout(() => {
                if (!firebaseLoaded) {
                    console.log("⏱️ Firebase timeout - استخدام المنتجات المحلية");
                    firebaseLoaded = true;
                }
            }, 3000);
            
            // محاولة جلب الفئات
            categoriesRef.once('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.categories && data.names) {
                    categories = data.categories;
                    categoryNames = data.names;
                    renderTabs();
                }
            }).catch(() => {});
            
            // محاولة جلب المنتجات
            productsRef.on('value', (snapshot) => {
                clearTimeout(timeoutId);
                const data = snapshot.val();
                if (data && Array.isArray(data) && data.length > 0) {
                    products = data;
                    firebaseLoaded = true;
                    console.log("✅ تم تحميل المنتجات من Firebase");
                    renderProducts();
                    loadBestSellers();
                } else {
                    if (!firebaseLoaded) {
                        products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
                        renderProducts();
                        loadBestSellers();
                    }
                }
            }, (error) => {
                console.log("⚠️ خطأ في Firebase:", error);
                clearTimeout(timeoutId);
                if (!firebaseLoaded) {
                    products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
                    renderProducts();
                    loadBestSellers();
                }
            });
            
        } catch (error) {
            console.log("⚠️ فشل تهيئة Firebase:", error);
            products = JSON.parse(JSON.stringify(DEFAULT_PRODUCTS));
            renderProducts();
            loadBestSellers();
            renderTabs();
        }
    }
    
    // ==================== دوال العرض ====================
    function renderTabs() {
        const container = document.getElementById('tabsContainer');
        if (!container) return;
        const allCats = [{ key: "all", name: "🎮 جميع المنتجات" }, ...categories.map(c => ({ key: c, name: categoryNames[c] || c }))];
        container.innerHTML = allCats.map(cat => `<button class="tab-btn ${currentCategory === cat.key ? 'active' : ''}" onclick="setCategory('${cat.key}')">${cat.name}</button>`).join('');
    }
    
    function setLang(lang) { 
        currentLang = lang; 
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active')); 
        event.target.classList.add('active');
        renderProducts(); 
        loadBestSellers(); 
    }
    
    function setCurrency(currency) { 
        currentCurrency = currency; 
        renderProducts(); 
    }
    
    function setCategory(cat) { 
        currentCategory = cat; 
        currentPage = 1; 
        renderTabs(); 
        renderProducts(); 
    }
    
    function getFilteredProducts() {
        let filtered = [...products];
        
        if (searchQuery) {
            filtered = filtered.filter(p => {
                const nameAr = p.nameAr || p.name_ar || p.name || '';
                const nameEn = p.nameEn || p.name_en || p.name || '';
                return nameAr.toLowerCase().includes(searchQuery) || nameEn.toLowerCase().includes(searchQuery);
            });
        }
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => {
                const cat = p.category || p.cat || '';
                return cat === currentCategory;
            });
        }
        return filtered;
    }
    
    function renderProducts() {
        const filtered = getFilteredProducts();
        const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const paginated = filtered.slice(start, start + ITEMS_PER_PAGE);
        const container = document.getElementById('productsContainer');
        const searchCount = document.getElementById('searchCount');
        
        if (!container) return;
        if (searchCount) searchCount.innerText = filtered.length;
        
        if (paginated.length === 0) { 
            container.innerHTML = '<div style="text-align:center; padding:40px;">لا توجد منتجات</div>'; 
            return; 
        }
        
        container.innerHTML = paginated.map(p => {
            let productPrice = p.priceOMR || p.price || p.price_omr || 0;
            let oldPriceValue = p.oldPrice || p.old_price || null;
            
            let name = '';
            if (currentLang === 'ar') name = p.nameAr || p.name_ar || p.name || 'منتج';
            else name = p.nameEn || p.name_en || p.name || 'Product';
            
            let details = '';
            if (currentLang === 'ar') details = p.detailsAr || p.details_ar || p.details || '';
            else details = p.detailsEn || p.details_en || p.details || '';
            
            let imageUrl = p.image || p.img || 'https://via.placeholder.com/170';
            let productId = p.id || p.product_id || Math.random().toString();
            productId = String(productId).replace(/[^a-zA-Z0-9_-]/g, '');
            
            let stock = (p.stock !== undefined && p.stock !== null) ? parseInt(p.stock) : 999;
            let isOutOfStock = (stock <= 0);
            
            const price = (productPrice * exchangeRates[currentCurrency]).toFixed(2);
            const oldPrice = oldPriceValue ? (oldPriceValue * exchangeRates[currentCurrency]).toFixed(2) : null;
            const discount = oldPriceValue ? Math.round((1 - productPrice / oldPriceValue) * 100) : 0;
            
            const orderButton = isOutOfStock 
                ? `<button class="btn-wa disabled" disabled><i class="fas fa-times-circle"></i> نفذت الكمية</button>`
                : `<button class="btn-wa" data-id="${productId}" data-name="${escapeHtml(name)}" data-price="${productPrice}"><i class="fab fa-whatsapp"></i> اطلب الآن</button>`;
            
            return `
                <div class="product-card ${isOutOfStock ? 'out-of-stock' : ''}">
                    ${discount > 0 ? `<div class="discount-badge">-${discount}%</div>` : ''}
                    ${isOutOfStock ? `<div class="out-of-stock-badge">⚠️ نفذت الكمية</div>` : ''}
                    <div class="product-image" style="background-image: url('${imageUrl}');"></div>
                    <div class="card-info">
                        <div class="product-title">${escapeHtml(name)}</div>
                        <div class="product-details">${escapeHtml(details)}</div>
                        <div class="price-container">
                            ${oldPrice ? `<span class="old-price">${oldPrice} ${currencySymbols[currentCurrency]}</span>` : ''}
                            <span class="price">${price} ${currencySymbols[currentCurrency]}</span>
                        </div>
                        ${orderButton}
                    </div>
                </div>
            `;
        }).join('');
        
        // إضافة أحداث للأزرار
        document.querySelectorAll('.btn-wa:not(.disabled)').forEach(button => {
            button.removeEventListener('click', handleButtonClick);
            button.addEventListener('click', handleButtonClick);
        });
        
        // الترقيم
        const paginationDiv = document.getElementById('pagination');
        if (totalPages > 1 && paginationDiv) {
            let pages = '';
            for (let i = 1; i <= totalPages; i++) {
                pages += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            paginationDiv.innerHTML = pages;
        } else if (paginationDiv) { 
            paginationDiv.innerHTML = ''; 
        }
    }
    
    function goToPage(page) { 
        currentPage = page; 
        renderProducts(); 
        window.scrollTo({ top: 400, behavior: 'smooth' }); 
    }
    
    function loadBestSellers() {
        const section = document.getElementById('bestSellersSection');
        const grid = document.getElementById('bestSellersGrid');
        if (!section || !grid) return;
        const sorted = [...products].sort((a, b) => (b.sales || 0) - (a.sales || 0)).slice(0, 4);
        if (sorted.length > 0 && products.length > 0) {
            section.style.display = 'block';
            grid.innerHTML = sorted.map((p, index) => {
                const name = currentLang === 'ar' ? (p.nameAr || p.name_ar || p.name) : (p.nameEn || p.name_en || p.name);
                return `
                    <div class="best-seller-card" style="background:rgba(0,0,0,0.4); border-radius:0.8rem; padding:8px; text-align:center;">
                        <div style="position:absolute; margin-top:-12px; margin-right:-8px; background:#ffaa44; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${index + 1}</div>
                        <img src="${p.image || 'https://via.placeholder.com/70'}" style="width:70px; height:70px; border-radius:0.8rem; margin-bottom:6px;">
                        <div style="font-size:0.75rem; font-weight:bold;">${escapeHtml(name)}</div>
                        <div style="font-size:0.6rem; color:#ffaa44;">${p.sales || 0} مبيعات</div>
                    </div>
                `;
            }).join('');
        }
    }
    
    function handleButtonClick(event) {
        event.preventDefault();
        event.stopPropagation();
        const button = event.currentTarget;
        const productId = button.getAttribute('data-id');
        const productName = button.getAttribute('data-name');
        const productPrice = parseFloat(button.getAttribute('data-price'));
        
        if (!productId || !productName || isNaN(productPrice)) {
            alert('حدث خطأ في بيانات المنتج');
            return;
        }
        
        showTermsForProduct(productId, productName, productPrice);
    }
    
    function showTermsForProduct(productId, productName, productPrice) {
        pendingOrderProduct = { id: productId, name: productName, price: productPrice };
        const modal = document.getElementById('termsModal');
        if (modal) modal.style.display = 'flex';
    }
    
    function redirectToWhatsApp(product) {
        if (!product || !product.name) return;
        const message = `مرحباً xnesto، أرغب في شراء:\n\n📦 المنتج: ${product.name}\n💰 السعر: ${product.price} ر.ع\n\n✅ لقد قرأت الشروط وأوافق عليها.`;
        window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
    }
    
    function escapeHtml(text) { 
        if (!text) return ''; 
        return text.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;"); 
    }
    
    function setView(view) { 
        document.body.classList.remove('view-mobile', 'view-desktop'); 
        document.body.classList.add('view-' + view); 
        const btns = document.querySelectorAll('.device-btn');
        btns.forEach(btn => btn.classList.remove('active'));
        const activeBtn = Array.from(btns).find(btn => btn.textContent.includes(view === 'mobile' ? 'جوال' : 'كمبيوتر'));
        if (activeBtn) activeBtn.classList.add('active');
    }
    
    function toggleMode() { 
        document.body.classList.toggle('light-mode'); 
        const btn = document.querySelector('.mode-toggle-btn'); 
        if (btn) btn.innerHTML = document.body.classList.contains('light-mode') ? '🌞 نهاري' : '🌙 ليلي';
    }
    
    // ==================== تهيئة الصفحة ====================
    // الخطوة 1: عرض المنتجات فوراً (بدون أي تأخير)
    showProductsImmediately();
    
    // الخطوة 2: محاولة الاتصال بـ Firebase في الخلفية (مع مهلة 3 ثواني)
    setTimeout(() => {
        initFirebaseWithTimeout();
    }, 100);
    
    // إضافة مستمع البحث
    document.getElementById('searchInput').addEventListener('input', (e) => { 
        searchQuery = e.target.value.toLowerCase(); 
        currentPage = 1; 
        renderProducts(); 
    });
    
    // إضافة مستمعي النافذة المنبثقة
    document.getElementById('acceptTermsBtn')?.addEventListener('click', () => {
        const check = document.getElementById('termsCheck');
        if (!check?.checked) {
            alert('يرجى الموافقة على الشروط');
            return;
        }
        if (pendingOrderProduct) {
            redirectToWhatsApp(pendingOrderProduct);
            document.getElementById('termsModal').style.display = 'none';
            pendingOrderProduct = null;
        }
    });
    
    document.getElementById('declineTermsBtn')?.addEventListener('click', () => {
        document.getElementById('termsModal').style.display = 'none';
        pendingOrderProduct = null;
    });
    
    // استعادة الوضع الليلي
    if (localStorage.getItem('store_mode') === 'light') {
        document.body.classList.add('light-mode');
        const btn = document.querySelector('.mode-toggle-btn');
        if (btn) btn.innerHTML = '🌞 نهاري';
    }
    
    window.goToPage = goToPage;
    window.setLang = setLang;
    window.setCurrency = setCurrency;
    window.setCategory = setCategory;
    window.setView = setView;
    window.toggleMode = toggleMode;
</script>
</body>
</html>
