<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xnesto - متجر بلايستيشن</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* كل الـ CSS السابق موجود هنا - نفس التصميم */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0a1a 0%, #0a0a1a 100%);
            font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
            color: #f0f0ff;
            padding: 1.5rem;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            background: linear-gradient(135deg, #0f0f2a, #0a0a1f);
            padding: 0.5rem 1rem 1.5rem;
            border-radius: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 170, 68, 0.3);
        }
        .header h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #ffaa44, #ffcc88, #ffaa44);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .header p { color: #ffdd99; font-size: 0.9rem; }
        
        .control-bar {
            max-width: 1400px;
            margin: 0 auto 1rem auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            background: rgba(15, 15, 42, 0.8);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 170, 68, 0.2);
        }
        .lang-switch {
            display: flex;
            gap: 8px;
            background: #1e1e3a;
            padding: 4px;
            border-radius: 40px;
        }
        .lang-btn {
            background: transparent;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            color: #ccc;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .lang-btn.active { background: #ffaa44; color: #0a0a1a; }
        .currency-selector {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #1e1e3a;
            padding: 4px 12px;
            border-radius: 40px;
        }
        #currencySelect {
            background: #0a0c1a;
            border: 1px solid #ffaa44;
            color: #ffdd99;
            padding: 5px 10px;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .admin-link {
            background: #ffaa44;
            color: #0a0a1a;
            padding: 6px 14px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.8rem;
        }
        
        .search-bar-container {
            max-width: 1400px;
            margin: 0 auto 1rem auto;
            background: rgba(15, 15, 42, 0.8);
            padding: 8px 20px;
            border-radius: 50px;
        }
        .search-box {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1e1e3a;
            padding: 5px 15px;
            border-radius: 40px;
        }
        #searchInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 10px 0;
            color: white;
            outline: none;
        }
        .search-results-count {
            background: #2d2f6e;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.7rem;
            color: #ffaa66;
        }
        
        .tabs-container {
            max-width: 1400px;
            margin: 0 auto 2rem auto;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .tab-btn {
            background: #1e1e3a;
            border: 1px solid rgba(255,170,68,0.3);
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
            font-size: 0.9rem;
        }
        .tab-btn.active { background: #ffaa44; color: #0a0a1a; border-color: #ffaa44; }
        .tab-btn:hover { border-color: #ffaa44; }
        
        .products-grid {
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            background: #11152b;
            border-radius: 1rem;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid rgba(255, 170, 68, 0.2);
            position: relative;
        }
        .product-card:hover { transform: translateY(-4px); border-color: #ffaa44; }
        .discount-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: #ff4444;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 2;
        }
        .product-image {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            position: relative;
            background-color: #1e1e3a;
        }
        .product-badge {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
        }
        .card-info { padding: 1rem; }
        .product-title { font-size: 1.1rem; font-weight: bold; margin-bottom: 5px; text-align: center; }
        .product-details {
            font-size: 0.7rem;
            color: #b9c5f0;
            text-align: center;
            margin: 8px 0;
        }
        .price-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin: 10px 0;
        }
        .old-price { font-size: 0.8rem; color: #888; text-decoration: line-through; }
        .price { font-size: 1.3rem; font-weight: bold; color: #ffaa44; }
        .btn-wa {
            width: 100%;
            background: #25D366;
            border: none;
            padding: 8px;
            border-radius: 40px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 0.85rem;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }
        .page-btn {
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            color: #ffdd99;
            padding: 6px 12px;
            border-radius: 30px;
            cursor: pointer;
        }
        .page-btn.active { background: #ffaa44; color: #0a0a1a; }
        
        .footer {
            text-align: center;
            margin-top: 2rem;
            padding: 1.5rem;
            color: #6f7bb3;
            border-top: 1px solid rgba(255, 170, 68, 0.2);
        }
        .whatsapp-float {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #25D366;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            text-decoration: none;
            z-index: 999;
        }
        @media (max-width: 640px) {
            body { padding: 0.5rem; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 0.8rem; }
            .product-image { height: 130px; }
            .product-title { font-size: 0.85rem; }
            .price { font-size: 1rem; }
        }
        
        .device-bar {
            background: #07071a;
            border-bottom: 1px solid rgba(255,170,68,0.2);
            padding: 6px 16px;
            display: flex;
            justify-content: center;
            gap: 6px;
            position: sticky;
            top: 0;
            z-index: 9999;
        }
        .device-btn {
            background: #1e1e3a;
            border: 1px solid rgba(255,170,68,0.2);
            color: #888;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .device-btn.active { background: #ffaa44; color: #0a0a1a; border-color: #ffaa44; }
        .mode-toggle-btn {
            background: transparent;
            border: 1px solid rgba(255,170,68,0.4);
            color: #ffaa66;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        body.light-mode {
            background: #f0f4ff !important;
            color: #1a1a2e !important;
        }
        body.light-mode .header { background: linear-gradient(135deg, #1a3a7a, #0d2a6e) !important; }
        body.light-mode .control-bar { background: rgba(255,255,255,0.95) !important; }
        body.light-mode .product-card { background: #ffffff !important; }
        body.light-mode .product-title { color: #1a1a2e !important; }
        body.light-mode .footer { background: #1a3a7a !important; }
        body.light-mode .device-bar { background: #1a3a7a !important; }
        body.view-mobile .products-grid { grid-template-columns: repeat(2, 1fr) !important; }
        body.view-desktop .products-grid { grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)) !important; }
    </style>
</head>
<body>

<div class="device-bar">
    <button class="device-btn active" onclick="setView('mobile')"><i class="fas fa-mobile-alt"></i> جوال</button>
    <button class="device-btn" onclick="setView('desktop')"><i class="fas fa-desktop"></i> كمبيوتر</button>
    <button class="mode-toggle-btn" onclick="toggleMode()">🌙 ليلي</button>
</div>

<div class="header">
    <h1>🎮 XNESTO STORE 🎮</h1>
    <p>أكبر متجر لألعاب PlayStation وبطاقات الشحن - توصيل فوري</p>
</div>

<div class="control-bar">
    <div class="lang-switch">
        <button class="lang-btn active" data-lang="ar" onclick="setLang('ar')">🇸🇦 العربية</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">🇬🇧 English</button>
    </div>
    <div class="currency-selector">
        <label><i class="fas fa-coins"></i> <span id="currencyLabel">العملة:</span></label>
        <select id="currencySelect" onchange="setCurrency(this.value)">
            <option value="OMR">ريال عماني (OMR)</option>
            <option value="USD">دولار أمريكي (USD)</option>
            <option value="SAR">ريال سعودي (SAR)</option>
            <option value="AED">درهم إماراتي (AED)</option>
        </select>
    </div>
    <a href="admin.html" class="admin-link" target="_blank"><i class="fas fa-user-shield"></i> لوحة الإدارة</a>
</div>

<div class="search-bar-container">
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="🔍 ابحث عن منتج...">
        <span class="search-results-count" id="searchCount">0</span>
    </div>
</div>

<div class="tabs-container">
    <button class="tab-btn active" onclick="setCategory('all')">🎮 جميع المنتجات</button>
    <button class="tab-btn" onclick="setCategory('games')">🎮 ألعاب PS4/PS5</button>
    <button class="tab-btn" onclick="setCategory('giftcards')">💳 بطاقات شحن</button>
</div>

<div id="productsContainer" class="products-grid">
    <div class="loading">جاري التحميل...</div>
</div>
<div id="pagination" class="pagination"></div>

<div class="footer">
    <div class="social-icons">
        <i class="fab fa-instagram"></i> <span id="instagramText">xnesto_store</span>
        <i class="fab fa-whatsapp"></i> <span id="whatsappText">+96879977100</span>
    </div>
    <p>© 2025 xnesto - جميع الحقوق محفوظة</p>
</div>

<a href="https://wa.me/96879977100" class="whatsapp-float" target="_blank">
    <i class="fab fa-whatsapp"></i>
</a>

<script>
    // ==================== Firebase Configuration ====================
    const firebaseConfig = {
        databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const productsRef = database.ref('products');
    
    let products = [];
    let currentLang = "ar";
    let currentCurrency = "OMR";
    let currentPage = 1;
    let currentCategory = "all";
    let searchQuery = "";
    const ITEMS_PER_PAGE = 12;
    const WA_NUMBER = "96879977100";
    
    const exchangeRates = { OMR: 1, USD: 2.6, SAR: 9.75, AED: 9.55 };
    const currencySymbols = { OMR: "ر.ع", USD: "$", SAR: "ر.س", AED: "د.إ" };
    
    function formatPrice(price) {
        return `${currencySymbols[currentCurrency]} ${(price * exchangeRates[currentCurrency]).toFixed(2)}`;
    }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery.trim()) {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(query) || p.nameEn.toLowerCase().includes(query));
        }
        if (currentCategory !== 'all') {
            filtered = filtered.filter(p => p.category === currentCategory);
        }
        return filtered;
    }
    
    function renderProducts() {
        const filtered = getFilteredProducts();
        const totalPages = Math.ceil(filtered.length / ITEMS_PER_PAGE);
        if (currentPage > totalPages) currentPage = 1;
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const pageProducts = filtered.slice(start, start + ITEMS_PER_PAGE);
        
        const container = document.getElementById('productsContainer');
        if (pageProducts.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:2rem;">لا توجد منتجات حالياً</div>';
        } else {
            container.innerHTML = pageProducts.map(p => {
                const name = currentLang === 'ar' ? p.nameAr : p.nameEn;
                const desc = currentLang === 'ar' ? p.detailsAr : p.detailsEn;
                const price = formatPrice(p.priceOMR);
                const hasDiscount = p.oldPrice && p.oldPrice > p.priceOMR;
                const oldPrice = hasDiscount ? formatPrice(p.oldPrice) : null;
                const discountPercent = hasDiscount ? Math.round((1 - p.priceOMR / p.oldPrice) * 100) : 0;
                const categoryName = p.category === 'games' ? (currentLang === 'ar' ? '🎮 ألعاب PS4/PS5' : '🎮 Games') : (currentLang === 'ar' ? '💳 بطاقات شحن' : '💳 Gift Cards');
                
                let imageHtml = '';
                if (p.image && p.image.trim()) {
                    imageHtml = `<div class="product-image" style="background-image: url('${p.image}');"><div class="product-badge">${categoryName}</div></div>`;
                } else {
                    imageHtml = `<div class="product-image" style="background: linear-gradient(135deg, #1e3a5f, #0f2a4a); display: flex; align-items: center; justify-content: center;"><div style="font-size: 2.5rem;">${p.category === 'games' ? '🎮' : '💳'}</div><div class="product-badge">${categoryName}</div></div>`;
                }
                
                return `
                    <div class="product-card">
                        ${hasDiscount ? `<div class="discount-badge">🔥 -${discountPercent}%</div>` : ''}
                        ${imageHtml}
                        <div class="card-info">
                            <div class="product-title">${escapeHtml(name)}</div>
                            <div class="product-details">${escapeHtml(desc || '')}</div>
                            <div class="price-container">
                                ${hasDiscount ? `<span class="old-price">${oldPrice}</span>` : ''}
                                <span class="price">${price}</span>
                            </div>
                            <button class="btn-wa" onclick="buyProduct('${escapeHtml(name)}', ${p.priceOMR})">
                                <i class="fab fa-whatsapp"></i> ${currentLang === 'ar' ? 'اطلب الآن' : 'Order Now'}
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        const pagContainer = document.getElementById('pagination');
        if (totalPages > 1) {
            let pagesHtml = '';
            for (let i = 1; i <= totalPages; i++) {
                pagesHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
            }
            pagContainer.innerHTML = pagesHtml;
        } else {
            pagContainer.innerHTML = '';
        }
        document.getElementById('searchCount').innerHTML = filtered.length;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function goToPage(page) {
        currentPage = page;
        renderProducts();
    }
    
    function setCategory(cat) {
        currentCategory = cat;
        currentPage = 1;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderProducts();
    }
    
    function buyProduct(name, price) {
        const sym = currencySymbols[currentCurrency];
        const convertedPrice = (price * exchangeRates[currentCurrency]).toFixed(2);
        const message = `🛒 طلب شراء من xnesto\n━━━━━━━━━━━━━━━━━━━━\n🎮 المنتج: ${name}\n💰 السعر: ${sym} ${convertedPrice}\n━━━━━━━━━━━━━━━━━━━━\n📞 يرجى تأكيد الطلب.`;
        window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`, '_blank');
    }
    
    function setLang(lang) {
        currentLang = lang;
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderProducts();
    }
    
    function setCurrency(currency) {
        currentCurrency = currency;
        renderProducts();
    }
    
    function toggleMode() {
        const isLight = document.body.classList.toggle('light-mode');
        const btn = document.querySelector('.mode-toggle-btn');
        btn.innerHTML = isLight ? '☀️ نهاري' : '🌙 ليلي';
        localStorage.setItem('xnesto_mode', isLight ? 'light' : 'dark');
    }
    
    function setView(view) {
        document.body.classList.remove('view-mobile', 'view-desktop');
        document.body.classList.add('view-' + view);
        localStorage.setItem('xnesto_view', view);
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value;
        currentPage = 1;
        renderProducts();
    });
    
    const savedMode = localStorage.getItem('xnesto_mode');
    if (savedMode === 'light') {
        document.body.classList.add('light-mode');
        document.querySelector('.mode-toggle-btn').innerHTML = '☀️ نهاري';
    }
    const savedView = localStorage.getItem('xnesto_view') || 'mobile';
    setView(savedView);
    
    // تحميل المنتجات من Firebase
    productsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data && Array.isArray(data) && data.length > 0) {
            products = data;
        } else if (data && typeof data === 'object' && Object.keys(data).length > 0) {
            products = Object.values(data);
        } else {
            products = [];
        }
        renderProducts();
    });
</script>
</body>
</html>
