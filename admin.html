<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xnesto - لوحة الإدارة المتكاملة V11</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a1a; font-family: 'Cairo', sans-serif; color: #f0f0ff; padding: 1rem; min-height: 100vh; }
        .header { text-align: center; background: #11152b; padding: 1.5rem; border-radius: 1.5rem; margin-bottom: 1rem; border: 1px solid #ffaa44; }
        .header h1 { color: #ffaa44; font-size: 1.6rem; }
        
        .login-box { max-width: 400px; margin: 4rem auto; background: #11152b; border-radius: 1.5rem; padding: 2rem; text-align: center; border: 2px solid #ffaa44; }
        .login-box input { width: 100%; padding: 1rem; margin: 1rem 0; border-radius: 2rem; background: #1e1e3a; border: 1px solid #ffaa44; color: white; font-size: 1rem; outline: none; }
        .login-box button { width: 100%; padding: 1rem; border-radius: 2rem; background: #ffaa44; color: #0a0a1a; font-weight: bold; border: none; cursor: pointer; }
        
        .admin-tab-btn { background: #1e1e3a; border: none; padding: 0.8rem 1.5rem; border-radius: 2rem; cursor: pointer; color: #ccc; font-weight: bold; margin: 0.2rem; }
        .admin-tab-btn.active { background: #ffaa44; color: #0a0a1a; }
        
        .section-card { background: #11152b; border-radius: 1rem; padding: 1.5rem; margin-bottom: 1rem; border: 1px solid rgba(255,170,68,0.3); }
        .flex-form { display: flex; flex-wrap: wrap; gap: 0.8rem; margin-bottom: 1.5rem; background: rgba(255,170,68,0.05); padding: 1rem; border-radius: 1rem; }
        .flex-form input, .flex-form select, .flex-form textarea { background: #1e1e3a; border: 1px solid #ffaa44; border-radius: 2rem; padding: 0.7rem 1rem; color: white; flex: 1; min-width: 150px; outline: none; }
        
        .btn-save { background: #00cc88; border: none; padding: 0.8rem 2rem; border-radius: 2rem; cursor: pointer; font-weight: bold; color: #0a0a1a; }
        .btn-logout { background: #ff4444; color: white; border: none; padding: 0.5rem 1.5rem; border-radius: 2rem; cursor: pointer; float: left; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; font-size: 0.85rem; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid rgba(255,170,68,0.1); }
        th { color: #ffaa44; }
        .stock-input { width: 70px; background: #1e1e3a; border: 1px solid #ffaa44; border-radius: 1rem; padding: 5px; text-align: center; color: white; }
        
        .edit-btn { background: #ffa500; color: white; border: none; padding: 5px 10px; border-radius: 1rem; cursor: pointer; margin: 2px; }
        .del-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 1rem; cursor: pointer; margin: 2px; }
        
        .image-upload { background: #1e1e3a; border: 2px dashed #ffaa44; border-radius: 1rem; padding: 1rem; text-align: center; cursor: pointer; flex: 1; min-width: 200px; }
        .preview-img { max-width: 60px; max-height: 60px; border-radius: 8px; margin-top: 5px; display: none; }
        
        .notification { position: fixed; bottom: 20px; right: 20px; background: #00cc88; color: #0a0a1a; padding: 1rem 2rem; border-radius: 1rem; font-weight: bold; z-index: 9999; display: none; }
    </style>
</head>
<body>

<div id="loginBox" class="login-box">
    <h2>🔐 دخول الإدارة</h2>
    <input type="password" id="passInput" placeholder="كلمة السر">
    <button onclick="login()">دخول</button>
</div>

<div id="adminApp" style="display:none;">
    <div class="header">
        <button class="btn-logout" onclick="logout()">خروج</button>
        <h1>🔐 لوحة إدارة xnesto المطورة V11</h1>
    </div>

    <div style="margin-bottom:1rem; text-align:center;">
        <button class="admin-tab-btn active" onclick="showTab('products')">📦 المنتجات</button>
        <button class="admin-tab-btn" onclick="showTab('categories')">📁 الأقسام</button>
        <button class="admin-tab-btn" onclick="showTab('settings')">⚙️ الإعدادات</button>
    </div>

    <!-- Products Section -->
    <div id="productsSection" class="section-card">
        <h3>➕ إضافة منتج جديد</h3>
        <div class="flex-form">
            <input type="text" id="newName" placeholder="اسم المنتج">
            <select id="newCat"></select>
            <input type="number" id="newPrice" placeholder="السعر الافتراضي" step="0.1">
            <input type="number" id="newP1" placeholder="سعر أساسية PS5" step="0.1">
            <input type="number" id="newP2" placeholder="سعر ثانوية PS5" step="0.1">
            <input type="number" id="newP3" placeholder="سعر نسخة PS4" step="0.1">
            <input type="number" id="newStock" placeholder="الكمية" value="99">
            <div class="image-upload" onclick="document.getElementById('fileIn').click()">
                <i class="fas fa-camera"></i> اختر صورة
                <input type="file" id="fileIn" accept="image/*" onchange="handleImg(event, 'newPrev')">
                <img id="newPrev" class="preview-img">
            </div>
            <button class="btn-save" onclick="addProduct()">إضافة المنتج</button>
        </div>

        <h3>📦 قائمة المنتجات</h3>
        <div style="overflow-x:auto;">
            <table id="prodTable">
                <thead>
                    <tr>
                        <th>الصورة</th>
                        <th>الاسم</th>
                        <th>الأسعار (P/S/PS4)</th>
                        <th>الكمية</th>
                        <th>إجراءات</th>
                    </tr>
                </thead>
                <tbody id="prodBody"></tbody>
            </table>
        </div>
    </div>

    <!-- Categories Section -->
    <div id="categoriesSection" class="section-card" style="display:none;">
        <h3>📁 إدارة الأقسام</h3>
        <div class="flex-form">
            <input type="text" id="catKey" placeholder="كود القسم (مثال: games)">
            <input type="text" id="catName" placeholder="اسم القسم (مثال: ألعاب)">
            <button class="btn-save" onclick="addCat()">إضافة قسم</button>
        </div>
        <div id="catList" style="display:flex; gap:10px; flex-wrap:wrap;"></div>
    </div>

    <!-- Settings Section -->
    <div id="settingsSection" class="section-card" style="display:none;">
        <h3>⚙️ إعدادات المتجر</h3>
        <div class="flex-form" style="flex-direction:column;">
            <label>رقم الواتساب</label>
            <input type="text" id="setWA" placeholder="96879977100">
            <label>شروط المتجر (كل سطر شرط)</label>
            <textarea id="setTerms" rows="5" style="border-radius:1rem;"></textarea>
            <button class="btn-save" onclick="saveSettings()">حفظ الإعدادات</button>
        </div>
    </div>
</div>

<div id="notif" class="notification">تم الحفظ بنجاح!</div>

<script>
    const firebaseConfig = { databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let products = [], categories = {}, currentImg = "";

    function login() {
        if (document.getElementById('passInput').value === "ssp1995") {
            localStorage.setItem('xnesto_auth', 'true');
            showApp();
        } else alert("خطأ في كلمة السر!");
    }

    function logout() { localStorage.removeItem('xnesto_auth'); location.reload(); }

    function showApp() {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('adminApp').style.display = 'block';
        loadData();
    }

    if (localStorage.getItem('xnesto_auth') === 'true') showApp();

    function loadData() {
        db.ref('categories').on('value', s => {
            categories = s.val() || { "games": "🎮 ألعاب", "giftcards": "💳 بطاقات" };
            renderCats();
        });
        db.ref('products').on('value', s => {
            const data = s.val();
            products = data ? (Array.isArray(data) ? data : Object.values(data)) : [];
            renderProds();
        });
        db.ref('settings').once('value', s => {
            const d = s.val();
            if (d) {
                document.getElementById('setWA').value = d.whatsapp || "";
                document.getElementById('setTerms').value = d.terms || "";
            }
        });
    }

    function renderProds() {
        const body = document.getElementById('prodBody');
        body.innerHTML = products.map((p, i) => `
            <tr>
                <td><img src="${p.image}" width="40" height="40" style="border-radius:5px;"></td>
                <td>${p.nameAr}</td>
                <td>${p.pricePrimary || p.priceOMR}/${p.priceSecondary || '--'}/${p.pricePS4 || '--'}</td>
                <td><input type="number" class="stock-input" value="${p.stock}" onchange="updateStock(${i}, this.value)"></td>
                <td>
                    <button class="del-btn" onclick="deleteProd(${i})"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `).join('');
    }

    function addProduct() {
        const name = document.getElementById('newName').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        if (!name || isNaN(price)) return alert("أدخل الاسم والسعر!");

        const p = {
            id: 'p' + Date.now(),
            nameAr: name,
            category: document.getElementById('newCat').value,
            priceOMR: price,
            pricePrimary: parseFloat(document.getElementById('newP1').value) || null,
            priceSecondary: parseFloat(document.getElementById('newP2').value) || null,
            pricePS4: parseFloat(document.getElementById('newP3').value) || null,
            stock: parseInt(document.getElementById('newStock').value) || 0,
            image: currentImg || "https://via.placeholder.com/150"
        };
        products.push(p);
        saveProds();
        clearForm();
    }

    function deleteProd(i) { if(confirm("حذف المنتج؟")) { products.splice(i, 1); saveProds(); } }
    function updateStock(i, v) { products[i].stock = parseInt(v) || 0; saveProds(); }
    function saveProds() { db.ref('products').set(products).then(() => showNotif()); }

    function renderCats() {
        const list = document.getElementById('catList');
        const select = document.getElementById('newCat');
        list.innerHTML = Object.entries(categories).map(([k, v]) => `
            <div style="background:#1e1e3a; padding:5px 15px; border-radius:2rem; border:1px solid #ffaa44;">
                ${v} (${k}) <i class="fas fa-times" style="color:#ff4444; cursor:pointer;" onclick="delCat('${k}')"></i>
            </div>
        `).join('');
        select.innerHTML = Object.entries(categories).map(([k, v]) => `<option value="${k}">${v}</option>`).join('');
    }

    function addCat() {
        const k = document.getElementById('catKey').value;
        const v = document.getElementById('catName').value;
        if (!k || !v) return;
        categories[k] = v;
        db.ref('categories').set(categories).then(() => {
            document.getElementById('catKey').value = "";
            document.getElementById('catName').value = "";
        });
    }

    function delCat(k) { delete categories[k]; db.ref('categories').set(categories); }

    function saveSettings() {
        db.ref('settings').set({
            whatsapp: document.getElementById('setWA').value,
            terms: document.getElementById('setTerms').value
        }).then(() => showNotif());
    }

    function handleImg(e, prevId) {
        const reader = new FileReader();
        reader.onload = () => {
            currentImg = reader.result;
            document.getElementById(prevId).src = reader.result;
            document.getElementById(prevId).style.display = "block";
        };
        reader.readAsDataURL(e.target.files[0]);
    }

    function clearForm() {
        document.getElementById('newName').value = "";
        document.getElementById('newPrice').value = "";
        document.getElementById('newP1').value = "";
        document.getElementById('newP2').value = "";
        document.getElementById('newP3').value = "";
        document.getElementById('newPrev').style.display = "none";
        currentImg = "";
    }

    function showTab(t) {
        ['products', 'categories', 'settings'].forEach(s => {
            document.getElementById(s + 'Section').style.display = s === t ? 'block' : 'none';
        });
        document.querySelectorAll('.admin-tab-btn').forEach(b => {
            b.classList.toggle('active', b.innerText.includes(t === 'products' ? 'المنتجات' : t === 'categories' ? 'الأقسام' : 'الإعدادات'));
        });
    }

    function showNotif() {
        const n = document.getElementById('notif');
        n.style.display = "block";
        setTimeout(() => n.style.display = "none", 2000);
    }
</script>
</body>
</html>
