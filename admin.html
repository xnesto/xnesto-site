<div class="header">
    <h1>🔐 لوحة إدارة xnesto</h1>
    <p>إدارة المنتجات - المخزون - المبيعات - الطلبات</p>
</div>

<div class="control-bar">

        <button class="mode-toggle-btn" onclick="toggleMode()">🌙 ليلي</button>
    </div>
    <div style="display: flex; gap: 8px;">
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث">
        <select id="filterCategory" class="filter-select">
            <option value="all">الكل</option>
        </select>
    </div>
</div>

<div class="admin-tabs" id="adminTabs">
    <button class="admin-tab active" data-tab="products">📦 المنتجات</button>
    <button class="admin-tab" data-tab="bestsellers">🏆 الأكثر مبيعاً</button>
    <button class="admin-tab" data-tab="orders">📋 الطلبات</button>
    <button class="admin-tab" data-tab="categories">📁 التصنيفات</button>
</div>

<div id="productsSection" class="section">
    <div id="productsStats" class="stats-grid" style="display:none;"></div>
    <div id="adminPanel" class="admin-panel" style="display:none;">
        <h3>➕ إضافة منتج جديد</h3>
        <div class="add-form">
            <input type="text" id="newNameAr" placeholder="الاسم بالعربية">
            <input type="text" id="newNameEn" placeholder="Name in English">
            <select id="newCategorySelect"></select>
            <input type="number" id="newPrice" step="0.5" placeholder="السعر (ر.ع)">
            <input type="number" id="newOldPrice" step="0.5" placeholder="السعر القديم">
            <input type="number" id="newStock" step="1" placeholder="الكمية" value="99">
            <input type="number" id="newSales" step="1" placeholder="المبيعات" value="0">
            <div class="image-upload-area" id="newImageUploadArea">
                <i class="fas fa-cloud-upload-alt"></i> 📸 صورة
                <input type="file" id="newImageFile" accept="image/*">
                <img id="newImagePreview" class="image-preview">
            </div>
            <textarea id="newDesc" rows="1" placeholder="وصف المنتج"></textarea>
            <button class="btn-save" onclick="addProduct()">💾 إضافة منتج</button>
        </div>
    </div>
    <div id="productsTable" class="data-table"><div class="loading">🔐 جاري التحميل...</div></div>
</div>

<div id="bestsellersSection" class="section" style="display:none;">
    <div class="bestseller-manager">
        <h3><i class="fas fa-trophy"></i> إدارة الأكثر مبيعاً</h3>
        <div class="bestseller-controls">
            <select id="addToBestsellerSelect">
                <option value="">-- اختر لعبة --</option>
            </select>
            <input type="number" id="bestsellerSales" placeholder="المبيعات" value="100" step="1">
            <button class="btn-sm btn-success" onclick="addToBestsellers()">➕ إضافة</button>
        </div>
        <div id="bestsellerList" class="bestseller-list"></div>
        <div style="margin-top:8px;"><button class="btn-sm" onclick="refreshBestsellers()">🔄 تحديث الترتيب</button></div>
    </div>
</div>

<div id="ordersSection" class="section" style="display:none;">
    <div id="ordersStats" class="stats-grid" style="display:none;"></div>
    <div class="data-table" id="ordersTable"><div class="loading">جاري تحميل الطلبات...</div></div>
</div>

<div id="categoriesSection" class="section" style="display:none;">
    <div class="categories-manager">
        <h3><i class="fas fa-tags"></i> إدارة التصنيفات</h3>
        <div id="categoriesList" class="categories-list"></div>
        <div class="add-category-input">
            <input type="text" id="newCategoryName" placeholder="تصنيف جديد">
            <button id="addCategoryBtn"><i class="fas fa-plus"></i> إضافة</button>
        </div>
    </div>
</div>

<div class="footer">
    <p>📞 واتساب: +96879977100 | 📸 انستقرام: xnesto_store</p>
</div>

    // ==================== دوال Firebase ====================
    function initFirebase() {
        try {
            const firebaseConfig = { databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" };
            
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            }
            
            database = firebase.database();
            productsRef = database.ref('products');
            categoriesRef = database.ref('categories');
            ordersRef = database.ref('orders');
            
            // تحميل المنتجات من Firebase
            productsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && Array.isArray(data) && data.length > 0) {
                    products = data.sort((a, b) => (a.order || 0) - (b.order || 0));
                    firebaseInitialized = true;
                    console.log('✅ تم تحميل المنتجات من Firebase');
                    renderProductsTable();
                    updateProductsStats();
                    renderBestsellersList();
                    updateBestsellerSelect();
                } else if (!firebaseInitialized) {
                    products = JSON.parse(JSON.stringify(allDefaultProducts));
                    products.forEach((p, idx) => { p.order = idx; });
                    renderProductsTable();
                    updateProductsStats();
                    renderBestsellersList();
                    updateBestsellerSelect();
                }
            });
            
            // تحميل التصنيفات
            categoriesRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data && data.categories && data.names) {
                    categories = data.categories;
                    categoryNames = data.names;
                }
                updateCategorySelect();
                renderCategoriesList();
            });
            
            // تحميل الطلبات
            ordersRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) orders = Object.values(data).sort((a,b) => b.id - a.id);
                else orders = [];
                renderOrdersTable();
                updateOrdersStats();
            });
            
        } catch (error) {
            console.log("Firebase initialization failed:", error);
        }
    }

                    console.error('❌ خطأ في Firebase:', error);

                });
        } else {
            console.log('⚠️ Firebase غير جاهزة، حفظ محلي فقط');
            return Promise.resolve(true);
        }
    }

    function updateProductsStats() {
        const totalProducts = products.length;
        const totalStock = products.reduce((sum, p) => sum + (p.stock || 0), 0);
        const totalValue = products.reduce((sum, p) => sum + ((p.priceOMR || 0) * (p.stock || 0)), 0);
        const totalSales = products.reduce((sum, p) => sum + (p.sales || 0), 0);
        const statsDiv = document.getElementById('productsStats');
        if (statsDiv) {
            statsDiv.innerHTML = `
                <div class="stat-card"><i class="fas fa-box"></i><div class="stat-value">${totalProducts}</div><div class="stat-label">منتجات</div></div>
                <div class="stat-card"><i class="fas fa-cubes"></i><div class="stat-value">${totalStock}</div><div class="stat-label">إجمالي الكمية</div></div>
                <div class="stat-card"><i class="fas fa-dollar-sign"></i><div class="stat-value">${totalValue.toFixed(2)}</div><div class="stat-label">قيمة المخزون</div></div>
                <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-value">${totalSales}</div><div class="stat-label">إجمالي المبيعات</div></div>
            `;
            statsDiv.style.display = 'grid';
        }
    }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery) filtered = filtered.filter(p => (p.nameAr || '').toLowerCase().includes(searchQuery) || (p.nameEn || '').toLowerCase().includes(searchQuery));
        if (filterCategory !== 'all') filtered = filtered.filter(p => p.category === filterCategory);
        return filtered;
    }
    
    function updateSales(productId, newSales) {
        const product = products.find(p => p.id == productId);
        if (product) {
            let salesValue = parseInt(newSales);
            if (isNaN(salesValue)) salesValue = 0;
            product.sales = salesValue;
            saveProducts().then(() => {
                renderProductsTable();
                renderBestsellersList();
                updateBestsellerSelect();
            });
        }
    }
    
    function updateStock(productId, newStock) {
        const product = products.find(p => p.id == productId);
        if (product) {
            let stockValue = parseInt(newStock);
            if (isNaN(stockValue)) stockValue = 0;
            product.stock = stockValue;
            saveProducts().then(() => {
                renderProductsTable();
            });
        }
    }
    
    function setProductOrder(productId, newOrder) {
        let orderNum = parseInt(newOrder);
        if (isNaN(orderNum)) return;
        if (orderNum < 1) orderNum = 1;
        if (orderNum > products.length) orderNum = products.length;
        
        const currentIndex = products.findIndex(p => p.id == productId);
        if (currentIndex === -1) return;
        if (currentIndex + 1 === orderNum) return;
        
        const product = products[currentIndex];
        products.splice(currentIndex, 1);
        products.splice(orderNum - 1, 0, product);
        products.forEach((p, idx) => { p.order = idx; });
        saveProducts().then(() => {
            renderProductsTable();
            updateProductsStats();
            renderBestsellersList();
            updateBestsellerSelect();
        });
    }
    
    function moveToTop(productId) { setProductOrder(productId, 1); }
    function moveToBottom(productId) { setProductOrder(productId, products.length); }

                            <div class="edit-field"><label>🖼️ الصورة (رابط)</label><input type="text" id="editImageUrl_${p.id}" value="${escapeHtml(p.image || '')}" placeholder="رابط الصورة">
                            <div class="edit-image-upload" onclick="document.getElementById('editImageFile_${p.id}').click()"><i class="fas fa-cloud-upload-alt"></i> اختر صورة من جهازك<input type="file" id="editImageFile_${p.id}" accept="image/*" style="display:none;"></div>
                            <img id="editImagePreview_${p.id}" class="edit-image-preview" src="${p.image || ''}" onerror="this.style.display='none'" style="${p.image ? 'display:block' : 'display:none'}"></div>
                            <div class="edit-field"><label>📝 الوصف بالعربية</label><textarea id="editDescAr_${p.id}" rows="2">${escapeHtml(p.detailsAr || '')}</textarea></div>
                            <div class="edit-field"><label>📝 الوصف بالإنجليزية</label><textarea id="editDescEn_${p.id}" rows="2">${escapeHtml(p.detailsEn || '')}</textarea></div>
                            <div class="edit-field"><label>📂 التصنيف</label><select id="editCategory_${p.id}">${categories.map(cat => `<option value="${cat}" ${p.category === cat ? 'selected' : ''}>${categoryNames[cat]}</option>`).join('')}</select></div>
                            <div class="edit-buttons"><button onclick="saveEdit(${p.id})" style="background:#00cc88;">💾 حفظ</button><button onclick="closeEditForm(${p.id})" style="background:#ff4444;">إلغاء</button></div>
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
        
        products.forEach(p => {
            const fileInput = document.getElementById(`editImageFile_${p.id}`);
            if (fileInput) {
                fileInput.onchange = (e) => {
                    const file = e.target.files[0];
                    if (file) handleEditImageUpload(p.id, file);
                };
            }
        });
    }
    
    async function deleteProduct(id) {
        if (confirm('⚠️ حذف المنتج؟')) {
            products = products.filter(p => p.id != id);
            products.forEach((p, idx) => { p.order = idx; });
            await saveProducts();
            renderProductsTable();
            updateProductsStats();
            renderBestsellersList();
            updateBestsellerSelect();
            alert('✅ تم الحذف');
        }
    }
    
    function handleImageUpload(file, callback) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => callback(e.target.result);
        reader.readAsDataURL(file);
    }
    
    const uploadArea = document.getElementById("newImageUploadArea");
    const fileInput = document.getElementById("newImageFile");
    const preview = document.getElementById("newImagePreview");
    if (uploadArea) uploadArea.addEventListener("click", () => fileInput.click());
    if (fileInput) {
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) handleImageUpload(file, (data) => { currentImageData = data; preview.src = data; preview.style.display = "block"; });
        });
    }
    
    async function addProduct() {
        const nameAr = document.getElementById('newNameAr').value.trim();
        const nameEn = document.getElementById('newNameEn').value.trim();
        const category = document.getElementById('newCategorySelect').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        const oldPrice = parseFloat(document.getElementById('newOldPrice').value) || null;
        const stock = parseInt(document.getElementById('newStock').value) || 0;
        const sales = parseInt(document.getElementById('newSales').value) || 0;
        const image = currentImageData || "";
        const desc = document.getElementById('newDesc').value.trim();
        
        if (!nameAr || !nameEn || isNaN(price)) { 
            alert('⚠️ يرجى ملء الاسم والسعر'); 
            return; 
        }
        
        const newProduct = { 
            id: Date.now(), 
            nameAr, 
            nameEn, 
            category, 
            priceOMR: price, 
            oldPrice: (oldPrice && oldPrice > price) ? oldPrice : null, 
            stock, 
            image, 
            detailsAr: desc, 
            detailsEn: desc, 
            order: products.length, 
            sales: sales 
        };
        
        products.push(newProduct);
        const success = await saveProducts();
        
        if (success) {
            document.getElementById('newNameAr').value = ''; 
            document.getElementById('newNameEn').value = ''; 
            document.getElementById('newPrice').value = ''; 
            document.getElementById('newOldPrice').value = ''; 
            document.getElementById('newStock').value = '99'; 
            document.getElementById('newSales').value = '0'; 
            document.getElementById('newDesc').value = ''; 
            currentImageData = null; 
            preview.style.display = 'none';
            preview.src = '';
            
            alert('✅ تم إضافة المنتج');
            renderProductsTable();
            updateProductsStats();
            renderBestsellersList();
            updateBestsellerSelect();
        } else {
            products.pop();
            alert('❌ فشل الحفظ');
        }
    }
    
    function updateBestsellerSelect() {
        const select = document.getElementById('addToBestsellerSelect');
        if (!select) return;
        select.innerHTML = '<option value="">-- اختر لعبة --</option>';
        products.filter(p => p.category === 'games').forEach(p => {
            select.innerHTML += `<option value="${p.id}">${p.nameAr} (${p.sales || 0} مبيعات)</option>`;
        });
    }
    
    function addToBestsellers() {
        const productId = parseInt(document.getElementById('addToBestsellerSelect').value);
        const newSales = parseInt(document.getElementById('bestsellerSales').value);
        if (!productId || isNaN(newSales)) { alert('اختر لعبة وأدخل عدد المبيعات'); return; }
        const product = products.find(p => p.id === productId);
        if (product) {
            product.sales = newSales;
            saveProducts();
            renderBestsellersList();
            renderProductsTable();
            updateBestsellerSelect();
            alert(`✅ تم تحديث مبيعات ${product.nameAr} إلى ${newSales}`);
        }
    }
    
    function renderBestsellersList() {
        const sorted = [...products].filter(p => p.category === 'games').sort((a, b) => (b.sales || 0) - (a.sales || 0));
        const container = document.getElementById('bestsellerList');
        if (!container) return;
        container.innerHTML = sorted.map((p, index) => `
            <div class="bestseller-item">
                <div class="bestseller-item-info">
                    <div class="bestseller-rank">${index + 1}</div>
                    <img src="${p.image || 'https://via.placeholder.com/30'}" onerror="this.src='https://via.placeholder.com/30'">
                    <div><strong>${escapeHtml(p.nameAr)}</strong><br><small>${escapeHtml(p.nameEn)}</small></div>
                </div>
                <div class="bestseller-sales"><i class="fas fa-chart-line"></i> ${p.sales || 0}</div>
                <div><input type="number" class="sales-input" id="bestseller_sales_${p.id}" value="${p.sales || 0}" step="1" style="width:65px;"> <button onclick="updateSales(${p.id}, document.getElementById('bestseller_sales_${p.id}').value)" class="btn-sm btn-success">تحديث</button></div>
            </div>
        `).join('');
    }
    function refreshBestsellers() { renderBestsellersList(); alert('✅ تم تحديث القائمة'); }
    
    function updateOrdersStats() {
        const pending = orders.filter(o => o.status === 'pending').length;
        const completed = orders.filter(o => o.status === 'completed').length;
        const total = orders.length;
        const statsDiv = document.getElementById('ordersStats');
        if (statsDiv) {
            statsDiv.innerHTML = `
                <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-value">${pending}</div><div class="stat-label">قيد المعالجة</div></div>
                <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-value">${completed}</div><div class="stat-label">مكتملة</div></div>
                <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-value">${total}</div><div class="stat-label">إجمالي الطلبات</div></div>
            `;
            statsDiv.style.display = 'grid';
        }
    }
    
    function renderOrdersTable() {
        const container = document.getElementById('ordersTable');
        if (!container) return;
        if (orders.length === 0) { container.innerHTML = '<div class="loading">لا توجد طلبات</div>'; return; }
        container.innerHTML = `
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>رقم الطلب</th><th>المنتج</th><th>السعر</th><th>التاريخ</th><th>الحالة</th></tr></thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td>#${order.id}</td>
                                <td>${escapeHtml(order.productName || 'منتج')}</td>
                                <td>${order.price || 0} ر.ع</td>
                                <td>${order.date ? new Date(order.date).toLocaleDateString('ar') : '-'}</td>
                                <td><span class="status-badge status-${order.status || 'pending'}">${order.status === 'completed' ? 'مكتمل' : 'قيد المعالجة'}</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
    }
    
    function updateCategorySelect() {
        const select = document.getElementById('newCategorySelect');
        if (select) {
            select.innerHTML = categories.map(cat => `<option value="${cat}">${categoryNames[cat]}</option>`).join('');
        }
        const filterSelect = document.getElementById('filterCategory');
        if (filterSelect) {
            filterSelect.innerHTML = '<option value="all">الكل</option>' + categories.map(cat => `<option value="${cat}">${categoryNames[cat]}</option>`).join('');
        }
    }
    
    function renderCategoriesList() {
        const container = document.getElementById('categoriesList');
        if (!container) return;
        container.innerHTML = categories.map(cat => `
            <div class="category-badge">
                ${categoryNames[cat]}
                <i class="fas fa-trash-alt" onclick="deleteCategory('${cat}')"></i>
            </div>
        `).join('');
    }
    
    function deleteCategory(cat) {
        if (confirm(`حذف تصنيف "${categoryNames[cat]}"؟`)) {
            categories = categories.filter(c => c !== cat);
            delete categoryNames[cat];
            if (categoriesRef) categoriesRef.set({ categories, names: categoryNames });
            updateCategorySelect();
            renderCategoriesList();
            alert('✅ تم الحذف');
        }
    }
    
    document.getElementById('addCategoryBtn').onclick = () => {
        const newCat = document.getElementById('newCategoryName').value.trim();
        if (newCat && !categories.includes(newCat)) {
            categories.push(newCat);
            categoryNames[newCat] = newCat;
            if (categoriesRef) categoriesRef.set({ categories, names: categoryNames });
            updateCategorySelect();
            renderCategoriesList();
            document.getElementById('newCategoryName').value = '';
            alert('✅ تم إضافة التصنيف');
        } else {
            alert('التصنيف موجود أو فارغ');
        }
    };
    
    document.getElementById('searchInput').addEventListener('input', (e) => {
        searchQuery = e.target.value.toLowerCase();
        renderProductsTable();
    });
    document.getElementById('filterCategory').addEventListener('change', (e) => {
        filterCategory = e.target.value;
        renderProductsTable();
    });
    
    function escapeHtml(text) { 
        if (!text) return ''; 
        return text.toString().replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;"); 
    }
    
    function toggleMode() {
        document.body.classList.toggle('light-mode');
        const btn = document.querySelector('.mode-toggle-btn');
        if (document.body.classList.contains('light-mode')) {
            btn.innerHTML = '🌞 نهاري';
        } else {
            btn.innerHTML = '🌙 ليلي';
        }
        localStorage.setItem('admin_mode', document.body.classList.contains('light-mode') ? 'light' : 'dark');
    }
    const savedMode = localStorage.getItem('admin_mode');
    if (savedMode === 'light') {
        document.body.classList.add('light-mode');
        const btn = document.querySelector('.mode-toggle-btn');
        if (btn) btn.innerHTML = '🌞 نهاري';
    }
    
    window.updateSales = updateSales;
    window.updateStock = updateStock;
    window.setProductOrder = setProductOrder;
    window.moveToTop = moveToTop;
    window.moveToBottom = moveToBottom;
    window.openEditForm = openEditForm;
    window.closeEditForm = closeEditForm;
    window.saveEdit = saveEdit;
    window.deleteProduct = deleteProduct;
    window.addProduct = addProduct;
    window.addToBestsellers = addToBestsellers;
    window.refreshBestsellers = refreshBestsellers;
    window.toggleMode = toggleMode;
    
    checkSession();
</script>
</body>
</html>
