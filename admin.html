<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xnesto - لوحة الإدارة</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* المتغيرات العامة للوضع الليلي */
        :root {
            --bg-gradient-start: #0a0a1a;
            --bg-gradient-end: #0a0a1a;
            --card-bg: #11152b;
            --table-bg: rgba(255,255,255,0.03);
            --border-color: rgba(255, 170, 68, 0.3);
            --text-primary: #ffffff;
            --text-secondary: #eef;
            --text-muted: #aaa;
            --header-bg: #0f0f2a;
            --header-border: rgba(255, 170, 68, 0.3);
            --accent-color: #ffaa44;
            --accent-hover: #ffcc66;
            --input-bg: #1e1e3a;
            --input-border: #ffaa44;
            --table-header-bg: rgba(0,55,145,0.4);
            --table-border: rgba(255,255,255,0.08);
            --btn-primary: #00cc88;
            --btn-danger: #ff4444;
            --btn-warning: #ffaa44;
            --btn-secondary: #2d2f6e;
            --shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        /* الوضع النهاري */
        body.light-mode {
            --bg-gradient-start: #f5f7fa;
            --bg-gradient-end: #e9ecef;
            --card-bg: #ffffff;
            --table-bg: #ffffff;
            --border-color: #dee2e6;
            --text-primary: #1a1a2e;
            --text-secondary: #2d3436;
            --text-muted: #6c757d;
            --header-bg: #ffffff;
            --header-border: #ffaa44;
            --accent-color: #ff8800;
            --accent-hover: #ffaa44;
            --input-bg: #ffffff;
            --input-border: #ffaa44;
            --table-header-bg: #fff3e0;
            --table-border: #e9ecef;
            --btn-primary: #28a745;
            --btn-danger: #dc3545;
            --btn-warning: #ffc107;
            --btn-secondary: #6c757d;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        body {
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
            color: var(--text-primary);
            padding: 1rem;
            min-height: 100vh;
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        /* الهيدر */
        .header {
            text-align: center;
            background: var(--header-bg);
            padding: 0.8rem 1rem;
            border-radius: 1.2rem;
            margin-bottom: 1rem;
            border: 1px solid var(--header-border);
            box-shadow: var(--shadow);
        }
        .header h1 { 
            color: var(--accent-color); 
            font-size: 1.4rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .header p { 
            color: var(--text-secondary); 
            font-size: 0.75rem;
            opacity: 0.9;
        }
        
        /* زر تبديل الوضع */
        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--accent-color);
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-primary);
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .theme-toggle:hover {
            background: var(--accent-color);
            color: #1a1a2e;
        }
        
        /* أزرار التحكم */
        .control-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            justify-content: space-between;
            align-items: center;
        }
        .search-input, .filter-select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            color: var(--text-primary);
            font-size: 0.75rem;
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }
        .back-link, .logout-btn {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .back-link { 
            background: var(--accent-color); 
            color: #1a1a2e;
        }
        .back-link:hover {
            background: var(--accent-hover);
            transform: scale(1.02);
        }
        .logout-btn { 
            background: var(--btn-danger); 
            color: white;
        }
        .logout-btn:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        /* تبويبات */
        .admin-tabs {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 0.5rem;
        }
        .admin-tab {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-weight: bold;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .admin-tab.active { 
            background: var(--accent-color); 
            color: #1a1a2e;
            border-color: var(--accent-color);
        }
        .admin-tab:hover:not(.active) {
            background: var(--btn-secondary);
            color: white;
        }
        
        /* إحصائيات */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 0.6rem;
            margin-bottom: 1rem;
        }
        .stat-card {
            background: var(--card-bg);
            border-radius: 0.8rem;
            padding: 0.5rem;
            text-align: center;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
        }
        .stat-card i { 
            font-size: 1rem; 
            color: var(--accent-color); 
        }
        .stat-value { 
            font-size: 1.1rem; 
            font-weight: bold; 
            color: var(--accent-color); 
        }
        .stat-label { 
            font-size: 0.6rem; 
            opacity: 0.8; 
            color: var(--text-secondary);
        }
        
        /* جداول */
        .data-table {
            background: var(--table-bg);
            border-radius: 0.8rem;
            overflow-x: auto;
            margin-top: 0.5rem;
            box-shadow: var(--shadow);
        }
        table { 
            width: 100%; 
            border-collapse: collapse; 
        }
        th, td { 
            padding: 8px 6px; 
            text-align: center; 
            border-bottom: 1px solid var(--table-border); 
            font-size: 0.7rem; 
        }
        th { 
            background: var(--table-header-bg); 
            color: var(--accent-color); 
            font-weight: bold; 
        }
        td { 
            color: var(--text-secondary); 
        }
        
        /* أزرار صغيرة */
        .btn-sm {
            background: var(--btn-secondary);
            border: none;
            padding: 3px 8px;
            border-radius: 1.2rem;
            cursor: pointer;
            color: white;
            font-size: 0.65rem;
            transition: 0.2s;
        }
        .btn-sm:hover {
            opacity: 0.85;
            transform: scale(1.02);
        }
        .btn-success { background: var(--btn-primary); color: white; }
        .btn-danger { background: var(--btn-danger); color: white; }
        .btn-warning { background: var(--btn-warning); color: #1a1a2e; }
        
        /* حقول الإدخال في الجدول */
        .stock-input, .sales-input {
            width: 55px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 1rem;
            padding: 3px 4px;
            color: var(--text-primary);
            text-align: center;
            font-size: 0.7rem;
        }
        
        /* حالة الطلب */
        .status-badge { 
            padding: 2px 6px; 
            border-radius: 20px; 
            font-size: 0.6rem; 
            font-weight: bold; 
        }
        .status-pending { background: var(--btn-warning); color: #1a1a2e; }
        .status-processing { background: var(--btn-secondary); color: white; }
        .status-completed { background: var(--btn-primary); color: white; }
        
        /* أزرار التعديل والحذف */
        .edit-btn, .delete-btn { 
            padding: 2px 8px; 
            margin: 0 2px; 
            border: none; 
            border-radius: 1rem; 
            cursor: pointer; 
            font-size: 0.6rem;
            transition: 0.2s;
        }
        .edit-btn { background: var(--btn-warning); color: #1a1a2e; }
        .delete-btn { background: var(--btn-danger); color: white; }
        .order-btn { 
            background: var(--btn-secondary); 
            border: none; 
            padding: 2px 6px; 
            border-radius: 1rem; 
            cursor: pointer; 
            color: white; 
            font-size: 0.65rem;
        }
        
        /* نموذج إضافة منتج */
        .admin-panel {
            background: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .admin-panel h3 { 
            color: var(--accent-color); 
            margin-bottom: 0.5rem; 
            font-size: 0.9rem; 
        }
        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
        }
        .add-form input, .add-form textarea, .add-form select {
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            color: var(--text-primary);
            flex: 1;
            min-width: 90px;
            font-size: 0.7rem;
        }
        .add-form input::placeholder, .add-form textarea::placeholder {
            color: var(--text-muted);
        }
        .btn-save { 
            background: var(--btn-primary); 
            border: none; 
            padding: 0.4rem 1rem; 
            border-radius: 2rem; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.75rem;
            color: white;
        }
        .btn-save:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }
        
        /* إدارة التصنيفات */
        .categories-manager, .bestseller-manager {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 0.8rem;
            margin-bottom: 1rem;
            box-shadow: var(--shadow);
        }
        .categories-manager h3, .bestseller-manager h3 { 
            color: var(--accent-color); 
            margin-bottom: 0.5rem; 
            font-size: 0.9rem; 
        }
        .category-badge { 
            background: var(--btn-secondary); 
            padding: 3px 10px; 
            border-radius: 2rem; 
            font-size: 0.65rem; 
            display: inline-flex; 
            align-items: center; 
            gap: 5px;
            color: white;
        }
        
        /* نموذج تعديل المنتج */
        .product-edit-form {
            background: var(--card-bg);
            padding: 1rem;
            border-radius: 0.8rem;
            border: 1px solid var(--accent-color);
        }
        .product-edit-form input, .product-edit-form textarea, .product-edit-form select {
            width: 100%;
            padding: 0.4rem;
            margin: 0.2rem 0;
            border-radius: 1rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-primary);
            font-size: 0.7rem;
        }
        .product-edit-form label {
            display: block;
            font-size: 0.65rem;
            color: var(--accent-color);
            margin-bottom: 2px;
        }
        
        .footer { 
            text-align: center; 
            margin-top: 1.2rem; 
            padding: 0.8rem; 
            color: var(--text-muted); 
            font-size: 0.65rem; 
            border-top: 1px solid var(--border-color); 
        }
        .loading { 
            text-align: center; 
            padding: 1.5rem; 
            color: var(--accent-color); 
            font-size: 0.8rem; 
        }
        
        @media (max-width: 640px) {
            body { padding: 0.5rem; }
            th, td { padding: 4px 3px; font-size: 0.6rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            .admin-tab { padding: 0.3rem 0.8rem; font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px;">
        <h1><i class="fas fa-lock"></i> لوحة إدارة xnesto</h1>
        <button class="theme-toggle" id="themeToggle">
            <i class="fas fa-moon"></i>
            <span>الوضع الليلي</span>
        </button>
    </div>
    <p>إدارة المنتجات - المخزون - المبيعات - الطلبات</p>
</div>

<div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 0.8rem; justify-content: space-between;">
    <div>
        <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> المتجر</a>
        <button id="logoutBtn" class="logout-btn" style="display:none;"><i class="fas fa-sign-out-alt"></i> خروج</button>
    </div>
    <div>
        <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث">
        <select id="filterCategory" class="filter-select">
            <option value="all">الكل</option>
        </select>
    </div>
</div>

<!-- تبويبات -->
<div class="admin-tabs" id="adminTabs">
    <button class="admin-tab active" data-tab="products">📦 المنتجات</button>
    <button class="admin-tab" data-tab="bestsellers">🏆 الأكثر مبيعاً</button>
    <button class="admin-tab" data-tab="orders">📋 الطلبات</button>
    <button class="admin-tab" data-tab="coupons">🏷️ قسائم الخصم</button>
    <button class="admin-tab" data-tab="visitors">👥 الزوار</button>
    <button class="admin-tab" data-tab="categories">📁 التصنيفات</button>
</div>

<!-- قسم المنتجات -->
<div id="productsSection" class="section">
    <div id="productsStats" class="stats-grid" style="display:none;"></div>
    <div id="adminPanel" class="admin-panel" style="display:none;">
        <h3>➕ إضافة منتج جديد</h3>
        <div class="add-form">
            <input type="text" id="newNameAr" placeholder="الاسم بالعربية">
            <input type="text" id="newNameEn" placeholder="Name in English">
            <select id="newCategorySelect"></select>
            <input type="number" id="newPrice" step="0.5" placeholder="السعر">
            <input type="number" id="newOldPrice" step="0.5" placeholder="السعر القديم">
            <input type="number" id="newStock" step="1" placeholder="الكمية" value="99">
            <input type="number" id="newSales" step="1" placeholder="المبيعات" value="0">
            <div class="image-upload-area" id="newImageUploadArea" style="background: var(--input-bg); border: 2px dashed var(--accent-color); border-radius: 1rem; padding: 0.3rem; text-align: center; cursor: pointer; flex: 1;">
                <i class="fas fa-cloud-upload-alt"></i> 📸 صورة
                <input type="file" id="newImageFile" accept="image/*">
                <img id="newImagePreview" class="image-preview" style="max-width:100%; max-height:45px; border-radius:6px; display:none;">
            </div>
            <textarea id="newDesc" rows="1" placeholder="وصف المنتج"></textarea>
            <button class="btn-save" onclick="addProduct()">💾 إضافة</button>
        </div>
    </div>
    <div id="productsTable" class="data-table"><div class="loading">🔐 جاري التحميل...</div></div>
</div>

<!-- قسم الأكثر مبيعاً -->
<div id="bestsellersSection" class="section" style="display:none;">
    <div class="bestseller-manager">
        <h3><i class="fas fa-trophy"></i> إدارة الأكثر مبيعاً</h3>
        <div class="bestseller-controls" style="display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.5rem; align-items: center;">
            <select id="addToBestsellerSelect" style="background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 2rem; padding: 0.3rem 0.6rem; color: var(--text-primary); flex: 1; font-size: 0.7rem;">
                <option value="">-- اختر لعبة --</option>
            </select>
            <input type="number" id="bestsellerSales" placeholder="المبيعات" value="100" step="1" style="background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 2rem; padding: 0.3rem 0.6rem; color: var(--text-primary); width: 80px; font-size: 0.7rem;">
            <button class="btn-sm btn-success" onclick="addToBestsellers()">➕ إضافة</button>
        </div>
        <div id="bestsellerList" class="bestseller-list" style="background: rgba(0,0,0,0.1); border-radius: 0.8rem; padding: 0.4rem; max-height: 350px; overflow-y: auto;"></div>
        <div style="margin-top:8px;"><button class="btn-sm" onclick="refreshBestsellers()">🔄 تحديث الترتيب</button></div>
    </div>
</div>

<!-- قسم الطلبات -->
<div id="ordersSection" class="section" style="display:none;">
    <div id="ordersStats" class="stats-grid" style="display:none;"></div>
    <div class="data-table" id="ordersTable"><div class="loading">جاري تحميل الطلبات...</div></div>
</div>

<!-- قسم قسائم الخصم -->
<div id="couponsSection" class="section" style="display:none;">
    <div class="admin-panel">
        <h3>➕ إضافة قسيمة خصم</h3>
        <div class="add-form">
            <input type="text" id="couponCode" placeholder="كود القسيمة">
            <input type="number" id="couponDiscount" step="1" placeholder="الخصم %" value="10">
            <input type="number" id="couponMaxUses" step="1" placeholder="عدد الاستخدام" value="50">
            <input type="date" id="couponExpiry">
            <button class="btn-save" onclick="addCoupon()">💾 إضافة</button>
        </div>
    </div>
    <div id="couponsTable" class="data-table"><div class="loading">جاري التحميل...</div></div>
</div>

<!-- قسم الزوار -->
<div id="visitorsSection" class="section" style="display:none;">
    <div id="visitorStats" class="stats-grid" style="display:none;"></div>
    <div id="visitorsTable" class="data-table"></div>
</div>

<!-- قسم التصنيفات -->
<div id="categoriesSection" class="section" style="display:none;">
    <div class="categories-manager">
        <h3><i class="fas fa-tags"></i> إدارة التصنيفات</h3>
        <div id="categoriesList" class="categories-list" style="display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.5rem;"></div>
        <div class="add-category-input" style="display: flex; gap: 0.4rem; align-items: center; flex-wrap: wrap;">
            <input type="text" id="newCategoryName" placeholder="تصنيف جديد" style="background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 2rem; padding: 0.3rem 0.8rem; color: var(--text-primary); flex: 1; font-size: 0.7rem;">
            <button id="addCategoryBtn" style="background: var(--accent-color); border: none; padding: 0.3rem 1rem; border-radius: 2rem; cursor: pointer; font-weight: bold; color: #1a1a2e; font-size: 0.7rem;"><i class="fas fa-plus"></i> إضافة</button>
        </div>
    </div>
</div>

<div class="footer">
    <p>📞 واتساب: +96879977100 | 📸 انستقرام: xnesto_store</p>
</div>

<script>
    // ==================== الوضع الليلي/النهاري ====================
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = themeToggle.querySelector('i');
    const themeText = themeToggle.querySelector('span');
    
    function setTheme(theme) {
        if (theme === 'light') {
            document.body.classList.add('light-mode');
            themeIcon.className = 'fas fa-sun';
            themeText.textContent = 'الوضع النهاري';
            localStorage.setItem('xnesto_theme', 'light');
        } else {
            document.body.classList.remove('light-mode');
            themeIcon.className = 'fas fa-moon';
            themeText.textContent = 'الوضع الليلي';
            localStorage.setItem('xnesto_theme', 'dark');
        }
    }
    
    const savedTheme = localStorage.getItem('xnesto_theme');
    if (savedTheme === 'light') {
        setTheme('light');
    } else {
        setTheme('dark');
    }
    
    themeToggle.addEventListener('click', () => {
        const isLight = document.body.classList.contains('light-mode');
        if (isLight) {
            setTheme('dark');
        } else {
            setTheme('light');
        }
    });
    
    const firebaseConfig = { databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const productsRef = database.ref('products');
    const visitorsRef = database.ref('visitors');
    const categoriesRef = database.ref('categories');
    const ordersRef = database.ref('orders');
    const couponsRef = database.ref('coupons');
    
    let products = [];
    let categories = ["games", "giftcards"];
    let categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
    let orders = [];
    let coupons = [];
    let currentImageData = null;
    let isLoggedIn = false;
    let searchQuery = "";
    let filterCategory = "all";
    let currentTab = "products";
    const ADMIN_PASSWORD = "ssp1995";
    const SESSION_KEY = "xnesto_admin_logged";
    const WA_NUMBER = "96879977100";
    
    // المنتجات الافتراضية

    // ==================== التحقق من الدخول ====================
    function checkSession() {
        if (localStorage.getItem(SESSION_KEY) === "true") { isLoggedIn = true; showAdminPanel(); }
        else askPassword();
    }
    
    function askPassword() {
        const pwd = prompt('🔐 أدخل كلمة سر الأدمن:');
        if (pwd === ADMIN_PASSWORD) {
            isLoggedIn = true;
            localStorage.setItem(SESSION_KEY, "true");
            showAdminPanel();
        } else if (pwd !== null) { alert('❌ كلمة السر غير صحيحة'); window.location.href = 'index.html'; }
    }
    
    function showAdminPanel() {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        loadProducts();
        loadOrders();
        loadCoupons();
        loadVisitorStats();
        loadCategories();
        switchTab('products');
    }
    
    function logout() { localStorage.removeItem(SESSION_KEY); window.location.reload(); }
    document.getElementById('logoutBtn').onclick = logout;
    
    // ==================== Tabs ====================
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.onclick = () => switchTab(tab.dataset.tab);
    });
    
    function switchTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        document.querySelector(`.admin-tab[data-tab="${tab}"]`).classList.add('active');
        document.querySelectorAll('.section').forEach(s => s.style.display = 'none');
        document.getElementById(`${tab}Section`).style.display = 'block';
        if (tab === 'products') { renderProductsTable(); updateProductsStats(); }
        if (tab === 'bestsellers') { renderBestsellersList(); updateBestsellerSelect(); }
        if (tab === 'orders') { renderOrdersTable(); updateOrdersStats(); }
        if (tab === 'coupons') { renderCouponsTable(); }
        if (tab === 'visitors') { loadVisitorStats(); }
        if (tab === 'categories') { renderCategoriesList(); }
    }
    
    // ==================== المنتجات ====================
    function loadProducts() {
        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data) && data.length > 0) products = data.sort((a, b) => (a.order || 0) - (b.order || 0));
            else { products = JSON.parse(JSON.stringify(allDefaultProducts)); products.forEach((p, idx) => { p.order = idx; }); productsRef.set(products); }
            renderProductsTable();
            updateProductsStats();
            renderBestsellersList();
            updateBestsellerSelect();
        });
    }
    
    function saveProducts() { productsRef.set(products); }
    
    function updateProductsStats() {
        const totalProducts = products.length;
        const totalStock = products.reduce((sum, p) => sum + (p.stock || 0), 0);
        const totalValue = products.reduce((sum, p) => sum + ((p.priceOMR || 0) * (p.stock || 0)), 0);
        const totalSales = products.reduce((sum, p) => sum + (p.sales || 0), 0);
        document.getElementById('productsStats').innerHTML = `
            <div class="stat-card"><i class="fas fa-box"></i><div class="stat-value">${totalProducts}</div><div class="stat-label">منتجات</div></div>
            <div class="stat-card"><i class="fas fa-cubes"></i><div class="stat-value">${totalStock}</div><div class="stat-label">إجمالي الكمية</div></div>
            <div class="stat-card"><i class="fas fa-dollar-sign"></i><div class="stat-value">${totalValue.toFixed(2)}</div><div class="stat-label">قيمة المخزون</div></div>
            <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-value">${totalSales}</div><div class="stat-label">إجمالي المبيعات</div></div>
        `;
        document.getElementById('productsStats').style.display = 'grid';
    }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery) filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(searchQuery) || p.nameEn.toLowerCase().includes(searchQuery));
        if (filterCategory !== 'all') filtered = filtered.filter(p => p.category === filterCategory);
        return filtered;
    }
    
    function updateSales(productId, newSales) {
        const product = products.find(p => p.id === productId);
        if (product) { product.sales = parseInt(newSales); saveProducts(); renderProductsTable(); renderBestsellersList(); updateBestsellerSelect(); }
    }

                    const file = e.target.files[0];
                    if (file) handleImageUpload(file, (data) => { editPreview.src = data; editPreview.style.display = "block"; window[`tempEditImage_${p.id}`] = data; });

    function moveProductUp(index) { if (index === 0) return; [products[index], products[index-1]] = [products[index-1], products[index]]; saveProducts(); renderProductsTable(); }
    function moveProductDown(index) { if (index === products.length-1) return; [products[index], products[index+1]] = [products[index+1], products[index]]; saveProducts(); renderProductsTable(); }
    function updateStock(id, newStock) { const p = products.find(p => p.id === id); if (p) { p.stock = parseInt(newStock); saveProducts(); renderProductsTable(); } }
    function openEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'table-row'; }
    function closeEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'none'; }
    
    async function saveEdit(id) {
        const p = products.find(p => p.id === id);
        if (!p) return;
        p.nameAr = document.getElementById(`editNameAr_${id}`).value;
        p.nameEn = document.getElementById(`editNameEn_${id}`).value;
        p.priceOMR = parseFloat(document.getElementById(`editPrice_${id}`).value);
        p.oldPrice = parseFloat(document.getElementById(`editOldPrice_${id}`).value) || null;
        p.stock = parseInt(document.getElementById(`editStock_${id}`).value) || 0;
        p.sales = parseInt(document.getElementById(`editSales_${id}`).value) || 0;
        const tempImage = window[`tempEditImage_${id}`];
        if (tempImage) { p.image = tempImage; delete window[`tempEditImage_${id}`]; }
        else p.image = document.getElementById(`editImageUrl_${id}`).value;
        p.detailsAr = document.getElementById(`editDescAr_${id}`).value;
        p.detailsEn = document.getElementById(`editDescEn_${id}`).value;
        p.category = document.getElementById(`editCategory_${id}`).value;
        await saveProducts();
        closeEditForm(id);
        alert('✅ تم التحديث');
        renderProductsTable();
        updateProductsStats();
        renderBestsellersList();
        updateBestsellerSelect();
    }
    
    async function deleteProduct(id) {
        if (confirm('⚠️ حذف المنتج؟')) {
            products = products.filter(p => p.id !== id);
            await saveProducts();
            renderProductsTable();
            updateProductsStats();
            renderBestsellersList();
            updateBestsellerSelect();
            alert('✅ تم الحذف');
        }
    }
    
    function handleImageUpload(file, callback) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => callback(e.target.result);
        reader.readAsDataURL(file);
    }
    
    const uploadArea = document.getElementById("newImageUploadArea");
    const fileInput = document.getElementById("newImageFile");
    const preview = document.getElementById("newImagePreview");
    if (uploadArea) uploadArea.addEventListener("click", () => fileInput.click());
    if (fileInput) {
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) handleImageUpload(file, (data) => { currentImageData = data; preview.src = data; preview.style.display = "block"; });
        });
    }
    
    async function addProduct() {
        const nameAr = document.getElementById('newNameAr').value.trim();
        const nameEn = document.getElementById('newNameEn').value.trim();
        const category = document.getElementById('newCategorySelect').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        const oldPrice = parseFloat(document.getElementById('newOldPrice').value) || null;
        const stock = parseInt(document.getElementById('newStock').value) || 0;
        const sales = parseInt(document.getElementById('newSales').value) || 0;
        const image = currentImageData || "";
        const desc = document.getElementById('newDesc').value.trim();
        if (!nameAr || !nameEn || isNaN(price)) { alert('يرجى ملء الاسم والسعر'); return; }
        const newProduct = { id: Date.now(), nameAr, nameEn, category, priceOMR: price, oldPrice: (oldPrice && oldPrice > price) ? oldPrice : null, stock, image, detailsAr: desc, detailsEn: desc, order: products.length, sales: sales };
        products.push(newProduct);
        await saveProducts();
        document.getElementById('newNameAr').value = ''; document.getElementById('newNameEn').value = ''; document.getElementById('newPrice').value = ''; document.getElementById('newOldPrice').value = ''; document.getElementById('newStock').value = '99'; document.getElementById('newSales').value = '0'; document.getElementById('newDesc').value = ''; currentImageData = null; document.getElementById('newImagePreview').style.display = 'none';
        alert('✅ تم الإضافة');
        renderProductsTable();
        updateProductsStats();
        renderBestsellersList();
        updateBestsellerSelect();
    }
    
    // ==================== الأكثر مبيعاً ====================
    function updateBestsellerSelect() {
        const select = document.getElementById('addToBestsellerSelect');
        select.innerHTML = '<option value="">-- اختر لعبة --</option>';
        products.filter(p => p.category === 'games').forEach(p => {
            select.innerHTML += `<option value="${p.id}">${p.nameAr} (${p.sales || 0} مبيعات)</option>`;
        });
    }
    
    function addToBestsellers() {
        const productId = parseInt(document.getElementById('addToBestsellerSelect').value);
        const newSales = parseInt(document.getElementById('bestsellerSales').value);
        if (!productId || isNaN(newSales)) { alert('اختر لعبة وأدخل عدد المبيعات'); return; }
        const product = products.find(p => p.id === productId);
        if (product) {
            product.sales = newSales;
            saveProducts();
            renderBestsellersList();
            renderProductsTable();
            updateBestsellerSelect();
            alert(`✅ تم تحديث مبيعات ${product.nameAr} إلى ${newSales}`);
        }
    }
    
    function renderBestsellersList() {
        const sorted = [...products].filter(p => p.category === 'games').sort((a, b) => (b.sales || 0) - (a.sales || 0));
        const container = document.getElementById('bestsellerList');
        container.innerHTML = sorted.map((p, index) => `
            <div class="bestseller-item" style="display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; border-bottom: 1px solid var(--border-color);">

                    <div style="background: var(--accent-color); color: #1a1a2e; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.65rem;">${index + 1}</div>
                    <img src="${p.image || 'https://via.placeholder.com/30'}" width="30" height="30" style="border-radius:6px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/30'">
                    <div><strong>${escapeHtml(p.nameAr)}</strong><br><small style="opacity:0.7;">${escapeHtml(p.nameEn)}</small></div>
                </div>
                <div style="background: var(--btn-secondary); padding: 2px 6px; border-radius: 20px; font-size: 0.6rem;"><i class="fas fa-chart-line"></i> ${p.sales || 0}</div>
                <div><input type="number" class="sales-input" id="bestseller_sales_${p.id}" value="${p.sales || 0}" step="1" style="width:65px;" onchange="updateSales(${p.id}, this.value)"> <button onclick="updateSales(${p.id}, document.getElementById('bestseller_sales_${p.id}').value)" class="btn-sm btn-success">تحديث</button></div>
            </div>
        `).join('');
    }
    
    function refreshBestsellers() { renderBestsellersList(); alert('✅ تم تحديث القائمة'); }
    
    // ==================== الطلبات ====================
    function loadOrders() {
        ordersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) orders = Object.values(data).sort((a,b) => b.id - a.id);
            else orders = [];
            renderOrdersTable();
            updateOrdersStats();
        });
    }
    
    function updateOrdersStats() {
        const pending = orders.filter(o => o.status === 'pending').length;
        const completed = orders.filter(o => o.status === 'completed').length;
        const total = orders.length;
        document.getElementById('ordersStats').innerHTML = `
            <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-value">${pending}</div><div class="stat-label">قيد الانتظار</div></div>
            <div class="stat-card"><i class="fas fa-check-circle"></i><div class="stat-value">${completed}</div><div class="stat-label">مكتملة</div></div>
            <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-value">${total}</div><div class="stat-label">إجمالي الطلبات</div></div>
        `;
        document.getElementById('ordersStats').style.display = 'grid';
    }
    
    function renderOrdersTable() {
        const container = document.getElementById('ordersTable');
        if (!orders.length) { container.innerHTML = '<div class="loading">لا توجد طلبات</div>'; return; }
        container.innerHTML = `
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>رقم الطلب</th><th>المنتج</th><th>السعر</th><th>العميل</th><th>الحالة</th><th>التاريخ</th><th>إجراءات</th></tr></thead>
                    <tbody>${orders.map(o => `
                        <tr>
                            <td>#${o.id}</td>
                            <td>${o.productName || '-'}</td>
                            <td>${o.total || 0} ر.ع</td>
                            <td>${o.customerName || o.phone || '-'}</td>
                            <td><span class="status-badge status-${o.status || 'pending'}">${o.status === 'pending' ? 'قيد الانتظار' : o.status === 'processing' ? 'قيد التجهيز' : 'مكتمل'}</span></td>
                            <td>${new Date(o.createdAt).toLocaleDateString('ar')}</td>
                            <td><select onchange="updateOrderStatus(${o.id}, this.value)" class="status-select" style="background: var(--input-bg); border: 1px solid var(--input-border); border-radius: 1rem; padding: 2px 4px; color: var(--text-primary);"><option value="pending" ${o.status === 'pending' ? 'selected' : ''}>قيد الانتظار</option><option value="processing" ${o.status === 'processing' ? 'selected' : ''}>قيد التجهيز</option><option value="completed" ${o.status === 'completed' ? 'selected' : ''}>مكتمل</option></select></td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            </div>
        `;
    }
    
    function updateOrderStatus(orderId, newStatus) {
        const order = orders.find(o => o.id == orderId);
        if (order) { order.status = newStatus; ordersRef.set(orders); alert('✅ تم تحديث حالة الطلب'); }
    }
    
    // ==================== قسائم الخصم ====================
    function loadCoupons() {
        couponsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) coupons = Object.values(data);
            else coupons = defaultCoupons;
            renderCouponsTable();
        });
    }
    
    function renderCouponsTable() {
        const container = document.getElementById('couponsTable');
        if (!coupons.length) { container.innerHTML = '<div class="loading">لا توجد قسائم</div>'; return; }
        container.innerHTML = `
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>الكود</th><th>الخصم %</th><th>الاستخدام</th><th>الحد الأقصى</th><th>تاريخ الانتهاء</th><th>الحالة</th><th>إجراءات</th></tr></thead>
                    <tbody>${coupons.map((c, idx) => `
                        <tr>
                            <td><strong>${c.code}</strong></td>
                            <td>${c.discount}%</td>
                            <td>${c.used || 0}</td>
                            <td>${c.maxUses || '-'}</td>
                            <td>${c.expiry || '-'}</td>
                            <td><span class="status-badge ${c.active !== false ? 'status-completed' : 'status-pending'}">${c.active !== false ? 'نشطة' : 'منتهية'}</span></td>
                            <td><button class="delete-btn" onclick="deleteCoupon(${idx})">🗑️</button></td>
                        </tr>
                    `).join('')}</tbody>
                </table>
            </div>
        `;
    }
    
    function addCoupon() {
        const code = document.getElementById('couponCode').value.trim().toUpperCase();
        const discount = parseInt(document.getElementById('couponDiscount').value);
        const maxUses = parseInt(document.getElementById('couponMaxUses').value);
        const expiry = document.getElementById('couponExpiry').value;
        if (!code || isNaN(discount)) { alert('يرجى إدخال الكود والخصم'); return; }
        coupons.push({ code, discount, maxUses, used: 0, expiry, active: true });
        couponsRef.set(coupons);
        document.getElementById('couponCode').value = '';
        document.getElementById('couponDiscount').value = '10';
        document.getElementById('couponMaxUses').value = '50';
        document.getElementById('couponExpiry').value = '';
        alert('✅ تم إضافة القسيمة');
        renderCouponsTable();
    }
    
    function deleteCoupon(index) {
        if (confirm('هل تريد حذف هذه القسيمة؟')) {
            coupons.splice(index, 1);
            couponsRef.set(coupons);
            alert('✅ تم الحذف');
            renderCouponsTable();
        }
    }
    
    // ==================== الزوار ====================
    function loadVisitorStats() {
        visitorsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            const today = new Date().toISOString().split('T')[0];
            const todayVisits = data && data[today] ? data[today] : 0;
            let total = 0;
            if (data) { for (let key in data) total += data[key]; }
            document.getElementById('visitorStats').innerHTML = `
                <div class="stat-card"><i class="fas fa-calendar-day"></i><div class="stat-value">${todayVisits}</div><div class="stat-label">زوار اليوم</div></div>
                <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-value">${total}</div><div class="stat-label">إجمالي الزوار</div></div>
            `;
            document.getElementById('visitorStats').style.display = 'grid';
            
            let tableHtml = '<div style="overflow-x:auto;"><table><thead><tr><th>التاريخ</th><th>عدد الزوار</th></tr></thead><tbody>';
            if (data) {
                const sorted = Object.keys(data).sort().reverse();
                for (let date of sorted) {
                    tableHtml += `<tr><td>${date}</td><td>${data[date]}</td></tr>`;
                }
            }
            tableHtml += '</tbody></table></div>';
            document.getElementById('visitorsTable').innerHTML = tableHtml;
        });
    }
    
    // ==================== التصنيفات ====================
    function loadCategories() {
        categoriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.categories) categories = data.categories;
            if (data && data.names) categoryNames = data.names;
            renderCategoriesList();
            updateCategorySelects();
        });
    }
    
    function renderCategoriesList() {
        const container = document.getElementById('categoriesList');
        container.innerHTML = categories.map(cat => `
            <div class="category-badge">
                ${categoryNames[cat] || cat}
                <i class="fas fa-trash" onclick="deleteCategory('${cat}')" style="cursor:pointer; color:#ff8888;"></i>
            </div>
        `).join('');
        if (!categories.length) container.innerHTML = '<div style="color: var(--text-muted);">لا توجد تصنيفات</div>';
    }
    
    function updateCategorySelects() {
        const select = document.getElementById('newCategorySelect');
        if (select) {
            select.innerHTML = categories.map(cat => `<option value="${cat}">${categoryNames[cat] || cat}</option>`).join('');
        }
    }
    
    function addCategory() {
        const newCat = document.getElementById('newCategoryName').value.trim().toLowerCase().replace(/\s+/g, '_');
        if (!newCat) { alert('أدخل اسم التصنيف'); return; }
        if (categories.includes(newCat)) { alert('التصنيف موجود بالفعل'); return; }
        categories.push(newCat);
        categoryNames[newCat] = document.getElementById('newCategoryName').value.trim();
        categoriesRef.set({ categories, names: categoryNames });
        document.getElementById('newCategoryName').value = '';
        renderCategoriesList();
        updateCategorySelects();
        alert('✅ تم إضافة التصنيف');
    }
    
    function deleteCategory(cat) {
        if (cat === 'games' || cat === 'giftcards') { alert('لا يمكن حذف التصنيفات الأساسية'); return; }
        if (confirm(`حذف تصنيف "${categoryNames[cat] || cat}"؟`)) {
            categories = categories.filter(c => c !== cat);
            delete categoryNames[cat];
            categoriesRef.set({ categories, names: categoryNames });
            renderCategoriesList();
            updateCategorySelects();
            alert('✅ تم الحذف');
        }
    }
    
    document.getElementById('addCategoryBtn').onclick = addCategory;
    document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderProductsTable(); });
    document.getElementById('filterCategory').addEventListener('change', (e) => { filterCategory = e.target.value; renderProductsTable(); });
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    checkSession();
</script>
</body>
</html>
