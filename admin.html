        body {

            font-family: 'Cairo', 'Segoe UI', Tahoma, system-ui, sans-serif;
            color: #f0f0ff;
            padding: 1rem;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            background: linear-gradient(135deg, #0f0f2a, #0a0a1f);
            padding: 1rem;
            border-radius: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255, 170, 68, 0.3);
        }
        .header h1 { color: #ffaa44; font-size: 1.5rem; }
        .header p { color: #ffdd99; font-size: 0.8rem; }
        
        .login-box {
            max-width: 400px;
            margin: 2rem auto;
            background: #11152b;
            border-radius: 1.5rem;
            padding: 2rem;
            text-align: center;
            border: 2px solid #ffaa44;
        }
        .login-box h2 { color: #ffaa44; margin-bottom: 1rem; }
        .login-box input {
            width: 100%;

            border-radius: 2rem;
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            color: white;
            font-size: 1rem;
        }
        .login-box button {
            width: 100%;
            padding: 0.8rem;
            margin-top: 0.5rem;
            border-radius: 2rem;

            color: #0a0a1a;

            border: none;
            cursor: pointer;

        }

            background: #1e1e3a;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            cursor: pointer;
            color: #ccc;
            font-weight: bold;
            transition: 0.2s;
        }
        .admin-tab.active { background: #ffaa44; color: #0a0a1a; }

            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));

        .section-card {
            background: #11152b;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(255,170,68,0.3);
        }
        .section-card h3 { color: #ffaa44; margin-bottom: 0.5rem; font-size: 1rem; }

            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .flex-form input, .flex-form select, .flex-form textarea {
            background: #1e1e3a;
            border: 1px solid #ffaa44;
            border-radius: 2rem;
            padding: 0.5rem;
            color: white;
            flex: 1;
            min-width: 120px;
        }
        .btn-save { background: #00cc88; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; font-weight: bold; color: #0a0a1a; }
        .btn-sm { background: #2d2f6e; border: none; padding: 0.3rem 0.8rem; border-radius: 2rem; cursor: pointer; color: white; }
        
        .items-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.5rem; }
        .item-badge {
            background: #1e1e3a;
            border-radius: 2rem;
            padding: 0.3rem 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.7rem;
        }
        .item-badge i { cursor: pointer; color: #ff6666; }
        
        .products-table {
            background: rgba(255,255,255,0.05);
            border-radius: 1rem;
            overflow-x: auto;
            margin-top: 0.5rem;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.75rem; }
        th { background: rgba(0,55,145,0.4); color: #ffaa44; }

        .edit-btn, .delete-btn {
            padding: 3px 8px;
            margin: 0 2px;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
        }
        .edit-btn { background: #ffa500; color: #fff; }
        .delete-btn { background: #ff4444; color: #fff; }
        .product-edit-form {
            background: #1e1e3a;
            padding: 1rem;
            border-radius: 1rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));

        .edit-field { display: flex; flex-direction: column; gap: 5px; }

            background: #0a0c1a;
            border: 1px solid #ffaa44;
            color: white;
        }
        .edit-buttons { grid-column: 1/-1; display: flex; gap: 10px; justify-content: center; margin-top: 0.5rem; }
        
        .control-bar {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem;
            justify-content: space-between;
        }

            border: 1px solid #ffaa44;
            border-radius: 2rem;
            padding: 0.4rem 0.8rem;
            color: white;

        .back-link, .logout-btn {
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            text-decoration: none;
            font-weight: bold;
            cursor: pointer;
            display: inline-block;
        }
        .back-link { background: #ffaa44; color: #0a0a1a; }
        .logout-btn { background: #ff4444; color: white; border: none; }

            background: #1e1e3a;

            border-radius: 1rem;
            padding: 0.5rem;
            text-align: center;
            cursor: pointer;
            flex: 1;
        }
        .image-upload-area input { display: none; }
        .image-preview { margin-top: 5px; max-width: 100%; max-height: 50px; border-radius: 8px; display: none; }

        .loading { text-align: center; padding: 2rem; color: #ffaa44; }
        
        .admin-notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #11152b;
            border-right: 4px solid #ffaa44;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10000;
            animation: slideInRight 0.5s ease;
        }
        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        @media (max-width: 640px) {
            body { padding: 0.5rem; }
            th, td { padding: 4px; font-size: 0.65rem; }
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }

</head>
<body>

<div class="header">
    <h1>🔐 لوحة إدارة xnesto <i class="fas fa-chart-line"></i></h1>
    <p>إدارة المنتجات - العروض - التصنيفات</p>
</div>

<div id="loginSection" class="login-box">

        </div>
        <div>
            <input type="text" id="searchInput" class="search-input" placeholder="🔍 بحث">
            <select id="filterCategory" class="filter-select">
                <option value="all">الكل</option>
            </select>
        </div>
    </div>

    <div class="admin-tabs">
        <button class="admin-tab active" onclick="showTab('products')">📦 المنتجات</button>
        <button class="admin-tab" onclick="showTab('offers')">🏷️ العروض</button>
        <button class="admin-tab" onclick="showTab('categories')">📁 التصنيفات</button>
    </div>

    <div id="dashboardSection" class="dashboard-grid">
        <div class="dashboard-card"><i class="fas fa-box"></i><div class="value" id="statProducts">0</div><div class="label">المنتجات</div></div>
        <div class="dashboard-card"><i class="fas fa-chart-line"></i><div class="value" id="statSales">0</div><div class="label">إجمالي المبيعات</div></div>
        <div class="dashboard-card"><i class="fas fa-tags"></i><div class="value" id="statOffers">0</div><div class="label">العروض النشطة</div></div>
    </div>

    <div id="productsTab" class="section-card">
        <h3>➕ إضافة منتج جديد</h3>
        <div class="flex-form">
            <input type="text" id="newNameAr" placeholder="الاسم بالعربية">
            <input type="text" id="newNameEn" placeholder="Name in English">
            <select id="newCategorySelect"></select>
            <input type="number" id="newPrice" step="0.5" placeholder="السعر">
            <input type="number" id="newOldPrice" step="0.5" placeholder="السعر القديم">
            <input type="number" id="newStock" step="1" placeholder="الكمية" value="99">
            <div class="image-upload-area" id="newImageUploadArea">
                <i class="fas fa-cloud-upload-alt"></i> 📸 صورة
                <input type="file" id="newImageFile" accept="image/*">
                <img id="newImagePreview" class="image-preview">
            </div>
            <textarea id="newDesc" rows="2" placeholder="وصف المنتج"></textarea>
            <textarea id="newDescEn" rows="2" placeholder="Product description"></textarea>
            <button class="btn-save" onclick="addProduct()">💾 إضافة</button>
        </div>
        <div id="productsTable" class="products-table"><div class="loading">جاري التحميل...</div></div>
    </div>

    <div id="offersTab" class="section-card" style="display:none;">
        <h3><i class="fas fa-calendar-alt"></i> إدارة العروض الأسبوعية</h3>
        <div class="flex-form">
            <select id="offerProductSelect"></select>
            <input type="number" id="offerDiscount" placeholder="نسبة الخصم %" step="5">
            <button class="btn-save" onclick="addWeeklyOffer()">➕ إضافة عرض</button>
        </div>
        <div id="offersList" class="items-list"></div>
    </div>

    <div id="categoriesTab" class="section-card" style="display:none;">
        <h3><i class="fas fa-tags"></i> إدارة التصنيفات</h3>
        <div id="categoriesList" class="items-list"></div>
        <div class="flex-form">
            <input type="text" id="newCategoryName" placeholder="تصنيف جديد">
            <button class="btn-save" onclick="addCategory()">➕ إضافة تصنيف</button>
        </div>
    </div>

    <div class="footer">
        <p>📞 واتساب: +96879977100 | 📸 انستقرام: xnesto_store</p>
    </div>
</div>

<script>
    const ADMIN_PASSWORD = "ssp1995";
    const SESSION_KEY = "xnesto_admin_logged";
    const firebaseConfig = { databaseURL: "https://xnesto-645bf-default-rtdb.asia-southeast1.firebasedatabase.app/" };
    
    let products = [];
    let categories = ["games", "giftcards"];
    let categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
    let weeklyOffers = [];
    let currentImageData = null;
    let searchQuery = "";
    let filterCategory = "all";
    let currentTab = "products";
    let notificationTimeout = null;
    
    let db, productsRef, categoriesRef, offersRef;
    
    function checkSession() {
        const isLoggedIn = localStorage.getItem(SESSION_KEY) === "true";
        if (isLoggedIn) {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            initFirebaseAndLoad();
        }
    }
    
    function checkPassword() {
        const pwd = document.getElementById('adminPassword').value;
        if (pwd === ADMIN_PASSWORD) {
            localStorage.setItem(SESSION_KEY, "true");
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminContent').style.display = 'block';
            initFirebaseAndLoad();
        } else {
            document.getElementById('loginError').innerHTML = '❌ كلمة السر غير صحيحة';
        }
    }
    
    function logout() {
        localStorage.removeItem(SESSION_KEY);
        document.getElementById('loginSection').style.display = 'block';
        document.getElementById('adminContent').style.display = 'none';
        document.getElementById('adminPassword').value = '';
        document.getElementById('loginError').innerHTML = '';
    }
    
    function initFirebaseAndLoad() {
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        productsRef = db.ref('products');
        categoriesRef = db.ref('categories');
        offersRef = db.ref('weekly_offers');
        
        loadProducts();
        loadCategories();
        loadWeeklyOffers();
    }
    
    const defaultGames = [

        { id: 6, nameAr: "Elden Ring", nameEn: "Elden Ring", priceOMR: 12, oldPrice: 18, stock: 55, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1245620/header.jpg", detailsAr: "🏷️ 60GB | ⚔️ RPG خيالي", detailsEn: "📦 60GB | ⚔️ Fantasy RPG", order: 6, category: "games" },
        { id: 7, nameAr: "Horizon Forbidden West", nameEn: "Horizon Forbidden West", priceOMR: 15, oldPrice: 20, stock: 50, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1151640/header.jpg", detailsAr: "🏷️ 96GB | 🦕 مغامرة مستقبلية", detailsEn: "📦 96GB | 🦕 Future Adventure", order: 7, category: "games" },

        { id: 13, nameAr: "Tekken 8", nameEn: "Tekken 8", priceOMR: 12, oldPrice: 18, stock: 45, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/1778820/header.jpg", detailsAr: "🏷️ 80GB | 🥊 لعبة قتال", detailsEn: "📦 80GB | 🥊 Fighting Game", order: 13, category: "games" },
        { id: 108, nameAr: "Mafia: The Old Country", nameEn: "Mafia: The Old Country", priceOMR: 12, oldPrice: 18, stock: 25, image: "https://shared.fastly.steamstatic.com/store_item_assets/steam/apps/2933620/header.jpg", detailsAr: "🇮🇹 55GB | 🔫 أكشن - مغامرة | 🗡️ قتال بالسكاكين", detailsEn: "🇮🇹 55GB | 🔫 Action-Adventure | 🗡️ Knife Combat", order: 108, category: "games" }

    for (let i = 14; i <= 50; i++) {
        if (i === 108) continue;
        defaultGames.push({
            id: i, nameAr: `لعبة PS5 مميزة ${i}`, nameEn: `Premium PS5 Game ${i}`,

    const allDefaultProducts = [...defaultGames, ...giftCards];
    
    function loadProducts() {
        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data) && data.length > 0) {
                products = data.sort((a, b) => (a.order || 0) - (b.order || 0));
            } else {
                products = JSON.parse(JSON.stringify(allDefaultProducts));
                productsRef.set(products);
            }
            renderProductsTable();
            updateDashboard();
            updateOfferSelect();
        });
    }
    
    function saveProducts() {
        productsRef.set(products).then(() => showNotification('✅ تم حفظ المنتجات'));
    }
    
    function updateOrder() {
        products.forEach((p, idx) => { p.order = idx; });
        saveProducts();
        renderProductsTable();
    }
    
    function moveProductUp(index) {
        if (index === 0) return;
        [products[index], products[index-1]] = [products[index-1], products[index]];
        updateOrder();
    }
    
    function moveProductDown(index) {
        if (index === products.length-1) return;
        [products[index], products[index+1]] = [products[index+1], products[index]];
        updateOrder();
    }
    
    function moveToPosition(productId, newPos) {
        const idx = products.findIndex(p => p.id == productId);
        if (idx === -1) return;
        let target = newPos - 1;
        if (target < 0) target = 0;
        if (target >= products.length) target = products.length - 1;
        if (idx === target) return;
        const product = products[idx];
        products.splice(idx, 1);
        products.splice(target, 0, product);
        updateOrder();
    }
    
    function updateStock(id, newStock) {
        const p = products.find(p => p.id == id);
        if (p) { p.stock = parseInt(newStock); saveProducts(); renderProductsTable(); }
    }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery) filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(searchQuery) || p.nameEn.toLowerCase().includes(searchQuery));
        if (filterCategory !== 'all') filtered = filtered.filter(p => p.category === filterCategory);
        return filtered;
    }
    
    function renderProductsTable() {
        const filtered = getFilteredProducts();
        const container = document.getElementById('productsTable');
        if (filtered.length === 0) { container.innerHTML = '<div class="loading">لا توجد منتجات</div>'; return; }
        
        container.innerHTML = `
            <div style="overflow-x:auto;">
                <table>
                    <thead><tr><th>الترتيب</th><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الكمية</th><th>التصنيف</th><th>إجراءات</th></tr></thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>
        `;
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = filtered.map((p, idx) => {
            const realIdx = products.findIndex(prod => prod.id === p.id);
            const orderNum = realIdx + 1;
            return `
                <tr>
                    <td><div style="display:flex; gap:5px; justify-content:center;">
                        <button class="edit-btn" onclick="moveProductUp(${realIdx})" ${realIdx===0?'disabled':''}>⬆️</button>
                        <span style="background:#ffaa44; color:#0a0a1a; padding:2px 8px; border-radius:1rem;">${orderNum}</span>
                        <button class="edit-btn" onclick="moveProductDown(${realIdx})" ${realIdx===products.length-1?'disabled':''}>⬇️</button>
                        <input type="number" value="${orderNum}" min="1" max="${products.length}" style="width:55px; background:#1e1e3a; border:1px solid #ffaa44; border-radius:1rem; text-align:center; color:white;" onchange="moveToPosition(${p.id}, this.value)">
                    </div></td>
                    <td><img src="${p.image || ''}" width="40" height="40" style="border-radius:8px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td><strong>${escapeHtml(p.nameAr)}</strong><br><small>${escapeHtml(p.nameEn)}</small></td>
                    <td>${p.priceOMR} ر.ع${p.oldPrice ? `<br><span style="text-decoration:line-through;">${p.oldPrice}</span>` : ''}</td>
                    <td><input type="number" class="stock-input" value="${p.stock}" min="0" onchange="updateStock(${p.id}, this.value)"></td>
                    <td>${categoryNames[p.category] || p.category}</td>
                    <td><button class="edit-btn" onclick="openEditForm(${p.id})">✏️</button><button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button></td>
                </tr>
                <tr id="edit-form-${p.id}" style="display:none;"><td colspan="7"><div class="product-edit-form">
                    <div class="edit-field"><label>📝 الاسم بالعربية</label><input type="text" id="editNameAr_${p.id}" value="${escapeHtml(p.nameAr)}"></div>
                    <div class="edit-field"><label>🌐 الاسم بالإنجليزية</label><input type="text" id="editNameEn_${p.id}" value="${escapeHtml(p.nameEn)}"></div>
                    <div class="edit-field"><label>💰 السعر</label><input type="number" id="editPrice_${p.id}" value="${p.priceOMR}" step="0.5"></div>
                    <div class="edit-field"><label>🏷️ السعر القديم</label><input type="number" id="editOldPrice_${p.id}" value="${p.oldPrice||''}" step="0.5"></div>
                    <div class="edit-field"><label>📦 الكمية</label><input type="number" id="editStock_${p.id}" value="${p.stock}" step="1"></div>
                    <div class="edit-field"><label>🖼️ رابط الصورة</label><input type="text" id="editImageUrl_${p.id}" value="${escapeHtml(p.image||'')}"></div>
                    <div class="edit-field"><label>📝 الوصف بالعربية</label><textarea id="editDescAr_${p.id}" rows="2">${escapeHtml(p.detailsAr||'')}</textarea></div>
                    <div class="edit-field"><label>📝 الوصف بالإنجليزية</label><textarea id="editDescEn_${p.id}" rows="2">${escapeHtml(p.detailsEn||'')}</textarea></div>
                    <div class="edit-field"><label>📂 التصنيف</label><select id="editCategory_${p.id}">${categories.map(cat => `<option value="${cat}" ${p.category===cat?'selected':''}>${categoryNames[cat]}</option>`).join('')}</select></div>
                    <div class="edit-buttons"><button onclick="saveEdit(${p.id})" style="background:#00cc88;">💾 حفظ</button><button onclick="closeEditForm(${p.id})" style="background:#ff4444;">إلغاء</button></div>
                </div></td></tr>
            `;
        }).join('');
    }
    
    function openEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'table-row'; }
    function closeEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'none'; }
    
    function saveEdit(id) {
        const p = products.find(p => p.id == id);
        if (!p) return;
        p.nameAr = document.getElementById(`editNameAr_${id}`).value;
        p.nameEn = document.getElementById(`editNameEn_${id}`).value;
        p.priceOMR = parseFloat(document.getElementById(`editPrice_${id}`).value);
        p.oldPrice = parseFloat(document.getElementById(`editOldPrice_${id}`).value) || null;
        p.stock = parseInt(document.getElementById(`editStock_${id}`).value) || 0;
        p.image = document.getElementById(`editImageUrl_${id}`).value;
        p.detailsAr = document.getElementById(`editDescAr_${id}`).value;
        p.detailsEn = document.getElementById(`editDescEn_${id}`).value;
        p.category = document.getElementById(`editCategory_${id}`).value;
        saveProducts();
        closeEditForm(id);
        renderProductsTable();
        showNotification('✅ تم التحديث');
    }
    
    function deleteProduct(id) {
        if (confirm('⚠️ حذف المنتج؟')) {
            products = products.filter(p => p.id != id);
            updateOrder();
            showNotification('✅ تم الحذف');
        }
    }
    
    function addProduct() {
        const nameAr = document.getElementById('newNameAr').value.trim();
        const nameEn = document.getElementById('newNameEn').value.trim();
        const category = document.getElementById('newCategorySelect').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        const oldPrice = parseFloat(document.getElementById('newOldPrice').value) || null;
        const stock = parseInt(document.getElementById('newStock').value) || 0;
        const image = currentImageData || "";
        const descAr = document.getElementById('newDesc').value;
        const descEn = document.getElementById('newDescEn').value;
        
        if (!nameAr || !nameEn || isNaN(price)) { alert('⚠️ يرجى ملء الاسم والسعر'); return; }
        
        const newProduct = {
            id: Date.now(), nameAr, nameEn, category,
            priceOMR: price, oldPrice: (oldPrice && oldPrice > price) ? oldPrice : null,
            stock, image, detailsAr: descAr, detailsEn: descEn || descAr,
            order: products.length
        };
        products.push(newProduct);
        saveProducts();
        
        document.getElementById('newNameAr').value = '';
        document.getElementById('newNameEn').value = '';
        document.getElementById('newPrice').value = '';
        document.getElementById('newOldPrice').value = '';
        document.getElementById('newStock').value = '99';
        document.getElementById('newDesc').value = '';
        document.getElementById('newDescEn').value = '';
        currentImageData = null;
        document.getElementById('newImagePreview').style.display = 'none';
        renderProductsTable();
        updateOfferSelect();
        showNotification('✅ تم إضافة المنتج');
    }
    
    function loadWeeklyOffers() {
        offersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            weeklyOffers = data ? Object.values(data) : [];
            renderOffersList();
            updateDashboard();
        });
    }
    
    function renderOffersList() {
        const container = document.getElementById('offersList');
        container.innerHTML = weeklyOffers.map(o => `<div class="item-badge">${o.productName} - ${o.discount}% <i class="fas fa-trash" onclick="deleteOffer('${o.id}')"></i></div>`).join('');
    }
    
    function addWeeklyOffer() {
        const pid = document.getElementById('offerProductSelect').value;
        const discount = parseInt(document.getElementById('offerDiscount').value);
        if (!pid || !discount) { alert('اختر منتج ونسبة الخصم'); return; }
        const p = products.find(p => p.id == pid);
        if (!p) return;
        const newOffer = { id: Date.now(), productId: parseInt(pid), productName: p.nameAr, discount };
        weeklyOffers.push(newOffer);
        offersRef.set(weeklyOffers);
        document.getElementById('offerDiscount').value = '';
        showNotification('✅ تم إضافة العرض');
    }
    
    function deleteOffer(id) {
        weeklyOffers = weeklyOffers.filter(o => o.id != id);
        offersRef.set(weeklyOffers);
        showNotification('✅ تم حذف العرض');
    }
    
    function updateOfferSelect() {
        const select = document.getElementById('offerProductSelect');
        if (select) select.innerHTML = products.map(p => `<option value="${p.id}">${p.nameAr}</option>`).join('');
    }
    
    function loadCategories() {
        categoriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.categories && data.names) {
                categories = data.categories;
                categoryNames = data.names;
            } else {
                categories = ["games", "giftcards"];
                categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
                categoriesRef.set({ categories, names: categoryNames });
            }
            renderCategoriesList();
            updateCategorySelect();
            updateFilterSelect();
        });
    }
    
    function renderCategoriesList() {
        const container = document.getElementById('categoriesList');
        container.innerHTML = categories.map(cat => `<div class="item-badge">${categoryNames[cat]} <i class="fas fa-trash" onclick="deleteCategory('${cat}')"></i></div>`).join('');
    }
    
    function addCategory() {
        const newName = document.getElementById('newCategoryName').value.trim();
        if (!newName) { alert('أدخل اسم التصنيف'); return; }
        const key = newName.replace(/\s/g, "_").toLowerCase();
        if (categories.includes(key)) { alert('التصنيف موجود'); return; }
        categories.push(key);
        categoryNames[key] = newName;
        categoriesRef.set({ categories, names: categoryNames });
        document.getElementById('newCategoryName').value = '';
        renderCategoriesList();
        updateCategorySelect();
        updateFilterSelect();
        showNotification('✅ تم إضافة التصنيف');
    }
    
    function deleteCategory(cat) {
        if (cat === "games" || cat === "giftcards") { alert('لا يمكن حذف التصنيفات الأساسية'); return; }
        if (confirm('حذف التصنيف؟')) {
            categories = categories.filter(c => c !== cat);
            delete categoryNames[cat];
            categoriesRef.set({ categories, names: categoryNames });
            renderCategoriesList();
            updateCategorySelect();
            updateFilterSelect();
            showNotification('✅ تم حذف التصنيف');
        }
    }
    
    function updateCategorySelect() {
        const select = document.getElementById('newCategorySelect');
        if (select) select.innerHTML = categories.map(cat => `<option value="${cat}">${categoryNames[cat]}</option>`).join('');
    }
    
    function updateFilterSelect() {
        const filter = document.getElementById('filterCategory');
        if (filter) {
            const val = filter.value;
            filter.innerHTML = '<option value="all">الكل</option>' + categories.map(cat => `<option value="${cat}">${categoryNames[cat]}</option>`).join('');
            filter.value = val;
        }
    }
    
    function updateDashboard() {
        document.getElementById('statProducts').innerText = products.length;
        const totalSales = products.reduce((s, p) => s + ((p.sales || 0) * (p.priceOMR || 0)), 0);
        document.getElementById('statSales').innerText = totalSales.toFixed(2);
        document.getElementById('statOffers').innerText = weeklyOffers.length;
    }
    
    function showTab(tab) {
        currentTab = tab;
        document.querySelectorAll('.admin-tab').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        document.getElementById('productsTab').style.display = tab === 'products' ? 'block' : 'none';
        document.getElementById('offersTab').style.display = tab === 'offers' ? 'block' : 'none';
        document.getElementById('categoriesTab').style.display = tab === 'categories' ? 'block' : 'none';
    }
    
    function showNotification(message) {
        const existing = document.querySelector('.admin-notification');
        if (existing) existing.remove();
        const notif = document.createElement('div');
        notif.className = 'admin-notification';
        notif.innerHTML = `<i class="fas fa-bell"></i> ${message}`;
        document.body.appendChild(notif);
        if (notificationTimeout) clearTimeout(notificationTimeout);
        notificationTimeout = setTimeout(() => notif.remove(), 3000);
    }
    
    function escapeHtml(t) { return t ? t.replace(/[&<>]/g, m => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[m]||m)) : ''; }
    
    const uploadArea = document.getElementById("newImageUploadArea");
    const fileInput = document.getElementById("newImageFile");
    const preview = document.getElementById("newImagePreview");
    if (uploadArea) uploadArea.addEventListener("click", () => fileInput.click());
    if (fileInput) {
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { currentImageData = e.target.result; preview.src = e.target.result; preview.style.display = "block"; };
                reader.readAsDataURL(file);
            }
        });
    }
    
    document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderProductsTable(); });
    document.getElementById('filterCategory').addEventListener('change', (e) => { filterCategory = e.target.value; renderProductsTable(); });
    
    window.checkPassword = checkPassword;
    window.logout = logout;
    window.showTab = showTab;
    window.moveProductUp = moveProductUp;
    window.moveProductDown = moveProductDown;
    window.moveToPosition = moveToPosition;
    window.updateStock = updateStock;
    window.openEditForm = openEditForm;
    window.closeEditForm = closeEditForm;
    window.saveEdit = saveEdit;
    window.deleteProduct = deleteProduct;
    window.addProduct = addProduct;
    window.addWeeklyOffer = addWeeklyOffer;
    window.deleteOffer = deleteOffer;
    window.addCategory = addCategory;
    window.deleteCategory = deleteCategory;
    
    checkSession();
</script>
</body>
</html>
