    const allDefaultProducts = [...defaultGames, ...giftCards];
    
    // ==================== ترتيب المنتجات ====================
    function moveProductUp(index) {
        if (index === 0) return;
        const temp = products[index];
        products[index] = products[index - 1];
        products[index - 1] = temp;
        updateOrder();
    }
    
    function moveProductDown(index) {
        if (index === products.length - 1) return;
        const temp = products[index];
        products[index] = products[index + 1];
        products[index + 1] = temp;
        updateOrder();
    }
    
    function updateOrder() {
        products.forEach((p, idx) => { p.order = idx; });
        saveProducts();
        renderTable();
    }
    
    // ==================== وظائف أخرى ====================
    function trackVisitor() {
        const visitorData = {
            id: Date.now(),
            timestamp: new Date().toISOString(),
            date: new Date().toLocaleDateString('ar-SA'),
            time: new Date().toLocaleTimeString('ar-SA'),
            userAgent: navigator.userAgent.substring(0, 80),
            referrer: document.referrer || "مباشر"
        };
        visitorsRef.push(visitorData);
        const today = new Date().toDateString();
        database.ref('daily_visits/' + today.replace(/\s/g, '_')).transaction(c => (c || 0) + 1);
        database.ref('total_visits').transaction(c => (c || 0) + 1);
    }
    
    function loadVisitorStats() {
        visitorsRef.once('value', (snapshot) => {
            const visitors = snapshot.val();
            const totalCount = visitors ? Object.keys(visitors).length : 0;
            const today = new Date().toDateString();
            database.ref('daily_visits/' + today.replace(/\s/g, '_')).once('value', (snap) => {
                const todayCount = snap.val() || 0;
                document.getElementById('visitorStats').innerHTML = `
                    <div class="stat-card"><i class="fas fa-globe"></i><div class="stat-value">${totalCount}</div><div class="stat-label">إجمالي الزوار</div></div>
                    <div class="stat-card"><i class="fas fa-calendar-day"></i><div class="stat-value">${todayCount}</div><div class="stat-label">زوار اليوم</div></div>
                    <div class="stat-card"><i class="fas fa-clock"></i><div class="stat-value">${new Date().toLocaleTimeString('ar-SA').substring(0,5)}</div><div class="stat-label">آخر تحديث</div></div>
                `;
                document.getElementById('visitorStats').style.display = 'grid';
            });
        });
        visitorsRef.orderByKey().limitToLast(8).once('value', (snapshot) => {
            const visitors = snapshot.val();
            if (visitors) {
                const list = Object.values(visitors).reverse();
                document.getElementById('visitorsTable').innerHTML = `
                    <div style="padding:0.5rem; border-bottom:1px solid rgba(255,170,68,0.2);"><i class="fas fa-users"></i> آخر الزوار</div>
                     <table><thead><tr><th>الوقت</th><th>التاريخ</th><th>المتصفح</th><th>المصدر</th></tr></thead><tbody>
                        ${list.map(v => `<tr><td>${v.time || '-'}</td><td>${v.date || '-'}</td><td>${(v.userAgent || '').substring(0, 25)}...</td><td>${v.referrer === 'مباشر' ? '🔗 رابط' : '🔍 خارجي'}</td></tr>`).join('')}
                    </tbody></table>
                `;
                document.getElementById('visitorsTable').style.display = 'block';
            }
        });
    }
    
    function loadCategories() {
        categoriesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && data.categories && data.names) {
                categories = data.categories;
                categoryNames = data.names;
            } else {
                categories = ["games", "giftcards"];
                categoryNames = { games: "🎮 ألعاب PS4/PS5", giftcards: "💳 بطاقات شحن" };
                saveCategories();
            }
            updateCategoriesUI();
            updateCategorySelect();
            updateFilterSelect();
        });
    }
    
    function saveCategories() {
        categoriesRef.set({ categories: categories, names: categoryNames });
    }

        const container = document.getElementById('categoriesList');
        container.innerHTML = categories.map(cat => `
            <div class="category-badge">
                ${categoryNames[cat] || cat}
                <i class="fas fa-trash" onclick="deleteCategory('${cat}')"></i>
            </div>
        `).join('');
    }
    
    function updateCategorySelect() {
        const select = document.getElementById('newCategorySelect');
        if (!select) return;
        select.innerHTML = '';
        categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = categoryNames[cat] || cat;
            select.appendChild(option);
        });
    }
    
    function updateFilterSelect() {
        const filterSelect = document.getElementById('filterCategory');
        if (filterSelect) {
            const currentValue = filterSelect.value;
            filterSelect.innerHTML = '<option value="all">الكل</option>';
            categories.forEach(cat => {
                filterSelect.innerHTML += `<option value="${cat}">${categoryNames[cat] || cat}</option>`;
            });
            filterSelect.value = currentValue;
        }
    }
    
    function addNewCategory() {
        const newName = document.getElementById('newCategoryName').value.trim();
        if (!newName) { alert('الرجاء إدخال اسم التصنيف'); return; }
        const catKey = newName.replace(/\s/g, "_").toLowerCase();
        if (categories.includes(catKey)) { alert('هذا التصنيف موجود مسبقاً'); return; }
        categories.push(catKey);
        categoryNames[catKey] = newName;
        saveCategories();
        updateCategoriesUI();
        updateCategorySelect();
        updateFilterSelect();
        document.getElementById('newCategoryName').value = '';
        alert('✅ تم إضافة التصنيف بنجاح!');
    }
    
    function deleteCategory(cat) {
        if (cat === "games" || cat === "giftcards") { alert("لا يمكن حذف التصنيفات الأساسية"); return; }
        if (confirm(`⚠️ هل أنت متأكد من حذف التصنيف "${categoryNames[cat]}"؟`)) {
            categories = categories.filter(c => c !== cat);
            delete categoryNames[cat];
            saveCategories();
            updateCategoriesUI();
            updateCategorySelect();
            updateFilterSelect();
            alert('✅ تم حذف التصنيف');
        }
    }
    
    function checkSession() {
        if (localStorage.getItem(SESSION_KEY) === "true") { isLoggedIn = true; showAdminPanel(); }
        else askPassword();
    }
    
    function askPassword() {
        const pwd = prompt('🔐 أدخل كلمة سر الأدمن:');
        if (pwd === ADMIN_PASSWORD) {
            isLoggedIn = true;
            localStorage.setItem(SESSION_KEY, "true");
            showAdminPanel();
        } else if (pwd !== null) { alert('❌ كلمة السر غير صحيحة'); window.location.href = 'index.html'; }
    }
    
    function showAdminPanel() {
        document.getElementById('adminPanel').style.display = 'block';
        document.getElementById('categoriesManager').style.display = 'block';
        document.getElementById('logoutBtn').style.display = 'inline-block';
        document.getElementById('deleteAllBtn').style.display = 'inline-block';
        loadProducts();
        loadVisitorStats();
        loadCategories();
    }
    
    function logout() { localStorage.removeItem(SESSION_KEY); window.location.reload(); }
    function deleteAllProducts() { if (confirm('⚠️ حذف جميع المنتجات؟')) { productsRef.set([]); alert('تم الحذف'); loadProducts(); } }
    
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('deleteAllBtn').onclick = deleteAllProducts;
    document.getElementById('addCategoryBtn').onclick = addNewCategory;
    document.getElementById('searchInput').addEventListener('input', (e) => { searchQuery = e.target.value.toLowerCase(); renderTable(); });
    document.getElementById('filterCategory').addEventListener('change', (e) => { filterCategory = e.target.value; renderTable(); });
    
    function handleImageUpload(file, callback) {
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => callback(e.target.result);
        reader.readAsDataURL(file);
    }
    
    const uploadArea = document.getElementById("newImageUploadArea");
    const fileInput = document.getElementById("newImageFile");
    const preview = document.getElementById("newImagePreview");
    if (uploadArea) uploadArea.addEventListener("click", () => fileInput.click());
    if (fileInput) {
        fileInput.addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) handleImageUpload(file, (data) => { currentImageData = data; preview.src = data; preview.style.display = "block"; });
        });
    }
    
    function loadProducts() {
        productsRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data && Array.isArray(data) && data.length > 0) {
                products = data.sort((a, b) => (a.order || 0) - (b.order || 0));
            } else {
                products = JSON.parse(JSON.stringify(allDefaultProducts));
                products.forEach((p, idx) => { p.order = idx; });
                productsRef.set(products);
            }
            renderTable();
        });
    }
    
    function saveProducts() { productsRef.set(products); }
    
    function getFilteredProducts() {
        let filtered = [...products];
        if (searchQuery) filtered = filtered.filter(p => p.nameAr.toLowerCase().includes(searchQuery) || p.nameEn.toLowerCase().includes(searchQuery));
        if (filterCategory !== 'all') filtered = filtered.filter(p => p.category === filterCategory);
        return filtered;
    }
    
    function renderTable() {
        const filtered = getFilteredProducts();
        const container = document.getElementById('productsTable');
        if (filtered.length === 0) { container.innerHTML = '<div style="text-align:center; padding:2rem;">لا توجد منتجات</div>'; return; }
        
        container.innerHTML = `
            <div class="batch-actions">
                <label><input type="checkbox" id="selectAllCheckbox" onchange="toggleSelectAll()"> تحديد الكل</label>
                <button id="batchDeleteBtn" class="btn-danger-sm" onclick="batchDelete()">🗑️ حذف المحدد (<span id="selectedCount">0</span>)</button>
                <button id="batchStockBtn" class="btn-sm" onclick="batchUpdateStock()">✏️ تعديل كمية المحدد</button>
            </div>
            <div style="overflow-x:auto;">
                 <table>
                    <thead> <tr><th class="checkbox-col"></th><th class="order-col">الترتيب</th><th>الصورة</th><th>الاسم</th><th>السعر</th><th>الكمية</th><th>التصنيف</th><th>إجراءات</th></tr> </thead>
                    <tbody id="tableBody"></tbody>
                 </table>
            </div>
        `;
        
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = filtered.map((p, idx) => `
            <tr id="row-${p.id}" data-id="${p.id}">
                <td><input type="checkbox" class="product-checkbox" value="${p.id}" onchange="updateSelectedCount()"></td>
                 <td class="order-col">
                    <div class="order-buttons">
                        <button class="order-btn" onclick="moveProductUp(${products.indexOf(p)})" ${idx === 0 ? 'disabled style="opacity:0.5;"' : ''}>⬆️</button>
                        <button class="order-btn" onclick="moveProductDown(${products.indexOf(p)})" ${idx === products.length-1 ? 'disabled style="opacity:0.5;"' : ''}>⬇️</button>
                    </div>
                 </td>
                 <td><img src="${p.image || ''}" width="35" height="35" style="border-radius:6px;" onerror="this.src='https://via.placeholder.com/35'"></td>
                 <td>${escapeHtml(p.nameAr)}<br><small>${escapeHtml(p.nameEn)}</small></td>
                 <td>${p.priceOMR} ر.ع${p.oldPrice ? `<br><span style="text-decoration:line-through;">${p.oldPrice}</span>` : ''}</td>
                 <td><input type="number" class="stock-input" id="stock_${p.id}" value="${p.stock || 0}" min="0" step="1" onchange="updateStock(${p.id}, this.value)" style="${(p.stock || 0) === 0 ? 'border-color:#ff4444;' : ''}"><span class="${(p.stock || 0) === 0 ? 'out-stock' : (p.stock || 0) < 10 ? 'low-stock' : ''}" style="display:block;font-size:0.6rem;">${(p.stock || 0) === 0 ? 'نفذت' : (p.stock || 0) < 10 ? 'متبقي' : ''}</span></td>
                 <td>${categoryNames[p.category] || p.category}</td>
                 <td><button class="edit-btn" onclick="openEditForm(${p.id})">✏️</button><button class="delete-btn" onclick="deleteProduct(${p.id})">🗑️</button></td>
             </tr>
            <tr id="edit-form-${p.id}" style="display:none;"><td colspan="8"><div class="product-edit-form"><input type="text" id="editNameAr_${p.id}" value="${escapeHtml(p.nameAr)}"><input type="text" id="editNameEn_${p.id}" value="${escapeHtml(p.nameEn)}"><input type="number" id="editPrice_${p.id}" value="${p.priceOMR}" step="0.5"><input type="number" id="editOldPrice_${p.id}" value="${p.oldPrice || ''}" step="0.5"><input type="number" id="editStock_${p.id}" value="${p.stock || 0}" step="1"><div class="edit-image-upload" onclick="document.getElementById('editImageFile_${p.id}').click()"><i class="fas fa-cloud-upload-alt"></i> صورة<input type="file" id="editImageFile_${p.id}" accept="image/*" style="display:none;"></div><img id="editImagePreview_${p.id}" class="edit-image-preview"><input type="text" id="editImageUrl_${p.id}" value="${escapeHtml(p.image || '')}" placeholder="رابط الصورة"><textarea id="editDescAr_${p.id}" rows="1">${escapeHtml(p.detailsAr || '')}</textarea><textarea id="editDescEn_${p.id}" rows="1">${escapeHtml(p.detailsEn || '')}</textarea><select id="editCategory_${p.id}">${categories.map(cat => `<option value="${cat}" ${p.category === cat ? 'selected' : ''}>${categoryNames[cat]}</option>`).join('')}</select><button onclick="saveEdit(${p.id})" style="background:#00cc88;">💾 حفظ</button><button onclick="closeEditForm(${p.id})" style="background:#ff4444;">إلغاء</button></div></td></tr>
        `).join('');
        
        products.forEach(p => {
            const editFileInput = document.getElementById(`editImageFile_${p.id}`);
            const editPreview = document.getElementById(`editImagePreview_${p.id}`);
            if (editFileInput) {
                editFileInput.addEventListener('change', (e) => {
                    const file = e.target.files[0];
                    if (file) handleImageUpload(file, (data) => { editPreview.src = data; editPreview.style.display = "block"; window[`tempEditImage_${p.id}`] = data; });
                });
            }
        });
        updateSelectedCount();
    }
    
    function updateSelectedCount() {
        const checkboxes = document.querySelectorAll('.product-checkbox:checked');
        document.getElementById('selectedCount').innerText = checkboxes.length;
    }
    function toggleSelectAll() {
        const isChecked = document.getElementById('selectAllCheckbox').checked;
        document.querySelectorAll('.product-checkbox').forEach(cb => cb.checked = isChecked);
        updateSelectedCount();
    }
    function batchDelete() {
        const selected = Array.from(document.querySelectorAll('.product-checkbox:checked')).map(cb => parseInt(cb.value));
        if (selected.length === 0) { alert('لم تختار أي منتج'); return; }
        if (confirm(`⚠️ حذف ${selected.length} منتج؟`)) {
            products = products.filter(p => !selected.includes(p.id));
            saveProducts();
            renderTable();
            alert('✅ تم الحذف');
        }
    }
    function batchUpdateStock() {
        const selected = Array.from(document.querySelectorAll('.product-checkbox:checked')).map(cb => parseInt(cb.value));
        if (selected.length === 0) { alert('لم تختار أي منتج'); return; }
        const newStock = prompt(`✏️ الكمية الجديدة لـ ${selected.length} منتج:`, "10");
        if (newStock !== null && !isNaN(parseInt(newStock))) {
            products.forEach(p => { if (selected.includes(p.id)) p.stock = parseInt(newStock); });
            saveProducts();
            renderTable();
            alert('✅ تم التحديث');
        }
    }
    function updateStock(id, newStock) {
        const product = products.find(p => p.id === id);
        if (product) { product.stock = parseInt(newStock); saveProducts(); renderTable(); }
    }
    function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m] || m)); }
    function openEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'table-row'; }
    function closeEditForm(id) { document.getElementById(`edit-form-${id}`).style.display = 'none'; }
    
    async function saveEdit(id) {
        const product = products.find(p => p.id === id);
        if (!product) return;
        product.nameAr = document.getElementById(`editNameAr_${id}`).value;
        product.nameEn = document.getElementById(`editNameEn_${id}`).value;
        product.priceOMR = parseFloat(document.getElementById(`editPrice_${id}`).value);
        product.oldPrice = parseFloat(document.getElementById(`editOldPrice_${id}`).value) || null;
        product.stock = parseInt(document.getElementById(`editStock_${id}`).value) || 0;
        const tempImage = window[`tempEditImage_${id}`];
        if (tempImage) { product.image = tempImage; delete window[`tempEditImage_${id}`]; }
        else product.image = document.getElementById(`editImageUrl_${id}`).value;
        product.detailsAr = document.getElementById(`editDescAr_${id}`).value;
        product.detailsEn = document.getElementById(`editDescEn_${id}`).value;
        product.category = document.getElementById(`editCategory_${id}`).value;
        await saveProducts();
        closeEditForm(id);
        alert('✅ تم التحديث');
        renderTable();
    }
    
    async function deleteProduct(id) {
        if (confirm('⚠️ حذف المنتج؟')) {
            products = products.filter(p => p.id !== id);
            updateOrder();
            alert('✅ تم الحذف');
        }
    }
    
    async function addProduct() {
        const nameAr = document.getElementById('newNameAr').value.trim();
        const nameEn = document.getElementById('newNameEn').value.trim();
        const category = document.getElementById('newCategorySelect').value;
        const price = parseFloat(document.getElementById('newPrice').value);
        const oldPrice = parseFloat(document.getElementById('newOldPrice').value) || null;
        const stock = parseInt(document.getElementById('newStock').value) || 0;
        const image = currentImageData || "";
        const desc = document.getElementById('newDesc').value.trim();
        if (!nameAr || !nameEn || isNaN(price)) { alert('يرجى ملء الاسم والسعر'); return; }
        const newProduct = { id: Date.now(), nameAr, nameEn, category, priceOMR: price, oldPrice: (oldPrice && oldPrice > price) ? oldPrice : null, stock, image, detailsAr: desc, detailsEn: desc, order: products.length };
        products.push(newProduct);
        await saveProducts();
        document.getElementById('newNameAr').value = ''; document.getElementById('newNameEn').value = ''; document.getElementById('newPrice').value = ''; document.getElementById('newOldPrice').value = ''; document.getElementById('newStock').value = '99'; document.getElementById('newDesc').value = ''; currentImageData = null; document.getElementById('newImagePreview').style.display = 'none';
        alert('✅ تم الإضافة');
        renderTable();
    }
    
    trackVisitor();
    checkSession();
    
    window.toggleSelectAll = toggleSelectAll;
    window.batchDelete = batchDelete;
    window.batchUpdateStock = batchUpdateStock;
    window.updateStock = updateStock;
    window.openEditForm = openEditForm;
    window.closeEditForm = closeEditForm;
    window.saveEdit = saveEdit;
    window.deleteProduct = deleteProduct;
    window.addProduct = addProduct;
    window.updateSelectedCount = updateSelectedCount;
    window.deleteCategory = deleteCategory;
    window.addNewCategory = addNewCategory;
    window.moveProductUp = moveProductUp;
    window.moveProductDown = moveProductDown;
</script>
</body>
</html>
